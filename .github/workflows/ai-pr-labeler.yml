name: AI PR Labeler
on:
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label PR by size and risk
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            // Calculate total lines changed
            const totalChanges = files.reduce((sum, f) => sum + f.additions + f.deletions, 0);

            // Determine size label
            let sizeLabel;
            if (totalChanges < 10) sizeLabel = 'size-xs';
            else if (totalChanges < 50) sizeLabel = 'size-s';
            else if (totalChanges < 200) sizeLabel = 'size-m';
            else if (totalChanges < 500) sizeLabel = 'size-l';
            else sizeLabel = 'size-xl';

            // Determine risk level based on files changed
            const highRiskPatterns = [
              /^docker-compose/,
              /^\.github\/workflows\//,
              /^etl\/schema\//,
              /^etl\/config\.py/,
              /^\.env/,
              /Dockerfile/,
              /^deploy\//
            ];
            const lowRiskPatterns = [
              /\.md$/,
              /^docs\//,
              /\/tests?\//,
              /\/__tests__\//,
              /\.test\./,
              /\.spec\./
            ];

            const fileNames = files.map(f => f.filename);
            let riskLabel = 'risk-medium';

            if (fileNames.some(f => highRiskPatterns.some(p => p.test(f)))) {
              riskLabel = 'risk-high';
            } else if (fileNames.every(f => lowRiskPatterns.some(p => p.test(f)))) {
              riskLabel = 'risk-low';
            }

            // Remove old size/risk labels
            const existingLabels = context.payload.pull_request.labels.map(l => l.name);
            const sizeLabels = ['size-xs', 'size-s', 'size-m', 'size-l', 'size-xl'];
            const riskLabels = ['risk-low', 'risk-medium', 'risk-high'];

            for (const label of existingLabels) {
              if (sizeLabels.includes(label) || riskLabels.includes(label)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label
                }).catch(() => {});
              }
            }

            // Add new labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [sizeLabel, riskLabel]
            });

            console.log(`Labeled PR #${context.payload.pull_request.number}: ${sizeLabel}, ${riskLabel} (${totalChanges} lines changed)`);
