name: AI Plan
on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

concurrency:
  group: ai-plan-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  plan:
    # Fires on /plan comments (any repo member) OR when ai-plan label is applied.
    if: >-
      (
        github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/plan') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) || (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'ai-plan'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge /plan comment with eyes reaction
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove ai-plan, add fact-in-progress + planning comment
        if: github.event_name == 'issues' && github.event.label.name == 'ai-plan'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          gh issue edit "$ISSUE" --remove-label "ai-plan" --add-label "fact-in-progress" || true
          gh issue comment "$ISSUE" \
            --body "🗺️ AI Planner — started. Reading the issue and codebase, then rewriting the body with phases + task checklists. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: >-
            ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/worker-plan.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Generate Implementation Plan
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          prompt: |
            You are the AI Planner. Generate a comprehensive implementation plan for this issue.

            The command was: "${{ github.event.comment.body }}"

            If this thread is **pull request #${{ github.event.issue.number }}** (not a standalone issue), plan against the **PR branch** you are checked out on; post the plan as a **pull request** comment and mention linked issues by number from the PR body.

            ## Step 1 — Understand the request
            Read the issue title, body, and ALL comments carefully.
            Read CLAUDE.md and AGENTS.md for project context.
            Read relevant skill docs in docs/skills/ for the affected domain.
            Explore the codebase to understand the current state.

            ## Step 2 — Post a comprehensive plan comment

            Post a comment with this structure:

            ---
            ## 🗺️ Implementation Plan

            ### Analysis
            [What is being asked, why it matters, what the current state of the codebase is.
            Reference specific files and line numbers you examined.]

            ### Architecture decisions
            [Key decisions: data model, API design, component structure, etc. Explain WHY.]

            ### Sub-tasks
            List every discrete unit of work. Each task must be independently implementable
            (own branch + PR) and small enough to complete in a focused session.

            **DO NOT create sub-issues for lifecycle steps.** "Run all checks", "Copilot
            review", "Opus review", and "Create commit" are steps inside the feature PR's
            lifecycle (the worker handles them automatically) — they are not independent
            code changes. Decomposing a parent into one `fact-task` per lifecycle step
            spawns N parallel PRs that all implement the same feature (this happened
            with #481 → #482..#487 → PRs #490, #491, #494, #496). If the parent produces
            only one logical change, output **one** sub-issue, not five.

            | # | Title | Files | Acceptance |
            |---|-------|-------|------------|
            | 1 | ... | ... | ... |
            | 2 | ... | ... | ... |

            ### Dependency order
            [Which tasks must be done before others, and why]

            ### Testing strategy
            [How each task will be verified — unit tests, integration tests, manual checks]

            ### Risks
            [What could go wrong, edge cases, things to watch out for]

            ### Complexity estimate
            [XS / S / M / L / XL with brief justification]
            ---

            ## Step 3 — Label the issue
            Always add the `fact-planned` label after posting the plan:
            ```bash
            gh issue edit ISSUE_NUMBER --add-label "fact-planned"
            ```

            ## Step 4 — Create sub-issues (only if `/plan --full` was used)
            Check if the comment was `/plan --full`. If YES, create sub-issues AND kick off
            implementation:

            ### Body integrity rules — MUST follow

            Issue bodies have repeatedly been corrupted by stripping JSX
            components and TypeScript generics inside backticks (e.g.
            `` `<Foo />` `` and `` `Promise<void>` `` arrived as empty
            `` `` `` and `` `Promise` ``). Always:
            1. Write the body to a temp file first, then use
               `gh issue create --body-file <path>`. Never inline-construct
               via `--body "$(cat <<…)"`.
            2. Keep JSX, HTML tags, and TypeScript generics literal inside
               backticks. Do not abbreviate.
            3. After creating each sub-issue, re-read the body with
               `gh issue view <NUM> --json body --jq .body` and abort if
               it contains `` `` `` (empty inline code span).

            For EACH task in the sub-tasks table:
            IMPORTANT: create the issue WITHOUT labels first, then add labels
            in a separate command — this is required for GitHub to fire the
            `labeled` event that triggers the implementation workflow.

            ```bash
            TMP_BODY=$(mktemp --suffix=.md)
            cat > "$TMP_BODY" <<'BODY'
            ## Parent issue
            Closes #PARENT_NUMBER

            ## Task
            TASK_DESCRIPTION

            ## Files to change
            - list of files

            ## Acceptance criteria
            - list of checks

            ## Context
            See parent issue #PARENT_NUMBER for full plan.
            BODY

            SUB_ISSUE=$(gh issue create \
              --title "PARENT_TITLE — Task N: TASK_TITLE" \
              --body-file "$TMP_BODY" | grep -o '[0-9]*$')
            rm -f "$TMP_BODY"

            # Verify the body is intact — fail loudly if mangled.
            # PCRE lookaround excludes triple-backtick fences (```sql, ```bash, …);
            # only flag truly empty inline code spans (`` `` ``). False-positive
            # observed on issue #536 (2026-05-09) which had ```sql fences and
            # was falsely flagged by the naive `grep -q '``'`.
            if gh issue view "$SUB_ISSUE" --json body --jq .body | grep -qP '(?<!`)``(?!`)'; then
              echo "::error::Sub-issue #$SUB_ISSUE body contains empty inline code spans — JSX/generics likely stripped."
              gh issue edit "$SUB_ISSUE" --add-label "fact-needs-rewrite" || true
              exit 1
            fi

            # Add labels separately so the labeled event fires reliably
            gh issue edit $SUB_ISSUE --add-label "fact-task"
            gh issue edit $SUB_ISSUE --add-label "ai-work"
            ```

            After creating each sub-issue, update the parent issue body to include:
            `- [ ] Task N: TITLE (#SUB_ISSUE_NUMBER)`

            Post a final comment listing all created sub-issues and noting that
            implementation will start automatically.

            If the comment was plain `/plan` (no --full flag), do NOT create sub-issues —
            just post the plan for human review. The human can then label the issue
            `ai-work` or run `/plan --full` when ready to implement.

      - name: Clear fact-in-progress on completion
        if: always() && github.event_name == 'issues' && github.event.label.name == 'ai-plan'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ github.event.issue.number }}" --remove-label "fact-in-progress" || true
