name: AI Plan
on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled]

concurrency:
  group: ai-plan-${{ github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  plan:
    # Fires on /plan comments (any repo member) OR when ai-plan label is applied.
    if: >-
      (
        github.event_name == 'issue_comment' &&
        startsWith(github.event.comment.body, '/plan') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      ) || (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'ai-plan'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge /plan comment with eyes reaction
        if: github.event_name == 'issue_comment'
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Remove ai-plan, add fact-in-progress + planning comment
        if: github.event_name == 'issues' && github.event.label.name == 'ai-plan'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          gh issue edit "$ISSUE" --repo "$REPO" --remove-label "ai-plan" --add-label "fact-in-progress" || true
          gh issue comment "$ISSUE" --repo "$REPO" \
            --body "🗺️ AI Planner — started. Reading the issue and codebase, then rewriting the body with phases + task checklists. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: >-
            ${{ github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number) || format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/worker-plan.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Generate Implementation Plan
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          prompt: |
            You are the AI Planner (D-034 single-track model). Your job is to **edit the
            issue body in place** — adding `## Phase N — name` headings with `### Tasks`
            checklists — following the template in `docs/issue-format.md`.
            Do NOT post the plan as a comment. Do NOT create sub-issues.

            The trigger: "${{ github.event.comment.body }}"

            If this is a PR (not an issue), post a plan comment on the PR instead of
            editing the body, then skip the label steps.

            ## Step 1 — Understand deeply
            Read the issue #${{ github.event.issue.number }} title, body, and ALL comments.
            Read CLAUDE.md (role: planner), AGENTS.md, and `docs/issue-format.md`.
            Read relevant skill docs in `docs/skills/` for the affected domain.
            Explore the codebase — read actual files, not just names.

            ## Step 2 — Rewrite the issue body in place
            Edit issue #${{ github.event.issue.number }} body using `gh issue edit --body-file`.
            Follow the template in `docs/issue-format.md` exactly:

            - Keep the original **Context** block (Problem, Scope, Constraints, etc.)
            - Add or replace the **Plan** section (2-3 sentences on the approach + a
              dependency table if multi-phase)
            - Add **## Phase N — name** sections with **### Tasks** checklists
            - Add **## Exit criteria / Validation** section — list every user-stated
              requirement as a checkbox that can be ticked only with evidence (test
              output, screenshot, or recording). Source these from: any acceptance
              criteria already in the issue, comments from the owner, and the original
              problem statement. Format:
              ```
              ## Exit criteria / Validation

              - [ ] **EC-1**: <user-observable requirement> — *Evidence*: <what to show>
              - [ ] **EC-2**: ...
              ```
            - Add **## Additional Context** section if needed

            Decide on phases using the rules in `docs/issue-format.md` (Q1–Q3). Default
            is one phase. Split only when: PR would exceed ~2 000 LOC, or there is a
            producer/consumer dependency, or two groups touch the same critical shared file.

            Write the body to a temp file, then edit:
            ```bash
            TMP=$(mktemp --suffix=.md)
            cat > "$TMP" <<'BODY'
            [full rewritten body here]
            BODY
            gh issue edit ${{ github.event.issue.number }} --body-file "$TMP"
            rm -f "$TMP"
            ```

            ## Step 3 — Post a short analysis comment
            Post one comment (≤ 10 lines) explaining:
            - What you found in the codebase relevant to this issue
            - Why you chose this phase structure (or single phase)
            - Any risks or blockers identified

            ## Step 4 — Set labels
            ```bash
            ISSUE=${{ github.event.issue.number }}
            gh issue edit "$ISSUE" --add-label "fact-planned"
            gh issue edit "$ISSUE" --add-label "ai-awaiting-owner"
            ```

            The owner will review the rewritten body. When satisfied they add `ai-work`
            to trigger implementation.

            ## Step 5 — If you cannot complete the plan
            Post a comment tagging @alvarolobato with what is blocking.
            Remove `fact-in-progress`. Add `ai-blocked`. Exit.

      - name: Clear in-progress labels on completion
        if: always() && github.event_name == 'issues' && github.event.label.name == 'ai-plan'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          gh issue edit "$ISSUE" --repo "$REPO" --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE" --repo "$REPO" --remove-label "ai-plan" || true
