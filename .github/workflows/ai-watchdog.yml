name: AI Factory Watchdog
# Periodically scans the factory for silent failures and actively recovers.
# This is the safety net: if any of the event-driven workflows misses a
# trigger (e.g. because GitHub gated it with `action_required`, or because
# a label race cancelled the worker), the watchdog catches it and either
# re-queues the work, triggers the address-feedback flow, or pings the
# owner with `ai-blocked` + a clear explanation.
on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: ai-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      OWNER: ${{ github.repository_owner }}
      REPO_FULL: ${{ github.repository }}
      OWNER_HANDLE: alvarolobato
    steps:
      - uses: actions/checkout@v4

      - name: Stuck `ai-in-progress` issues
        run: |
          set -euo pipefail
          # Any issue in `ai-in-progress` for >60 minutes is considered stuck.
          NOW=$(date -u +%s)
          STUCK_THRESHOLD_SECS=3600

          # List open issues with ai-in-progress
          ISSUES=$(gh issue list --repo "$REPO_FULL" \
            --state open --label "ai-in-progress" \
            --json number,updatedAt,title,labels --limit 100)

          echo "$ISSUES" | jq -c '.[]' | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            TITLE=$(echo "$row" | jq -r '.title')
            UPDATED=$(echo "$row" | jq -r '.updatedAt')
            UPDATED_TS=$(date -u -d "$UPDATED" +%s)
            AGE=$(( NOW - UPDATED_TS ))

            if [ "$AGE" -ge "$STUCK_THRESHOLD_SECS" ]; then
              echo "Issue #$NUM ($TITLE) stuck for ${AGE}s — marking ai-blocked + ai-auto-retry"
              gh issue edit "$NUM" --repo "$REPO_FULL" \
                --remove-label "ai-in-progress" || true
              gh issue edit "$NUM" --repo "$REPO_FULL" \
                --add-label "ai-blocked" --add-label "ai-auto-retry" || true
              gh issue comment "$NUM" --repo "$REPO_FULL" \
                --body "⚠️ AI Factory watchdog: this issue has been \`ai-in-progress\` for over an hour without progress. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true
            fi
          done

      - name: Sub-tasks with ai-task but no PR, no progress
        run: |
          set -euo pipefail
          # A sub-task labeled `ai-task` but with NO `ai-in-progress`,
          # `ai-blocked`, or `ai-work` and NO PR referencing it is
          # considered an orphan worker result (e.g. worker claimed success
          # but produced nothing). Flag it.
          ISSUES=$(gh issue list --repo "$REPO_FULL" \
            --state open --label "ai-task" \
            --json number,title,labels --limit 100 \
            --search "is:issue")

          echo "$ISSUES" | jq -c '.[]' | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            TITLE=$(echo "$row" | jq -r '.title')
            LABELS=$(echo "$row" | jq -r '[.labels[].name] | join(",")')

            # Skip if already in progress / blocked / queued / done
            for SKIP in ai-in-progress ai-blocked ai-work; do
              if echo ",$LABELS," | grep -q ",$SKIP,"; then
                continue 2
              fi
            done

            # Look for a PR that closes this sub-task
            PR_COUNT=$(gh pr list --repo "$REPO_FULL" --state all \
              --search "head:ai/issue-${NUM}- OR \"Closes #${NUM}\" in:body" \
              --json number --jq 'length')

            if [ "${PR_COUNT:-0}" = "0" ]; then
              echo "Orphan sub-task #$NUM ($TITLE) has no PR and no active label — re-queuing with ai-auto-retry."
              gh issue edit "$NUM" --repo "$REPO_FULL" \
                --add-label "ai-blocked" --add-label "ai-auto-retry" || true
              gh issue comment "$NUM" --repo "$REPO_FULL" \
                --body "⚠️ AI Factory watchdog: this sub-task has \`ai-task\` but no PR, no \`ai-in-progress\`, and no \`ai-work\`. The worker likely reported success without actually creating a PR. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true
            fi
          done

      - name: Stalled ai-ready-for-review PRs
        run: |
          set -euo pipefail
          # PRs labelled `ai-ready-for-review` should trigger a pr-review run.
          # The label is added by address-feedback (or ai-worker) via explicit
          # workflow_dispatch — BUT if that dispatch silently failed (rate limit,
          # OIDC error, etc.), the label will just sit there forever.
          # This step detects those and re-dispatches after 20 minutes.
          # Max 5 re-dispatches per PR to prevent infinite loops.
          STALL_THRESHOLD_SECS=1200  # 20 minutes
          MAX_STALL_RETRIES=5

          PRS=$(gh pr list --repo "$REPO_FULL" --state open \
            --label "ai-ready-for-review" \
            --json number,title,labels --limit 50)

          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            NUM=$(echo "$pr" | jq -r '.number')
            TITLE=$(echo "$pr" | jq -r '.title')
            LABELS=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')

            # Skip blocked PRs — let the auto-retry step handle them.
            if echo ",$LABELS," | grep -q ",ai-blocked,"; then
              echo "PR #$NUM: has ai-blocked, skipping ai-ready-for-review check"
              continue
            fi

            # Find when ai-ready-for-review label was last added by looking at
            # pr-review runs triggered for this PR in the last 30 minutes.
            NOW=$(date -u +%s)
            RECENT_RUNS=$(gh api \
              "repos/$REPO_FULL/actions/workflows/ai-pr-review.yml/runs?per_page=10" \
              --jq ".workflow_runs[] |
                select(
                  .head_branch != null and
                  (.created_at | fromdateiso8601) > ($NOW - 1800)
                ) | .inputs // {} | .pr_number // \"\"" 2>/dev/null || echo "")

            # Check if there's a recent run for this PR number
            if echo "$RECENT_RUNS" | grep -qx "$NUM"; then
              echo "PR #$NUM: pr-review already dispatched recently — skipping"
              continue
            fi

            # No recent pr-review run. Check the label timeline to see if label
            # was added >20 minutes ago.
            LABEL_ADDED_AT=$(gh api "repos/$REPO_FULL/issues/$NUM/events" \
              --paginate \
              --jq '[.[] | select(.event == "labeled" and .label.name == "ai-ready-for-review")] | last | .created_at // empty' \
              2>/dev/null || echo "")

            if [ -z "$LABEL_ADDED_AT" ]; then
              echo "PR #$NUM: ai-ready-for-review label found but no timeline entry — dispatching review"
            else
              LABEL_TS=$(date -u -d "$LABEL_ADDED_AT" +%s 2>/dev/null || echo 0)
              AGE=$(( NOW - LABEL_TS ))
              if [ "$AGE" -lt "$STALL_THRESHOLD_SECS" ]; then
                echo "PR #$NUM: ai-ready-for-review added ${AGE}s ago — too soon (min ${STALL_THRESHOLD_SECS}s), skipping"
                continue
              fi
              echo "PR #$NUM: ai-ready-for-review stalled for ${AGE}s — dispatching pr-review"
            fi

            # Count watchdog re-dispatches for this PR by counting the
            # "stalled" comment markers we post below. If >= MAX_STALL_RETRIES,
            # escalate instead of dispatching again.
            STALL_RETRY_COUNT=$(gh api "repos/$REPO_FULL/issues/$NUM/comments" \
              --paginate \
              --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("🔁 Watchdog: re-dispatched pr-review")))]  | length' \
              2>/dev/null || echo "0")

            if [ "$STALL_RETRY_COUNT" -ge "$MAX_STALL_RETRIES" ]; then
              echo "PR #$NUM: hit MAX_STALL_RETRIES ($MAX_STALL_RETRIES) — escalating."
              gh pr edit "$NUM" --repo "$REPO_FULL" --remove-label "ai-ready-for-review" || true
              gh pr edit "$NUM" --repo "$REPO_FULL" --add-label "ai-blocked" || true
              gh pr comment "$NUM" --repo "$REPO_FULL" \
                --body "🚨 @$OWNER_HANDLE — pr-review has been stalled for this PR after $MAX_STALL_RETRIES watchdog re-dispatch attempts. Removed \`ai-ready-for-review\`, added \`ai-blocked\`. Please investigate." || true
              continue
            fi

            gh workflow run ai-pr-review.yml \
              --repo "$REPO_FULL" \
              --field pr_number="$NUM" \
              --field use_global_queue=true || true
            gh pr comment "$NUM" --repo "$REPO_FULL" \
              --body "🔁 Watchdog: re-dispatched pr-review (stall attempt $(( STALL_RETRY_COUNT + 1 )) of $MAX_STALL_RETRIES) — label has been sitting without a review run. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true
            echo "Dispatched pr-review for stalled PR #$NUM ($TITLE)"
          done

      - name: Open PRs with unaddressed reviewer feedback
        run: |
          set -euo pipefail
          # Find open PRs where the latest activity by claude[bot] is older
          # than the latest review/review-comment by a non-self reviewer.
          # That means feedback is sitting unaddressed.

          PRS=$(gh pr list --repo "$REPO_FULL" --state open \
            --json number,headRefName,labels,author --limit 50)

          echo "$PRS" | jq -c '.[]' | while read -r pr; do
            NUM=$(echo "$pr" | jq -r '.number')
            LABELS=$(echo "$pr" | jq -r '[.labels[].name] | join(",")')

            # Skip opt-outs
            if echo ",$LABELS," | grep -q ",no-address-feedback,"; then
              echo "PR #$NUM opted out of address-feedback — skipping."
              continue
            fi
            if echo ",$LABELS," | grep -q ",ai-blocked,"; then
              echo "PR #$NUM already ai-blocked — skipping."
              continue
            fi

            # Latest non-self reviewer activity (review submission or inline comment)
            # Includes copilot-pull-request-reviewer[bot] — we DO want to address
            # Copilot's inline comments. Excludes claude[bot] (the address-feedback
            # agent itself) and github-actions[bot] (workflow status noise).
            LATEST_REVIEWER_ACTIVITY=$(
              {
                gh api "repos/$REPO_FULL/pulls/$NUM/reviews" --paginate \
                  --jq '.[] | select(.user.login != "claude[bot]" and .user.login != "github-actions[bot]") | .submitted_at'
                gh api "repos/$REPO_FULL/pulls/$NUM/comments" --paginate \
                  --jq '.[] | select(.user.login != "claude[bot]" and .user.login != "github-actions[bot]") | .updated_at'
              } | sort -r | head -1
            )

            if [ -z "$LATEST_REVIEWER_ACTIVITY" ]; then
              echo "PR #$NUM has no reviewer activity — skipping."
              continue
            fi

            # Latest claude[bot] activity on the PR (commit, review, or comment)
            LATEST_BOT_ACTIVITY=$(
              {
                gh api "repos/$REPO_FULL/pulls/$NUM/commits" --paginate \
                  --jq '.[] | select(.commit.author.email | contains("claude") or contains("github-actions")) | .commit.committer.date'
                gh api "repos/$REPO_FULL/issues/$NUM/comments" --paginate \
                  --jq '.[] | select(.user.login == "claude[bot]" or .user.login == "github-actions[bot]") | .updated_at'
                gh api "repos/$REPO_FULL/pulls/$NUM/comments" --paginate \
                  --jq '.[] | select(.user.login == "claude[bot]" or .user.login == "github-actions[bot]") | .updated_at'
              } | sort -r | head -1
            )

            LATEST_BOT_TS=$(date -u -d "${LATEST_BOT_ACTIVITY:-1970-01-01}" +%s 2>/dev/null || echo 0)
            LATEST_REV_TS=$(date -u -d "$LATEST_REVIEWER_ACTIVITY" +%s 2>/dev/null || echo 0)

            # Only kick off if reviewer activity is newer AND at least 3 minutes
            # old (give Copilot/humans time to finish writing).
            NOW=$(date -u +%s)
            AGE=$(( NOW - LATEST_REV_TS ))

            if [ "$LATEST_REV_TS" -gt "$LATEST_BOT_TS" ] && [ "$AGE" -gt 180 ]; then
              echo "PR #$NUM has unaddressed feedback (reviewer=$LATEST_REVIEWER_ACTIVITY bot=$LATEST_BOT_ACTIVITY) — dispatching address workflow."
              gh workflow run ai-address-feedback.yml \
                --repo "$REPO_FULL" \
                --field pr_number="$NUM" \
                --field reason="watchdog: feedback unaddressed since $LATEST_REVIEWER_ACTIVITY" \
                --field use_global_queue=true || true
            else
              echo "PR #$NUM has no new unaddressed feedback."
            fi
          done

      - name: Auto-retry blocked PRs (address-feedback failures)
        run: |
          set -euo pipefail
          # PRs labelled ai-blocked + ai-auto-retry had a transient address-feedback
          # failure (rate limit, OIDC error, etc.). Re-dispatch after 90 minutes.
          # NOTE: We measure age from the LAST FAILURE COMMENT, not updatedAt —
          # updatedAt resets on any label change and would give a false "too soon".

          MAX_RETRIES=3
          MIN_WAIT_SECS=5400  # 90 minutes

          PRS=$(gh pr list --repo "$REPO_FULL" \
            --state open --label "ai-blocked,ai-auto-retry" \
            --json number,title,labels --limit 50)

          echo "$PRS" | jq -c '.[]' | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            TITLE=$(echo "$row" | jq -r '.title')
            LABELS=$(echo "$row" | jq -r '[.labels[].name] | join(",")')

            # Fetch failure comments and extract count + timestamp of last one.
            FAILURE_COMMENTS=$(gh api "repos/$REPO_FULL/issues/$NUM/comments" \
              --paginate \
              --jq '[.[] | select(
                (.user.login == "github-actions[bot]" or .user.login == "claude[bot]") and
                (.body | test("❌.*AI Address Feedback|❌.*AI Worker|⚠️.*AI (Worker|Planner)"))
              )]' 2>/dev/null || echo '[]')

            RETRY_COUNT=$(echo "$FAILURE_COMMENTS" | jq 'length')
            LAST_FAILURE_AT=$(echo "$FAILURE_COMMENTS" | jq -r 'last | .updated_at // empty')

            # Fall back to now-5400 if no failure comment found (label added manually)
            if [ -z "$LAST_FAILURE_AT" ]; then
              LAST_FAILURE_TS=$(( $(date -u +%s) - MIN_WAIT_SECS - 1 ))
            else
              LAST_FAILURE_TS=$(date -u -d "$LAST_FAILURE_AT" +%s)
            fi
            NOW=$(date -u +%s)
            AGE=$(( NOW - LAST_FAILURE_TS ))

            echo "PR #$NUM: retry_count=$RETRY_COUNT age_since_last_failure=${AGE}s last_failure=$LAST_FAILURE_AT"

            if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
              echo "PR #$NUM hit max retries — escalating to human."
              gh pr edit "$NUM" --repo "$REPO_FULL" --remove-label "ai-auto-retry" || true
              gh pr comment "$NUM" --repo "$REPO_FULL" \
                --body "🚨 @$OWNER_HANDLE — PR #$NUM address-feedback has failed $RETRY_COUNT times and will NOT be retried automatically. Please investigate." || true
              continue
            fi

            if [ "$AGE" -lt "$MIN_WAIT_SECS" ]; then
              echo "PR #$NUM last failure was ${AGE}s ago — too soon (min ${MIN_WAIT_SECS}s). Skipping."
              continue
            fi

            # Decide which workflow to retry: if the PR has ai-ready-for-review,
            # the failure was from pr-review (it adds that label in its failure
            # handler). Otherwise, assume it was address-feedback.
            if echo ",$LABELS," | grep -q ",ai-ready-for-review,"; then
              RETRY_WORKFLOW="ai-pr-review.yml"
              RETRY_LABEL_DESC="pr-review"
            else
              RETRY_WORKFLOW="ai-address-feedback.yml"
              RETRY_LABEL_DESC="address-feedback"
            fi

            echo "Retrying $RETRY_LABEL_DESC for PR #$NUM — attempt $(( RETRY_COUNT + 1 )) of $MAX_RETRIES"
            gh pr edit "$NUM" --repo "$REPO_FULL" \
              --remove-label "ai-blocked" --remove-label "ai-auto-retry" || true
            gh pr comment "$NUM" --repo "$REPO_FULL" \
              --body "🔄 Watchdog: auto-retrying $RETRY_LABEL_DESC (attempt $(( RETRY_COUNT + 1 )) of $MAX_RETRIES). See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true

            if [ "$RETRY_WORKFLOW" = "ai-pr-review.yml" ]; then
              gh workflow run ai-pr-review.yml \
                --repo "$REPO_FULL" \
                --field pr_number="$NUM" \
                --field use_global_queue=true || true
            else
              gh workflow run ai-address-feedback.yml \
                --repo "$REPO_FULL" \
                --field pr_number="$NUM" \
                --field reason="watchdog auto-retry after transient failure" \
                --field use_global_queue=true || true
            fi
            sleep 30
          done

      - name: Auto-retry transient failures
        run: |
          set -euo pipefail
          # Issues labelled ai-blocked + ai-auto-retry were blocked by an
          # infrastructure failure (rate limit, OIDC error, cancellation, timeout)
          # — NOT by a deliberate Claude decision. Retry them automatically.
          #
          # Rules:
          #   - Wait at least 90 minutes since the last failure comment before retrying
          #     (covers Anthropic rate-limit windows and transient network issues).
          #   - Allow up to 3 automatic retries per issue. After that, escalate to human.
          #   - Retry count = number of ❌ or ⚠️ failure comments posted by the worker.

          MAX_RETRIES=3
          MIN_WAIT_SECS=5400  # 90 minutes

          # Use search API with `is:issue` to explicitly exclude PRs.
          # `gh issue list` can return PRs because GitHub's API treats them as
          # issues internally — without this filter the step would add `ai-work`
          # to PRs, corrupting their state.
          ISSUES=$(gh issue list --repo "$REPO_FULL" \
            --state open --label "ai-blocked" \
            --json number,title,labels --limit 100 \
            --search "is:issue")

          echo "$ISSUES" | jq -c '.[]' | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            TITLE=$(echo "$row" | jq -r '.title')
            LABELS=$(echo "$row" | jq -r '[.labels[].name] | join(",")')

            # Only process issues that have ai-auto-retry
            if ! echo ",$LABELS," | grep -q ",ai-auto-retry,"; then
              continue
            fi

            # Count failure comments and get timestamp of last one.
            # Use last-failure-comment time (not updatedAt) so label changes
            # don't reset the clock and cause us to skip valid retries.
            FAILURE_COMMENTS=$(gh api "repos/$REPO_FULL/issues/$NUM/comments" \
              --paginate \
              --jq '[.[] | select(
                (.user.login == "github-actions[bot]" or .user.login == "claude[bot]") and
                (.body | test("❌|⚠️.*AI (Worker|Planner)"))
              )]' 2>/dev/null || echo '[]')

            RETRY_COUNT=$(echo "$FAILURE_COMMENTS" | jq 'length')
            LAST_FAILURE_AT=$(echo "$FAILURE_COMMENTS" | jq -r 'last | .updated_at // empty')

            # If no failure comment found (manually tagged), treat as already past threshold
            if [ -z "$LAST_FAILURE_AT" ]; then
              LAST_FAILURE_TS=$(( $(date -u +%s) - MIN_WAIT_SECS - 1 ))
            else
              LAST_FAILURE_TS=$(date -u -d "$LAST_FAILURE_AT" +%s)
            fi
            NOW=$(date -u +%s)
            AGE=$(( NOW - LAST_FAILURE_TS ))

            echo "Issue #$NUM: retry_count=$RETRY_COUNT age_since_last_failure=${AGE}s labels=$LABELS"

            if [ "$RETRY_COUNT" -ge "$MAX_RETRIES" ]; then
              # Exhausted retries — remove ai-auto-retry and ping human
              echo "Issue #$NUM has hit max retries ($MAX_RETRIES) — escalating to human."
              gh issue edit "$NUM" --repo "$REPO_FULL" \
                --remove-label "ai-auto-retry" || true
              gh issue comment "$NUM" --repo "$REPO_FULL" \
                --body "🚨 @$OWNER_HANDLE — AI Factory watchdog: issue #$NUM has failed $RETRY_COUNT times and will NOT be retried automatically. Please investigate and either fix the underlying problem or re-label with \`ai-work\` when ready." || true
              continue
            fi

            if [ "$AGE" -lt "$MIN_WAIT_SECS" ]; then
              echo "Issue #$NUM last failure was ${AGE}s ago — too soon to retry (min ${MIN_WAIT_SECS}s). Skipping."
              continue
            fi

            # Retry: cycle labels AND explicitly dispatch the worker.
            # GITHUB_TOKEN label changes do NOT fire webhook events (GitHub
            # loop-prevention), so adding `ai-work` alone would never trigger
            # ai-worker.yml. We must call `gh workflow run` explicitly.
            echo "Retrying issue #$NUM ($TITLE) — attempt $(( RETRY_COUNT + 1 )) of $MAX_RETRIES"
            gh issue edit "$NUM" --repo "$REPO_FULL" \
              --remove-label "ai-blocked" --remove-label "ai-auto-retry" || true
            gh issue comment "$NUM" --repo "$REPO_FULL" \
              --body "🔄 AI Factory watchdog: auto-retrying (attempt $(( RETRY_COUNT + 1 )) of $MAX_RETRIES) after transient failure. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." || true

            # Determine phase: sub-tasks (ai-task) → implement, parents → plan
            if echo ",$LABELS," | grep -q ",ai-task,"; then
              PHASE="implement"
            else
              PHASE="plan"
            fi
            gh workflow run ai-worker.yml \
              --repo "$REPO_FULL" \
              --field issue_number="$NUM" \
              --field phase="$PHASE" \
              --field use_global_queue=true || true
            echo "Dispatched ai-worker for issue #$NUM (phase=$PHASE)"
            sleep 30  # stagger to avoid hammering the rate limit
          done

      - name: no-pr-review PRs not yet handed off to human
        run: |
          set -euo pipefail
          # PRs with no-pr-review should end on ai-awaiting-owner after address-feedback.
          # If dispatch was cancelled, address failed repeatedly, or the run never completed,
          # re-dispatch periodically (throttled) so waiting is enough without manual clicks.
          PRS=$(gh pr list --repo "$REPO_FULL" --state open \
            --label "no-pr-review" \
            --json number,labels --limit 50)

          MAX_PER_RUN=4
          LEN=$(echo "$PRS" | jq 'length')
          if [ "$LEN" -eq 0 ]; then
            echo "No open PRs with label no-pr-review."
            exit 0
          fi
          if [ "$LEN" -gt "$MAX_PER_RUN" ]; then
            END=$MAX_PER_RUN
          else
            END=$LEN
          fi
          for i in $(seq 0 $(( END - 1 ))); do
            row=$(echo "$PRS" | jq -c ".[$i]")
            NUM=$(echo "$row" | jq -r '.number')
            LABELS=$(echo "$row" | jq -r '[.labels[].name] | join(",")')

            if echo ",$LABELS," | grep -q ",ai-awaiting-owner,"; then
              echo "PR #$NUM: already ai-awaiting-owner — OK"
              continue
            fi
            if echo ",$LABELS," | grep -q ",no-address-feedback,"; then
              echo "PR #$NUM: opted out of address-feedback — skip"
              continue
            fi

            # Throttle: skip if a bot "Addressing review feedback" comment appeared in the last 90 minutes
            LAST=$(gh api "repos/$REPO_FULL/issues/$NUM/comments" --paginate \
              --jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | test("Addressing review feedback")))] | last | .created_at // empty' 2>/dev/null || echo "")
            if [ -n "$LAST" ]; then
              LAST_TS=$(date -u -d "$LAST" +%s 2>/dev/null || echo 0)
              NOW=$(date -u +%s)
              AGE=$(( NOW - LAST_TS ))
              if [ "$AGE" -lt 5400 ]; then
                echo "PR #$NUM: address-feedback announced ${AGE}s ago — skip (cooldown 90m)"
                continue
              fi
            fi

            echo "PR #$NUM: dispatching address-feedback for handoff (no-pr-review, no ai-awaiting-owner yet)"
            gh workflow run ai-address-feedback.yml \
              --repo "$REPO_FULL" \
              --field pr_number="$NUM" \
              --field reason="watchdog: complete no-pr-review handoff to ai-awaiting-owner" \
              --field use_global_queue=true || true
            sleep 25
          done

      - name: Bot-triggered runs gated as `action_required`
        run: |
          set -euo pipefail
          # When Copilot (or any bot) triggers a workflow, GitHub may gate
          # it behind `action_required`. The watchdog detects these and
          # surfaces them to the owner (we cannot auto-approve via the API
          # without a PAT, but we can at least not let them rot silently).
          RUNS=$(gh api "repos/$REPO_FULL/actions/runs?status=action_required&per_page=20" \
            --jq '.workflow_runs[] | {id, name, event, actor: .actor.login, created_at, html_url}')

          if [ -z "$RUNS" ]; then
            echo "No action_required runs."
            exit 0
          fi

          echo "$RUNS" | jq -c '.' | while read -r run; do
            ID=$(echo "$run" | jq -r '.id')
            NAME=$(echo "$run" | jq -r '.name')
            ACTOR=$(echo "$run" | jq -r '.actor')
            URL=$(echo "$run" | jq -r '.html_url')
            CREATED=$(echo "$run" | jq -r '.created_at')
            echo "action_required: $NAME id=$ID actor=$ACTOR url=$URL created=$CREATED"

            # Try to approve (will no-op if the token lacks permission).
            gh api "repos/$REPO_FULL/actions/runs/$ID/approve" --method POST 2>/dev/null \
              && echo "Approved run $ID" \
              || echo "Could not auto-approve run $ID (needs a PAT or human click)."
          done
