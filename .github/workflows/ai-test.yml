name: AI Factory Test
on:
  workflow_dispatch:
    inputs:
      test_prompt:
        description: 'Test prompt for Claude'
        required: false
        default: 'List the top 3 most important files in this repository and explain why.'

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropic/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ github.event.inputs.test_prompt }}
          claude_args: "--max-turns 5"
