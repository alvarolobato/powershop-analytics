name: AI Worker
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resume work on"
        required: true
        type: number
      phase:
        description: "Phase to run: plan or implement"
        required: true
        type: choice
        options:
          - plan
          - implement

# Concurrency is set per-job (not workflow-level) so that `labeled` events
# for unrelated labels (e.g. triage applying `p1-high`, `comp-dashboard`)
# don't grab the slot and cancel a running ai-work job. With job-level
# concurrency, jobs whose `if:` evaluates false are SKIPPED and don't enter
# the concurrency group — so only an actual ai-work plan/implement run can
# cancel a prior in-progress run of the same kind on the same issue.
#
# When a real new run fires (manual workflow_dispatch, watchdog retry, or
# a fresh `ai-work` re-add), it cancels the prior run for the same issue —
# that's the desired behaviour: the latest intent wins, no duplicate work.

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read
  # Do NOT add `workflows: write` — it is not a valid GITHUB_TOKEN permission
  # scope and registering it puts this whole file into startup-failure (every
  # `issues: labeled` event was silently dropped from 2026-05-10 13:55 UTC to
  # 2026-05-11 11:00 UTC because of exactly this mistake — see D-029).
  # The worker must NOT push files under `.github/workflows/`; see AGENTS.md
  # "No worker writes to .github/workflows/" for the policy and workarounds.

jobs:
  # ─────────────────────────────────────────────────────────────────
  # PHASE 1 — PLAN
  # Triggered when ai-work is applied to an issue that is NOT already
  # a sub-task (sub-tasks carry the "ai-task" label).
  # Produces: detailed plan comment + sub-issues (each labeled ai-work)
  # ─────────────────────────────────────────────────────────────────
  plan:
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'ai-work' &&
        !contains(github.event.issue.labels.*.name, 'ai-task')
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.phase == 'plan'
      )
    concurrency:
      group: ai-worker-plan-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Update labels — planning started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-work" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-in-progress" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "🔍 AI Worker — planning phase started. Analyzing the issue and codebase. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Plan and decompose
        id: plan
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--permission-mode bypassPermissions --max-turns 80"
          prompt: |
            You are the AI Planner. Your job is to deeply analyse issue #${{ env.ISSUE_NUMBER }},
            produce a comprehensive implementation plan, and break it into actionable sub-tasks.

            ## Step 1 — Understand the request
            Read the issue title, body, and ALL comments carefully.
            Read CLAUDE.md and AGENTS.md for project context.
            Read relevant skill docs in docs/skills/ for the affected domain.
            Explore the codebase to understand the current state.

            ## Step 2 — Write a comprehensive plan comment
            Post a comment on issue #${{ env.ISSUE_NUMBER }} with this structure:

            ---
            ## 🗺️ Implementation Plan

            ### Analysis
            [What is being asked, why it matters, what the current state of the codebase is.
            Reference specific files and line numbers you examined.]

            ### Architecture decisions
            [Key decisions made: data model, API design, component structure, etc. Explain WHY.]

            ### Sub-tasks
            List every discrete unit of work as a numbered task. Each task must be:
            - Independently implementable (own branch + PR)
            - Small enough to complete in a single focused session
            - Clearly scoped (specific files, specific behaviour)
            - **A genuinely independent code change** — see "What is NOT a sub-task" below.

            | # | Title | Files | Acceptance |
            |---|-------|-------|------------|
            | 1 | ... | ... | ... |
            | 2 | ... | ... | ... |

            ### What is NOT a sub-task — DO NOT create sub-issues for these
            The AGENTS.md issue template lists lifecycle steps (`Run all checks`,
            `Copilot review`, `Opus review`, `Create commit`) as numbered tasks
            inside ONE feature's lifecycle — they are **not** independent code
            changes and **must never** become separate `ai-task` sub-issues.
            Creating one `ai-task` per lifecycle step produces N parallel PRs
            that all implement the same feature (this happened with #481 →
            #482..#487 → PRs #490, #491, #494, #496).

            Specifically, do NOT create a sub-issue for any of these:
            - "Run checks / fix lint / fix tests" — the feature sub-task already
              owns this. The implementer runs checks before pushing.
            - "Copilot review" — the worker requests Copilot automatically once
              the feature PR exists (`Handle success` step in `ai-worker.yml`).
            - "Opus review" — handled by `ai-pr-review.yml` on the feature PR.
            - "Create commit / merge" — the implementer commits as part of the
              feature sub-task; merge is a human decision.

            Only create sub-issues for **distinct code changes** that touch
            different files / different concerns and could legitimately be
            reviewed and merged independently. If the parent issue produces
            only one logical change, output **one** sub-issue, not five.

            ### Dependency order
            [Which tasks must be done before others, and why]

            ### Testing strategy
            [How each task will be verified — unit tests, integration tests, manual checks]

            ### Risks
            [What could go wrong, edge cases, things to watch out for]
            ---

            ## Step 3 — Create sub-issues
            For EACH task in the table above, create a GitHub sub-issue.
            IMPORTANT: create the issue WITHOUT labels first, then add labels
            in a separate command — this is required for GitHub to fire the
            `labeled` event that triggers the implementation workflow.

            ### Body integrity rules — MUST follow

            Issue bodies have repeatedly been corrupted by stripping JSX
            components and TypeScript generics inside backticks (e.g. `` `<Foo />` ``
            and `` `Promise<void>` `` arrived as empty `` `` `` and `` `Promise` ``).
            Two known causes: (1) the shell interpreting `<Component>` as
            I/O redirection when bodies are passed inline; (2) the LLM
            eliding repetitive technical fragments mid-generation.

            To prevent both:

            1. **Always write the body to a temp file first**, then use
               `gh issue create --body-file <path>`. Never use `--body
               "$(cat <<…)"` or any inline construction — those can be
               re-parsed by the shell or your own quoting layer.
            2. **Write JSX, HTML tags, and TypeScript generics literally**
               inside backticks. Do not abbreviate. `` `<DateRangePicker />` ``
               must stay as `` `<DateRangePicker />` ``, not `` `` ``.
               `` `Promise<void>` `` must stay as `` `Promise<void>` ``,
               not `` `Promise` ``.
            3. **After each `gh issue create`, immediately re-read the
               issue body** with `gh issue view <NUM> --json body --jq .body`
               and verify it does not contain `` `` `` (two adjacent backticks
               with nothing between). If it does, the body was mangled —
               delete the issue and re-create it.

            ### Template

            ```bash
            # 1. Write body to a temp file (quoted heredoc — no shell expansion).
            TMP_BODY=$(mktemp --suffix=.md)
            cat > "$TMP_BODY" <<'BODY'
            ## Parent issue
            Closes #${{ env.ISSUE_NUMBER }}

            ## Task
            TASK_DESCRIPTION

            ## Files to change
            - list of files

            ## Acceptance criteria
            - list of checks

            ## Context
            See parent issue #${{ env.ISSUE_NUMBER }} for full plan.
            BODY

            # 2. Create the issue from the file (no inline shell parsing).
            SUB_ISSUE=$(gh issue create \
              --title "PARENT_TITLE — Task N: TASK_TITLE" \
              --body-file "$TMP_BODY" | grep -o '[0-9]*$')
            rm -f "$TMP_BODY"

            # 3. Verify the body is intact — fail loudly if anything was mangled.
            # Detect EMPTY inline code spans (`` `` ``) that signal stripped
            # JSX/generics. Use PCRE lookaround to exclude triple-backtick
            # fenced code blocks (` ``` `), which would otherwise match any
            # ```sql/```bash/```json fence opener and false-positive every
            # body that uses code blocks.
            if gh issue view "$SUB_ISSUE" --json body --jq .body | grep -qP '(?<!`)``(?!`)'; then
              echo "::error::Sub-issue #$SUB_ISSUE body contains empty inline code spans (\`\`) — likely JSX/generics were stripped. Investigate before continuing."
              gh issue edit "$SUB_ISSUE" --add-label "ai-needs-rewrite" || true
              exit 1
            fi

            # 4. Add labels separately so the labeled event fires reliably.
            gh issue edit $SUB_ISSUE --add-label "ai-task"
            gh issue edit $SUB_ISSUE --add-label "ai-work"
            ```

            After creating each sub-issue, add it to the parent issue's body as a task
            checkbox so progress is visible:
            ```bash
            # Append to the parent issue body:
            # - [ ] Task N: TITLE (#SUB_ISSUE_NUMBER)
            ```

            ## Step 4 — Finalize parent issue
            - Update the parent issue body to include the full task checklist with sub-issue links
            - Remove label "ai-in-progress"
            - Add label "ai-planned"
            - Post a final comment listing all created sub-issues

            ## Step 5 — If you cannot complete the plan
            If the issue is too vague, missing critical info, or blocked by something you cannot
            resolve: DO NOT silently stop. Instead:
            1. Post a comment tagging @alvarolobato explaining precisely what is blocking you
               and what information you need.
            2. Remove `ai-in-progress` and add `ai-blocked`.
            3. Exit normally (so the workflow does not mark itself "failed").

            ## Rules
            - Create sub-issues in dependency order
            - Each sub-issue must have both "ai-task" AND "ai-work" labels so the
              implementation phase triggers automatically
            - Do NOT start implementing — only plan and decompose

      - name: Verify plan output
        id: verify_plan
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # A successful plan should either: (a) have created sub-issues and
          # added `ai-planned`, (b) added `ai-blocked` (planner gave up cleanly).
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
          echo "Labels after plan: $LABELS"
          if echo ",$LABELS," | grep -q ",ai-planned,"; then
            echo "status=planned" >> "$GITHUB_OUTPUT"
          elif echo ",$LABELS," | grep -q ",ai-blocked,"; then
            echo "status=blocked" >> "$GITHUB_OUTPUT"
          else
            echo "status=incomplete" >> "$GITHUB_OUTPUT"
          fi

      - name: Self-heal sub-issue labels
        if: always() && steps.verify_plan.outputs.status == 'planned'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Defense-in-depth: ensure every sub-issue carries BOTH `ai-task` AND
          # `ai-work`. The planner agent has been observed (e.g. on issue #502)
          # to add `ai-task` but skip `ai-work`, leaving sub-issues stalled
          # forever — the implement phase only triggers when `ai-work` is
          # applied. This step audits every sub-issue and adds whichever
          # required label is missing.
          SUB_ISSUES=$(gh issue list --repo "${{ github.repository }}" \
            --state open --limit 50 \
            --search "Closes #${ISSUE_NUMBER} in:body" \
            --json number,labels)

          echo "$SUB_ISSUES" | jq -c '.[]' | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            LABELS=$(echo "$row" | jq -r '[.labels[].name] | join(",")')
            if ! echo ",$LABELS," | grep -q ",ai-task,"; then
              echo "Sub-issue #$NUM missing 'ai-task' — adding."
              gh issue edit "$NUM" --add-label "ai-task" || true
            fi
            if ! echo ",$LABELS," | grep -q ",ai-work,"; then
              echo "Sub-issue #$NUM missing 'ai-work' — planner forgot; adding to trigger implementation."
              gh issue edit "$NUM" --add-label "ai-work" || true
            fi
          done

      - name: Detect mangled sub-issue bodies
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Defense-in-depth: even when the planner follows the per-issue
          # verify step, Claude may forget. Scan all open sub-issues that
          # reference this parent ("Closes #N") for empty inline code spans
          # — the signature of stripped JSX/generics. Flag them with
          # `ai-needs-rewrite` so a human (or a follow-up worker) can repair
          # the body before the implementation phase tries to act on it.
          #
          # The detection regex uses Oniguruma lookaround `(?<!`)``(?!`)`
          # to match exactly two adjacent backticks NOT inside a triple-
          # backtick fence. Without the lookaround, every fenced code
          # block opener (```sql, ```bash, ```json, …) false-positives
          # the check — observed on issue #536 (2026-05-09) which had a
          # perfectly intact body but ```sql/``` fences and got falsely
          # flagged + locked behind ai-needs-rewrite.
          SUB_ISSUES=$(gh issue list --repo "${{ github.repository }}" \
            --state open --limit 50 \
            --search "Closes #${ISSUE_NUMBER} in:body" \
            --json number,body --jq '.[]' || true)

          echo "$SUB_ISSUES" | jq -c 'select(.body | test("(?<!`)``(?!`)"))' 2>/dev/null | while read -r row; do
            NUM=$(echo "$row" | jq -r '.number')
            echo "Sub-issue #$NUM body contains empty backticks — flagging."
            gh issue edit "$NUM" --add-label "ai-needs-rewrite" || true
            gh issue comment "$NUM" --body "⚠️ AI Worker: this sub-issue body contains empty inline code spans (\`\`) — likely JSX components or TypeScript generics were stripped during creation. The implementation phase will not run on it until the body is repaired and \`ai-needs-rewrite\` is removed." || true
          done

      - name: Flag incomplete plan
        if: always() && steps.verify_plan.outputs.status == 'incomplete'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Planner finished but did not produce a plan. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Handle plan failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "${{ github.repository }}" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ AI Planner failed. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Ensure ai-in-progress is cleared on cancel
        if: cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Planner was cancelled. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

  # ─────────────────────────────────────────────────────────────────
  # PHASE 2 — IMPLEMENT
  # Triggered when ai-work is applied to a sub-task issue (ai-task label).
  # Produces: branch + PR implementing exactly this sub-task.
  # ─────────────────────────────────────────────────────────────────
  implement:
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'ai-work' &&
        contains(github.event.issue.labels.*.name, 'ai-task')
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.phase == 'implement'
      )
    concurrency:
      group: ai-worker-implement-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Update labels — implementation started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-work" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-in-progress" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 AI Worker — implementation started. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Implement sub-task
        id: implement
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--permission-mode bypassPermissions --max-turns 120"
          allowed_bots: "claude[bot],github-actions[bot]"
          prompt: |
            You are the AI Worker. Implement exactly what sub-task issue #${{ env.ISSUE_NUMBER }} describes — nothing more.

            ## Process
            1. Read sub-task issue #${{ env.ISSUE_NUMBER }}: title, body, acceptance criteria
            2. Read the PARENT issue (linked in the body) — **including ALL its comments**.
               The planner posts the implementation plan (analysis, architecture decisions,
               dependency order, "what is NOT a sub-task" rules) as a COMMENT, not in the
               body. Reading just the body misses everything that matters for context.
               Use this to fetch body + every comment in one shot:
               ```
               PARENT=$(gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq .body \
                 | grep -oE 'Closes #[0-9]+' | head -1 | tr -d '#A-Za-z ')
               if [ -n "$PARENT" ]; then
                 gh issue view "$PARENT" --json title,body,comments \
                   --jq '"# \(.title)\n\n\(.body)\n\n---\n\n" + (.comments | map("## Comment by \(.author.login) at \(.createdAt)\n\n\(.body)") | join("\n\n---\n\n"))'
               fi
               ```
               Read every comment top to bottom — the architecture rationale, dependency
               graph, and design discussions live there.
            3. Read CLAUDE.md and AGENTS.md
            4. Read relevant skill docs in docs/skills/ for the affected domain
            5. Before starting, run the **sibling-PR pre-flight check** — this is
               critical to prevent the duplicate-PR fan-out (#481 → 4 PRs problem).
               a. Check for a PR already opened against THIS sub-issue:
                  ```
                  gh pr list --state all --search "head:ai/issue-${{ env.ISSUE_NUMBER }}-"
                  gh pr list --state all --search "Closes #${{ env.ISSUE_NUMBER }} in:body"
                  ```
               b. **Also** look at SIBLING sub-issues of the same parent. The planner
                  may have created multiple sub-issues whose work overlaps. Find the
                  parent from the issue body (line `Closes #PARENT`) and list all
                  open PRs that close any sibling:
                  ```
                  PARENT=$(gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq .body \
                    | grep -oE 'Closes #[0-9]+' | head -1 | tr -d '#A-Za-z ')
                  if [ -n "$PARENT" ]; then
                    SIBLINGS=$(gh issue list --state open --search "Closes #${PARENT} in:body" \
                      --json number --jq '.[].number')
                    for SIB in $SIBLINGS; do
                      gh pr list --state all --search "Closes #${SIB} in:body" \
                        --json number,title,state,headRefName,body
                    done
                  fi
                  ```
               c. If ANY existing PR already implements the same change (same files,
                  same intent), do NOT open a duplicate. Instead:
                  - Comment on this issue explaining which PR (#NNN) already covers it
                    and listing the sibling sub-issues that map to the same lifecycle.
                  - Close this issue with `gh issue close ${{ env.ISSUE_NUMBER }} --reason "not planned"`.
                  - Exit normally (don't push an empty branch, don't create a PR).
               d. Lifecycle-style sub-issues — anything titled "Run all checks", "Copilot
                  review", "Opus review", or "Create commit" — should ALWAYS be closed
                  here without a PR: those are steps inside the feature PR's lifecycle,
                  not independent code changes. See the planner section in this same
                  workflow for context on why these no longer get sub-issues.
            6. Create branch: `ai/issue-${{ env.ISSUE_NUMBER }}-{short-slug}`
            7. Implement the changes:
               - Follow existing code style and patterns
               - Don't add unnecessary abstractions
               - Don't over-engineer — do exactly what's asked
               - Include tests for new functionality
            8. Run validation:
               - ETL changes: `cd etl && python -m ruff check . && python -m pytest`
               - Dashboard changes: `cd dashboard && npm test`
               - Fix any failures before committing
            9. Commit: `feat|fix|docs: description (closes #${{ env.ISSUE_NUMBER }})`
            10. Push the branch with `git push -u origin BRANCH`
            11. Create a PR:
                - Title references this sub-task
                - Body: ## Summary, ## Changes, ## Test Results
                - Include `Closes #${{ env.ISSUE_NUMBER }}` in the body
                - Verify the PR was created by running `gh pr view` on the branch.

            ## If you cannot finish
            NEVER silently stop. If something is blocking you:
            1. Push whatever partial progress you have to the branch.
            2. Post a comment on issue #${{ env.ISSUE_NUMBER }} tagging @alvarolobato with
               a precise description of what is blocking you (unclear spec, missing access,
               failing test you cannot diagnose, etc.).
            3. Exit normally — the workflow will verify a PR was created and mark the
               issue `ai-blocked` automatically if not.

            ## Rules
            - Read-only SQL: NEVER INSERT/UPDATE/DELETE/DROP in production queries
            - No credentials in code
            - No customer data in code
            - 4D PKs are NUMERIC, never FLOAT8
            - For wide tables, specify columns explicitly
            - Scope strictly to this sub-task — do not implement other tasks
            - NEVER use --no-verify or bypass pre-commit hooks
            - NEVER force-push

      # Verify a PR was actually created for this issue. The `Handle success`
      # step used to fire on step completion alone — but Claude can exit
      # successfully without having created a branch or PR (e.g. if it
      # decided work was already covered but didn't close the issue).
      - name: Verify PR was created
        id: verify
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Look for a PR whose head branch follows ai/issue-<N>-... OR whose
          # body contains "Closes #<N>".
          PR_BY_BRANCH=$(gh pr list --state all --search "head:ai/issue-${ISSUE_NUMBER}-" \
            --json number,state --jq '.[0].number // empty')
          PR_BY_BODY=$(gh pr list --state all --search "Closes #${ISSUE_NUMBER} in:body" \
            --json number,state --jq '.[0].number // empty')
          PR_NUMBER="${PR_BY_BRANCH:-$PR_BY_BODY}"

          # Also check if the issue was closed by the worker (deliberate no-op).
          ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --json state --jq '.state')

          if [ -n "$PR_NUMBER" ]; then
            echo "outcome=pr_created" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "Found PR #$PR_NUMBER for issue #$ISSUE_NUMBER"
          elif [ "$ISSUE_STATE" = "CLOSED" ]; then
            echo "outcome=issue_closed" >> "$GITHUB_OUTPUT"
            echo "Issue #$ISSUE_NUMBER was closed by the worker (deliberate no-op)."
          else
            echo "outcome=no_pr" >> "$GITHUB_OUTPUT"
            echo "No PR and issue still open — implementation did not complete."
          fi

      - name: Handle success (PR created)
        if: always() && steps.verify.outputs.outcome == 'pr_created'
        env:
          GH_TOKEN: ${{ github.token }}
          # GITHUB_TOKEN cannot assign copilot-pull-request-reviewer[bot] — the
          # API returns 200 with an empty requested_reviewers array. Use a PAT
          # (stored as COPILOT_PAT secret) for the Copilot POST only; fall back
          # to GITHUB_TOKEN so the rest of the flow still works without a PAT.
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT || github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          PR_NUM="${{ steps.verify.outputs.pr_number }}"
          REPO_NAME="${{ github.repository }}"

          # D-021 idempotency guard. The verify step matches PR-by-branch and
          # PR-by-body, so this success path also fires when a worker re-runs
          # on a sub-task that already has a PR (e.g. the planner re-added
          # `ai-work`, the worker re-fired, it found the existing PR via the
          # verify search). Without this guard we'd re-add `ai-phase-copilot`
          # and re-POST `requested_reviewers`, producing a SECOND Copilot
          # review on the same PR — directly violating the "1 Copilot + 1
          # Opus, no more" policy. Symptom in production: 2026-05-09 burst
          # of duplicate Copilot reviews on PRs #512–#516.
          PR_LABELS=$(gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | join(",")' || echo "")
          for marker in "ai-phase-copilot" "ai-phase-opus" "ai-cp-after-1" "ai-o-after-1"; do
            if echo ",$PR_LABELS," | grep -q ",$marker,"; then
              echo "PR #$PR_NUM already has '$marker' — review cycle already in progress or done. Not re-requesting Copilot."
              gh issue comment "$ISSUE_NUMBER" \
                --body "♻️ AI Worker re-ran and found existing PR #$PR_NUM with review-cycle label \`$marker\`. Not re-requesting Copilot (D-021: 1 Copilot + 1 Opus, no more)." || true
              exit 0
            fi
          done

          # Existing Copilot review on file (e.g. label was wiped manually but
          # Copilot already weighed in)? Don't request again.
          # `gh api --paginate --jq 'length'` emits one count per page; if the
          # reviews list crosses a pagination boundary the result becomes
          # multi-line (e.g. "2\n0") and the numeric `-gt` below errors. Stream
          # the matching review IDs instead and count lines — always a single
          # int. Same pattern as ai-address-feedback.yml's WORKFLOW_CHANGES.
          COPILOT_REVIEWS=$(gh api "repos/$REPO_NAME/pulls/$PR_NUM/reviews" --paginate \
            --jq '.[] | select(.user.login == "Copilot" or .user.login == "copilot-pull-request-reviewer" or .user.login == "copilot-pull-request-reviewer[bot]") | .id' 2>/dev/null \
            | wc -l | tr -d ' ' || echo "0")
          if [ "${COPILOT_REVIEWS:-0}" -gt 0 ]; then
            echo "PR #$PR_NUM already has $COPILOT_REVIEWS Copilot review(s) — not re-requesting."
            gh issue comment "$ISSUE_NUMBER" \
              --body "♻️ AI Worker re-ran and found existing PR #$PR_NUM with $COPILOT_REVIEWS Copilot review(s) on file. Not re-requesting Copilot (D-021: 1 Copilot + 1 Opus, no more)." || true
            exit 0
          fi

          # Fresh PR — kick off the review cycle.
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ AI Worker completed. See PR #$PR_NUM."
          # Automated review: Copilot first (cheaper), then Opus. One pass each.
          # Do not dispatch Opus immediately — avoids rate limits and reduces token spend.

          # Self-heal: phase labels must exist in the repo for the state machine to advance.
          gh label create "ai-phase-copilot" --color "0052cc" --description "AI Factory: Copilot review in progress" 2>/dev/null || true
          gh label create "ai-phase-opus" --color "6f42c1" --description "AI Factory: Opus review in progress" 2>/dev/null || true

          # REST API for label adds — see #611 (gh pr edit exits non-zero on projectCards deprecation).
          gh api -X POST "repos/$REPO_NAME/issues/$PR_NUM/labels" -f "labels[]=ai-phase-copilot" >/dev/null

          # Request Copilot with the PAT-capable token and verify the request
          # actually landed. If COPILOT_PAT is unset the fallback GITHUB_TOKEN
          # fails silently — we still emit the warning so the owner is paged.
          POST_OUT=$(GH_TOKEN="$COPILOT_TOKEN" gh api "repos/$REPO_NAME/pulls/$PR_NUM/requested_reviewers" \
            --method POST -f 'reviewers[]=copilot-pull-request-reviewer[bot]' 2>&1 || true)
          COPILOT_ADDED=$(printf '%s' "$POST_OUT" \
            | jq -r '[.requested_reviewers[]?.login] | map(select(. == "Copilot" or . == "copilot-pull-request-reviewer")) | length' 2>/dev/null || echo "0")

          if [ "${COPILOT_ADDED:-0}" -gt 0 ]; then
            gh pr comment "$PR_NUM" \
              --body "🤖 **AI Factory**: Automated review starts with **Copilot**, then **Opus** (one pass each). Labels: \`ai-phase-copilot\` → \`ai-phase-opus\`." || true
          else
            # Silent failure — don't advertise a review cycle that didn't start.
            gh api -X POST "repos/$REPO_NAME/issues/$PR_NUM/labels" -f "labels[]=ai-blocked" >/dev/null
            gh pr comment "$PR_NUM" \
              --body "⚠️ **AI Factory**: Requested Copilot review but the API returned no reviewer. This happens when \`secrets.COPILOT_PAT\` is missing (GITHUB_TOKEN cannot assign Copilot) or the PAT lacks \`pull_requests: write\`. **Copilot review has NOT started.** cc @alvarolobato — set \`COPILOT_PAT\` (fine-grained PAT, Pull requests: Read and write) or request the review manually." || true
            echo "::warning::Copilot reviewer request silently failed on PR #$PR_NUM"
          fi

      - name: Handle success (issue closed deliberately)
        if: always() && steps.verify.outputs.outcome == 'issue_closed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Nothing to do — issue already closed."

      - name: Push partial work on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Re-establish GITHUB_TOKEN-based auth on the remote URL — the
          # claude-code-action that ran above can leave the credential
          # helper in a state where the default checkout auth no longer
          # applies (see ai-pr-mergeability.yml `Push rebased branch` for
          # the same fix).
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}" || true
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "master" ] && [ -n "$BRANCH" ]; then
            git push origin "$BRANCH" || true
            echo "Pushed partial branch: $BRANCH"
          else
            AI_BRANCH=$(git branch | grep 'ai/' | head -1 | xargs)
            if [ -n "$AI_BRANCH" ]; then
              git checkout "$AI_BRANCH" && git push origin "$AI_BRANCH" || true
              echo "Pushed partial branch: $AI_BRANCH"
            fi
          fi

      - name: Block on missing PR
        if: always() && steps.verify.outputs.outcome == 'no_pr'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Worker finished but did NOT create a PR. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. This usually means the agent hit its turn limit or failed to push the branch. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(git branch --show-current)
          BRANCH_NOTE=""
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "master" ] && [ -n "$BRANCH" ]; then
            BRANCH_NOTE=" Partial work pushed to branch \`${BRANCH}\`."
          fi
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "${{ github.repository }}" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ AI Worker failed.${BRANCH_NOTE} Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Ensure ai-in-progress is cleared on cancel
        if: cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Worker was cancelled. Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
