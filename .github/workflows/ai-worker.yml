name: AI Worker
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to resume work on"
        required: true
        type: number
      phase:
        description: "Phase to run: plan or implement"
        required: true
        type: choice
        options:
          - plan
          - implement

# Concurrency is set per-job (not workflow-level) so that `labeled` events
# for unrelated labels (e.g. triage applying `p1-high`, `comp-dashboard`)
# don't grab the slot and cancel a running ai-work job. With job-level
# concurrency, jobs whose `if:` evaluates false are SKIPPED and don't enter
# the concurrency group — so only an actual ai-work plan/implement run can
# cancel a prior in-progress run of the same kind on the same issue.
#
# When a real new run fires (manual workflow_dispatch, watchdog retry, or
# a fresh `ai-work` re-add), it cancels the prior run for the same issue —
# that's the desired behaviour: the latest intent wins, no duplicate work.

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  actions: read
  # Do NOT add `workflows: write` — it is not a valid GITHUB_TOKEN permission
  # scope and registering it puts this whole file into startup-failure (every
  # `issues: labeled` event was silently dropped from 2026-05-10 13:55 UTC to
  # 2026-05-11 11:00 UTC because of exactly this mistake — see D-029).
  # The worker must NOT push files under `.github/workflows/`; see AGENTS.md
  # "No worker writes to .github/workflows/" for the policy and workarounds.

jobs:
  # ─────────────────────────────────────────────────────────────────
  # PHASE 1 — PLAN
  # Triggered when ai-work is applied to an issue that is NOT already
  # a sub-task (sub-tasks carry the "fact-task" label).
  # Produces: detailed plan comment + sub-issues (each labeled ai-work)
  # ─────────────────────────────────────────────────────────────────
  plan:
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'ai-work' &&
        !contains(github.event.issue.labels.*.name, 'fact-task') &&
        !contains(github.event.issue.labels.*.name, 'fact-planned')
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.phase == 'plan'
      )
    concurrency:
      group: ai-worker-plan-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Update labels — planning started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-work" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "fact-in-progress" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "🔍 AI Worker — planning phase started. Analyzing the issue and codebase. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/worker-plan.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Plan and decompose
        id: plan
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          prompt: |
            You are the AI Planner (D-034 single-track model). Your job is to analyse
            issue #${{ env.ISSUE_NUMBER }} and **edit its body in place** — adding
            `## Phase N — name` headings with `### Tasks` checklists — so the
            implementer can walk the checklist sequentially with one PR per phase.
            Do NOT create sub-issues unless the issue carries `ai-decompose`.

            ## Step 1 — Understand the request
            Read the issue title, body, and ALL comments carefully.
            Read CLAUDE.md (role: planner) and AGENTS.md for project context.
            Read `docs/issue-format.md` for the phase template and rules.
            Explore the codebase to understand the current state.

            ## Step 2 — Decide: phases or single phase?
            Split into multiple phases ONLY when:
            - Estimated single PR would exceed ~2000 LOC, OR
            - Producer/consumer dependency requires merge of A before B
              (data layer → API route → UI component), OR
            - Two task groups touch DDL on the same table or critical shared file.
            Otherwise: one phase, one PR.

            ## Step 3 — Rewrite the issue body in place
            Edit issue #${{ env.ISSUE_NUMBER }} body using `gh issue edit --body-file`.
            Preserve the original Context block. Replace or add the Plan + phases.

            Format (use this exactly):

            ```
            [original Context block — keep as-is]

            ## Plan
            [2-3 sentence narrative of the approach. If multi-phase: include a
            dependency table: Phase | Tasks | Why this order]

            ## Phase 1 — <name>

            **Goal**: <one sentence>
            **Branch**: `ai/issue-${{ env.ISSUE_NUMBER }}-p1`
            **Depends on**: nothing

            ### Tasks

            - [ ] 1) <task title> (owner: agent)
              - **Change**: <precise what to do>
              - **Files**: <exact paths>
              - **Acceptance**: <how to verify — user-observable behaviour, not "test passes">

            - [ ] 2) ...

            - [ ] N) Run all checks, fix failures, open PR
              - **Change**: Run tests + lint; push; `gh pr create`
              - **Acceptance**: CI green; PR description references issue

            ## Phase 2 — <name>   [only if needed]

            **Depends on**: Phase 1 merged
            ...
            ```

            ## Step 4 — Post analysis comment
            Post a short comment (≤10 lines) on issue #${{ env.ISSUE_NUMBER }} with:
            - What you found in the codebase
            - Why you chose this phase structure (or why single phase)
            - Any risks or constraints flagged

            ## Step 5 — Set labels and stop
            ```bash
            gh issue edit ${{ env.ISSUE_NUMBER }} \
              --remove-label "fact-in-progress" \
              --add-label "fact-planned" \
              --add-label "ai-awaiting-owner"
            ```
            Do NOT add `ai-work`. The owner reviews the rewritten body and
            adds `ai-work` themselves when ready to start implementation.

            ## Step 6 — If ai-decompose is present (escape hatch)
            Fall through to the legacy sub-issues model: create one sub-issue per task group,
            each carrying `fact-task` + `ai-work`. Apply Q1–Q3 phasing rules from
            docs/issue-format.md. Phase N+1 sub-issues get `fact-task` but NOT `ai-work`.

            ## Step 7 — If you cannot complete the plan
            Post a comment tagging @alvarolobato explaining exactly what is blocking.
            Remove `fact-in-progress`. Add `ai-blocked`.

      - name: Verify plan output
        id: verify_plan
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # A successful plan should either: (a) have created sub-issues and
          # added `fact-planned`, (b) added `ai-blocked` (planner gave up cleanly).
          LABELS=$(gh issue view "$ISSUE_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
          echo "Labels after plan: $LABELS"
          if echo ",$LABELS," | grep -q ",fact-planned,"; then
            echo "status=planned" >> "$GITHUB_OUTPUT"
          elif echo ",$LABELS," | grep -q ",ai-blocked,"; then
            echo "status=blocked" >> "$GITHUB_OUTPUT"
          else
            echo "status=incomplete" >> "$GITHUB_OUTPUT"
          fi


      - name: Flag incomplete plan
        if: always() && steps.verify_plan.outputs.status == 'incomplete'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Planner finished but did not produce a plan. Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Handle plan failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "${{ github.repository }}" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ AI Planner failed. Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Ensure fact-in-progress is cleared on cancel
        if: cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Planner was cancelled. Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

  # ─────────────────────────────────────────────────────────────────
  # PHASE 2 — IMPLEMENT
  # Triggered when ai-work is applied to a sub-task issue (fact-task label).
  # Produces: branch + PR implementing exactly this sub-task.
  # ─────────────────────────────────────────────────────────────────
  implement:
    if: >-
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'ai-work' &&
        (
          contains(github.event.issue.labels.*.name, 'fact-planned') ||
          contains(github.event.issue.labels.*.name, 'fact-task')
        )
      ) ||
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.phase == 'implement'
      )
    concurrency:
      group: ai-worker-implement-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Update labels — implementation started
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "ai-work" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "fact-in-progress" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 AI Worker — implementation started. [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/worker-impl.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Implement sub-task
        id: implement
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --permission-mode bypassPermissions --max-turns 120"
          allowed_bots: "claude[bot],github-actions[bot]"
          # Branch prefix is enforced here so the "Verify PR was created" step can
          # reliably find the branch via `gh pr list --search "head:ai/issue-NNN-"`.
          # The agent's prompt also instructs this prefix, but the action-level config
          # is the authoritative gate — the agent cannot override it.
          branch_prefix: "ai/issue-${{ env.ISSUE_NUMBER }}-"
          prompt: |
            You are the AI Implementer (D-034 single-track model).
            Read CLAUDE.md (role: implementer) and AGENTS.md first — they define the model.

            ## Determine your path

            ```bash
            LABELS=$(gh issue view ${{ env.ISSUE_NUMBER }} --json labels --jq '[.labels[].name] | join(",")')
            ```

            **Path A — fact-planned (single-track phase-walker)**:
            `fact-planned` in labels AND `fact-task` NOT in labels → follow Phase-walker below.

            **Path B — fact-task (legacy sub-issue)**:
            `fact-task` in labels → follow Legacy sub-task below.

            ---

            ## PATH A — Phase-walker

            ### 1. Find the active phase
            Read issue #${{ env.ISSUE_NUMBER }} body. Find all `## Phase N — name` headings.
            For each phase N, check if its PR was merged:
            ```bash
            gh pr list --search "head:ai/issue-${{ env.ISSUE_NUMBER }}-p${N}" --state merged --json number,mergedAt
            ```
            The active phase = lowest-numbered phase with no merged PR.
            If all phases are merged: post a "✅ All phases complete" comment and exit.

            ### 2. Read the Exit Criteria BEFORE implementing anything

            ```bash
            gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq '.body' \
              | grep '**EC-'
            ```

            For each `**EC-N**` item, ask: **what code makes this true, and does a CI test verify it?**

            - If the EC says "refresh mid-stream shows logs" → there must be a Playwright test that reloads the page mid-turn and asserts the log block is visible.
            - If the EC says "streaming tokens visible" → there must be a test or clear code path emitting `token` events.
            - If an EC item has no corresponding test AND no CI gate, **add the test as part of this phase before any other task**.

            This check is mandatory even if it is Phase 1. ECs are the contract. If you discover an EC has no test coverage, create the test first.

            ### 3. Walk the checklist sequentially — one task at a time
            For each unchecked `- [ ]` task in the active phase's `### Tasks`:
            1. Implement what the task says (nothing more, nothing less)
            2. Tick the checkbox immediately after completing:
               ```bash
               BODY=$(gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq .body)
               UPDATED=$(printf '%s' "$BODY" | sed '0,/- \[ \]/s//- [x]/')
               TMP=$(mktemp /tmp/issue-body.XXXXXX); printf '%s' "$UPDATED" > "$TMP"
               gh issue edit ${{ env.ISSUE_NUMBER }} --body-file "$TMP"; rm -f "$TMP"
               ```
            3. Repeat for the next unchecked task in this phase

            ### 3. Run checks, commit, open ONE PR for the phase
            ```bash
            # ETL: cd etl && python -m ruff check . && python -m pytest
            # Dashboard: cd dashboard && npm test
            git push -u origin BRANCH
            ```

            Determine the correct issue reference for the PR body:
            - Count total `## Phase N` headings in the issue body (TOTAL_PHASES)
            - This is Phase N
            - If N < TOTAL_PHASES: use `Part of #${{ env.ISSUE_NUMBER }} (Phase N of TOTAL_PHASES)` — do NOT close the issue
            - If N == TOTAL_PHASES (last phase):
              FIRST check whether the issue has unchecked Exit Criteria items:
              ```bash
              EC_UNCHECKED=$(gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq '.body' \
                | grep -cF '- [ ] **EC-' || true)
              ```
              - If EC_UNCHECKED == 0: use `Closes #${{ env.ISSUE_NUMBER }}` — this closes the issue on merge
              - If EC_UNCHECKED > 0: use `Part of #${{ env.ISSUE_NUMBER }} (Final phase — Exit Criteria pending verification)` — do NOT close the issue yet.
                Also post a comment on the issue:
                ```bash
                gh issue comment ${{ env.ISSUE_NUMBER }} --body "⚠️ Phase N (final) complete — **$EC_UNCHECKED Exit Criteria item(s) are still unverified**. Not auto-closing this issue. Please tick each \`**EC-\` checkbox with concrete evidence (test output, screenshot, CI run link) before closing manually."
                ```

            ```bash
            gh pr create \
              --title "<feature> (Phase N: <phase name>)" \
              --body "$(printf '## Summary\n...\n\nPart of #${{ env.ISSUE_NUMBER }} (Phase N of TOTAL_PHASES)')"
            ```
            **One PR per phase. Only the LAST phase PR should say `Closes #ISSUE`, and only when all EC items are verified.**

            ### If you cannot finish
            Tick whatever tasks completed. Post a blocking comment tagging @alvarolobato.
            Remove `fact-in-progress`. Add `ai-blocked`. Exit.

            ---

            ## PATH B — Legacy sub-task

            1. Read sub-task issue #${{ env.ISSUE_NUMBER }}: title, body, acceptance criteria
            2. Read the PARENT issue body + ALL comments (architecture rationale lives there):
               ```bash
               PARENT=$(gh issue view ${{ env.ISSUE_NUMBER }} --json body --jq .body \
                 | grep -oE 'Closes #[0-9]+' | head -1 | tr -d '#A-Za-z ')
               [ -n "$PARENT" ] && gh issue view "$PARENT" --json title,body,comments \
                 --jq '"# \(.title)\n\n\(.body)\n\n" + (.comments | map(.body) | join("\n\n---\n\n"))'
               ```
            3. Read CLAUDE.md and AGENTS.md
            4. Pre-flight: check for existing PRs to avoid duplicates.
               If a PR already covers this work, close this issue and exit.
            5. Create branch `ai/issue-${{ env.ISSUE_NUMBER }}-{slug}`, implement, run checks
            6. Commit, push, `gh pr create` with `Closes #${{ env.ISSUE_NUMBER }}`

            ---

            ## Rules (both paths)
            - Read-only SQL: NEVER INSERT/UPDATE/DELETE/DROP in production
            - No credentials in code; no customer data
            - Scope strictly to the task — don't implement other tasks
            - NEVER use --no-verify or bypass pre-commit hooks; NEVER force-push

      # Verify a PR was actually created for this issue. The `Handle success`
      # step used to fire on step completion alone — but Claude can exit
      # successfully without having created a branch or PR (e.g. if it
      # decided work was already covered but didn't close the issue).
      - name: Verify PR was created
        id: verify
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Look for a PR whose head branch follows ai/issue-<N>-... OR whose
          # body contains "Closes #<N>".
          PR_BY_BRANCH=$(gh pr list --state all --search "head:ai/issue-${ISSUE_NUMBER}-" \
            --json number,state --jq '.[0].number // empty')
          PR_BY_BODY=$(gh pr list --state all --search "Closes #${ISSUE_NUMBER} in:body" \
            --json number,state --jq '.[0].number // empty')
          PR_NUMBER="${PR_BY_BRANCH:-$PR_BY_BODY}"

          # Also check if the issue was closed by the worker (deliberate no-op).
          ISSUE_STATE=$(gh issue view "$ISSUE_NUMBER" --json state --jq '.state')

          if [ -n "$PR_NUMBER" ]; then
            echo "outcome=pr_created" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "Found PR #$PR_NUMBER for issue #$ISSUE_NUMBER"
          elif [ "$ISSUE_STATE" = "CLOSED" ]; then
            echo "outcome=issue_closed" >> "$GITHUB_OUTPUT"
            echo "Issue #$ISSUE_NUMBER was closed by the worker (deliberate no-op)."
          else
            echo "outcome=no_pr" >> "$GITHUB_OUTPUT"
            echo "No PR and issue still open — implementation did not complete."
          fi

      - name: Handle success (PR created)
        if: always() && steps.verify.outputs.outcome == 'pr_created'
        env:
          GH_TOKEN: ${{ github.token }}
          # GITHUB_TOKEN cannot assign copilot-pull-request-reviewer[bot] — the
          # API returns 200 with an empty requested_reviewers array. Use a PAT
          # (stored as COPILOT_PAT secret) for the Copilot POST only; fall back
          # to GITHUB_TOKEN so the rest of the flow still works without a PAT.
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT || github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          PR_NUM="${{ steps.verify.outputs.pr_number }}"
          REPO_NAME="${{ github.repository }}"

          # D-021 idempotency guard. The verify step matches PR-by-branch and
          # PR-by-body, so this success path also fires when a worker re-runs
          # on a sub-task that already has a PR (e.g. the planner re-added
          # `ai-work`, the worker re-fired, it found the existing PR via the
          # verify search). Without this guard we'd re-add `fact-phase-copilot`
          # and re-POST `requested_reviewers`, producing a SECOND Copilot
          # review on the same PR — directly violating the "1 Copilot + 1
          # Opus, no more" policy. Symptom in production: 2026-05-09 burst
          # of duplicate Copilot reviews on PRs #512–#516.
          PR_LABELS=$(gh pr view "$PR_NUM" --json labels --jq '[.labels[].name] | join(",")' || echo "")
          for marker in "fact-phase-copilot" "fact-phase-opus" "fact-cp-after-1" "fact-o-after-1"; do
            if echo ",$PR_LABELS," | grep -q ",$marker,"; then
              echo "PR #$PR_NUM already has '$marker' — review cycle already in progress or done. Not re-requesting Copilot."
              gh issue comment "$ISSUE_NUMBER" \
                --body "♻️ AI Worker re-ran and found existing PR #$PR_NUM with review-cycle label \`$marker\`. Not re-requesting Copilot (D-021: 1 Copilot + 1 Opus, no more)." || true
              exit 0
            fi
          done

          # Existing Copilot review on file (e.g. label was wiped manually but
          # Copilot already weighed in)? Don't request again.
          # `gh api --paginate --jq 'length'` emits one count per page; if the
          # reviews list crosses a pagination boundary the result becomes
          # multi-line (e.g. "2\n0") and the numeric `-gt` below errors. Stream
          # the matching review IDs instead and count lines — always a single
          # int. Same pattern as ai-address-feedback.yml's WORKFLOW_CHANGES.
          COPILOT_REVIEWS=$(gh api "repos/$REPO_NAME/pulls/$PR_NUM/reviews" --paginate \
            --jq '.[] | select(.user.login == "Copilot" or .user.login == "copilot-pull-request-reviewer" or .user.login == "copilot-pull-request-reviewer[bot]") | .id' 2>/dev/null \
            | wc -l | tr -d ' ' || echo "0")
          if [ "${COPILOT_REVIEWS:-0}" -gt 0 ]; then
            echo "PR #$PR_NUM already has $COPILOT_REVIEWS Copilot review(s) — not re-requesting."
            gh issue comment "$ISSUE_NUMBER" \
              --body "♻️ AI Worker re-ran and found existing PR #$PR_NUM with $COPILOT_REVIEWS Copilot review(s) on file. Not re-requesting Copilot (D-021: 1 Copilot + 1 Opus, no more)." || true
            exit 0
          fi

          # Fresh PR — kick off the review cycle.
          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ AI Worker completed. See PR #$PR_NUM."
          # Automated review: Copilot first (cheaper), then Opus. One pass each.
          # Do not dispatch Opus immediately — avoids rate limits and reduces token spend.

          # Self-heal: phase labels must exist in the repo for the state machine to advance.
          gh label create "fact-phase-copilot" --color "0052cc" --description "AI Factory: Copilot review in progress" 2>/dev/null || true
          gh label create "fact-phase-opus" --color "6f42c1" --description "AI Factory: Opus review in progress" 2>/dev/null || true

          # REST API for label adds — see #611 (gh pr edit exits non-zero on projectCards deprecation).
          gh api -X POST "repos/$REPO_NAME/issues/$PR_NUM/labels" -f "labels[]=fact-phase-copilot" >/dev/null

          # Request Copilot with the PAT-capable token and verify the request
          # actually landed. If COPILOT_PAT is unset the fallback GITHUB_TOKEN
          # fails silently — we still emit the warning so the owner is paged.
          POST_OUT=$(GH_TOKEN="$COPILOT_TOKEN" gh api "repos/$REPO_NAME/pulls/$PR_NUM/requested_reviewers" \
            --method POST -f 'reviewers[]=copilot-pull-request-reviewer[bot]' 2>&1 || true)
          COPILOT_ADDED=$(printf '%s' "$POST_OUT" \
            | jq -r '[.requested_reviewers[]?.login] | map(select(. == "Copilot" or . == "copilot-pull-request-reviewer")) | length' 2>/dev/null || echo "0")

          if [ "${COPILOT_ADDED:-0}" -gt 0 ]; then
            gh pr comment "$PR_NUM" \
              --body "🤖 **AI Factory**: Automated review starts with **Copilot**, then **Opus** (one pass each). Labels: \`fact-phase-copilot\` → \`fact-phase-opus\`." || true
          else
            # Silent failure — don't advertise a review cycle that didn't start.
            gh api -X POST "repos/$REPO_NAME/issues/$PR_NUM/labels" -f "labels[]=ai-blocked" >/dev/null
            gh pr comment "$PR_NUM" \
              --body "⚠️ **AI Factory**: Requested Copilot review but the API returned no reviewer. This happens when \`secrets.COPILOT_PAT\` is missing (GITHUB_TOKEN cannot assign Copilot) or the PAT lacks \`pull_requests: write\`. **Copilot review has NOT started.** cc @alvarolobato — set \`COPILOT_PAT\` (fine-grained PAT, Pull requests: Read and write) or request the review manually." || true
            echo "::warning::Copilot reviewer request silently failed on PR #$PR_NUM"
          fi

      - name: Handle success (issue closed deliberately)
        if: always() && steps.verify.outputs.outcome == 'issue_closed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Nothing to do — issue already closed."

      - name: Push partial work on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          # Re-establish GITHUB_TOKEN-based auth on the remote URL — the
          # claude-code-action that ran above can leave the credential
          # helper in a state where the default checkout auth no longer
          # applies (see ai-pr-mergeability.yml `Push rebased branch` for
          # the same fix).
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}" || true
          BRANCH=$(git branch --show-current)
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "master" ] && [ -n "$BRANCH" ]; then
            git push origin "$BRANCH" || true
            echo "Pushed partial branch: $BRANCH"
          else
            AI_BRANCH=$(git branch | grep 'ai/' | head -1 | xargs)
            if [ -n "$AI_BRANCH" ]; then
              git checkout "$AI_BRANCH" && git push origin "$AI_BRANCH" || true
              echo "Pushed partial branch: $AI_BRANCH"
            fi
          fi

      - name: Block on missing PR
        if: always() && steps.verify.outputs.outcome == 'no_pr'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Worker finished but did NOT create a PR. Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically. This usually means the agent hit its turn limit or failed to push the branch. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH=$(git branch --show-current)
          BRANCH_NOTE=""
          if [ "$BRANCH" != "main" ] && [ "$BRANCH" != "master" ] && [ -n "$BRANCH" ]; then
            BRANCH_NOTE=" Partial work pushed to branch \`${BRANCH}\`."
          fi
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "${{ github.repository }}" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ AI Worker failed.${BRANCH_NOTE} Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Ensure fact-in-progress is cleared on cancel
        if: cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --remove-label "fact-in-progress" || true
          gh issue edit "$ISSUE_NUMBER" \
            --add-label "ai-blocked" --add-label "fact-auto-retry" || true
          gh issue comment "$ISSUE_NUMBER" \
            --body "⚠️ AI Worker was cancelled. Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
