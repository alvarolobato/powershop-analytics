name: AI Dashboard Quality Audit
on:
  schedule:
    - cron: "0 14 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: cd dashboard && npm ci

      - name: TypeScript check
        id: typecheck
        run: cd dashboard && npx tsc --noEmit 2>&1 | tee /tmp/typecheck-output.txt || true

      - name: Run tests
        id: tests
        run: cd dashboard && npm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt || true

      - name: Build check
        id: build
        run: cd dashboard && npm run build 2>&1 | tee /tmp/build-output.txt || true

      - name: Claude Analysis
        uses: anthropic/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 20"
          prompt: |
            You are the Dashboard Quality Auditor. Analyze the build, test, and type-check results.

            ## Read the outputs
            1. Read /tmp/typecheck-output.txt — TypeScript errors
            2. Read /tmp/test-output.txt — Test results
            3. Read /tmp/build-output.txt — Build results

            ## Code review
            Review recently changed dashboard files for:
            - Missing error handling in API routes
            - SQL injection risks in query execution
            - Accessibility issues in components
            - Missing loading/error states in UI
            - Unused imports or dead code
            - Component prop validation (Zod schemas)

            ## Output
            If any build/test/type failures OR significant code quality issues:
            Create ONE issue with title prefix `[dashboard-audit]`:
            - Build status: ✅/❌
            - Test status: ✅/❌ (list failures)
            - TypeScript: ✅/❌ (list errors)
            - Code quality findings (if any)

            If everything passes and no quality concerns, do NOT create an issue.
