name: AI Address PR Feedback
on:
  pull_request_review:
    types: [submitted]
  # Note: we deliberately do NOT trigger on pull_request_review_comment —
  # a single review often fires many inline-comment events. Using only the
  # aggregated review submission event keeps the workflow manageable. If
  # any review slips past (e.g. because GitHub gates bot-triggered runs as
  # `action_required`), the watchdog in ai-watchdog.yml catches it and
  # dispatches this workflow manually.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address feedback on"
        required: true
        type: number
      reason:
        description: "Why we are triggering manually (logged in the comment)"
        required: false
        type: string
        default: "manual dispatch"
      use_global_queue:
        description: "Join factory serial queue (watchdog/CI must pass true). Leave false for urgent manual runs."
        required: false
        type: boolean
        default: false

concurrency:
  # pull_request_review: one at a time repo-wide (rate limits).
  # workflow_dispatch + use_global_queue=true: same global lock (watchdog, pr-review, address-feedback chaining).
  # workflow_dispatch + use_global_queue=false (default): own slot — does not wait on the global queue.
  group: >-
    ${{ github.event_name != 'workflow_dispatch' && 'ai-address-feedback-global'
        || (inputs.use_global_queue == true && 'ai-address-feedback-global'
            || format('ai-address-feedback-manual-{0}-{1}', inputs.pr_number, github.run_id)) }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  checks: read
  id-token: write

jobs:
  # Resolve which PR we are operating on (works across three event types).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pick.outputs.pr_number }}
      head_ref: ${{ steps.pick.outputs.head_ref }}
      should_run: ${{ steps.pick.outputs.should_run }}
      reason: ${{ steps.pick.outputs.reason }}
    steps:
      - name: Resolve PR number and decide
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"
          PR=""
          SHOULD_RUN="false"
          REASON=""

          case "$EVENT" in
            pull_request_review)
              PR="${{ github.event.pull_request.number }}"
              STATE="${{ github.event.review.state }}"
              ACTOR="${{ github.event.review.user.login }}"
              # Bot reviews must NOT run the address job on pull_request_review:
              # OIDC → Claude app token exchange fails with "User does not have write access"
              # when the triggering actor is a bot. Copilot sometimes appears as login
              # "Copilot" (no "[bot]" suffix), so match broadly.
              is_bot="false"
              if [[ "$ACTOR" == *"[bot]" ]] || echo "$ACTOR" | grep -qi copilot; then
                is_bot="true"
              fi

              COMMENT_COUNT="0"
              if [ "$STATE" = "commented" ] || [ "$STATE" = "COMMENTED" ] || [ "$STATE" = "changes_requested" ]; then
                COMMENT_COUNT=$(gh api \
                  "repos/${{ github.repository }}/pulls/$PR/reviews/${{ github.event.review.id }}/comments" \
                  --jq 'length' 2>/dev/null || echo "0")
              fi

              if [ "$is_bot" = "true" ]; then
                REASON="skipped bot reviewer $ACTOR on pull_request_review (no OIDC write for bots)"
                if [ "${COMMENT_COUNT:-0}" -gt 0 ] && { [ "$STATE" = "changes_requested" ] || [ "$STATE" = "commented" ] || [ "$STATE" = "COMMENTED" ]; }; then
                  gh workflow run ai-address-feedback.yml \
                    --repo "${{ github.repository }}" \
                    --field pr_number="$PR" \
                    --field reason="chained: bot review from $ACTOR ($COMMENT_COUNT inline) — workflow_dispatch for OIDC" \
                    --field use_global_queue=true || true
                  REASON="$REASON — dispatched address-feedback via workflow_dispatch ($COMMENT_COUNT inline thread(s))"
                fi
              elif [ "$STATE" = "changes_requested" ]; then
                SHOULD_RUN="true"
                REASON="review requested changes (reviewer: $ACTOR)"
              elif [ "$STATE" = "commented" ] || [ "$STATE" = "COMMENTED" ]; then
                if [ "${COMMENT_COUNT:-0}" -gt 0 ]; then
                  SHOULD_RUN="true"
                  REASON="review with $COMMENT_COUNT inline comment(s) (reviewer: $ACTOR)"
                else
                  REASON="COMMENTED review with no inline comments from $ACTOR"
                fi
              fi
              ;;
            workflow_dispatch)
              PR="${{ inputs.pr_number }}"
              SHOULD_RUN="true"
              REASON="${{ inputs.reason }}"
              ;;
          esac

          if [ -z "$PR" ]; then
            echo "No PR number resolved; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull PR state in one shot.
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls/$PR")
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          SAME_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name == "${{ github.repository }}"')
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          LABELS=$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")')

          if [ "$STATE" != "open" ]; then
            SHOULD_RUN="false"
            REASON="PR #$PR is $STATE; nothing to do"
          fi
          if [ "$SAME_REPO" != "true" ]; then
            SHOULD_RUN="false"
            REASON="PR #$PR is from a fork; cannot push fixes"
          fi
          if echo ",$LABELS," | grep -q ",no-address-feedback,"; then
            SHOULD_RUN="false"
            REASON="PR #$PR labelled no-address-feedback"
          fi

          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Resolved: PR=$PR head=$HEAD_REF should_run=$SHOULD_RUN reason=$REASON"

  address:
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_ref }}
          fetch-depth: 0

      - name: Capture initial HEAD
        id: initial_head
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}" --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Initial HEAD: $SHA"

      - name: Announce start
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ needs.resolve.outputs.pr_number }} \
            --body "🤖 Addressing review feedback automatically (${{ needs.resolve.outputs.reason }}). See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      - name: Address Review Feedback
        id: address
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 100 --permission-mode bypassPermissions"
          allowed_bots: "claude[bot],copilot-pull-request-reviewer[bot],github-actions[bot]"
          prompt: |
            You are addressing review feedback on PR #${{ needs.resolve.outputs.pr_number }}.
            Trigger reason: ${{ needs.resolve.outputs.reason }}.

            ## Process
            1. Fetch ALL unresolved review threads on the PR:
               `gh api repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}/comments --paginate`
               and the review summaries:
               `gh api repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}/reviews --paginate`
               Ignore any threads already resolved or where the latest reply is from claude[bot] or github-actions[bot] (avoid loops).
            2. Also check CI status:
               `gh pr checks ${{ needs.resolve.outputs.pr_number }}`

            ## What to fix (DO these):
            - Typos, naming, and formatting issues (including Spanish accents)
            - Type corrections and import cleanup
            - Simple logic corrections with obvious fixes
            - Bug fixes called out by a reviewer with a clear suggestion
            - Documentation improvements
            - Minor refactors suggested by the reviewer
            - Lint and style issues
            - Adding missing tests when the reviewer explicitly asked for them
            - CI failures that are straightforward (lint/type/import/trivial tests)

            ## What NOT to fix (reply and skip):
            - Architectural redesigns
            - Algorithm rewrites
            - Subjective style preferences with no clear consensus
            - Performance optimizations requiring benchmarks
            - Changes that would significantly alter the PR scope

            ## For each review comment — MANDATORY reply protocol:
            Every single comment MUST get a reply. No exceptions.

            1. If you fix it:
               - Apply the fix in code
               - Reply to the EXACT comment thread using:
                 ```bash
                 gh api repos/${{ github.repository }}/pulls/comments/{COMMENT_ID}/replies \
                   --method POST -f body="Fixed: <one sentence describing the exact change made>"
                 ```
               - The reply must reference the fix specifically (file, line, what changed)

            2. If you skip it:
               - Reply explaining WHY in one sentence:
                 ```bash
                 gh api repos/${{ github.repository }}/pulls/comments/{COMMENT_ID}/replies \
                   --method POST -f body="Skipped: <reason — e.g. 'architectural change outside this PR scope'>"
                 ```

            3. For top-level review summaries (not inline):
               - Use issue comments: `gh api repos/${{ github.repository }}/issues/{PR_NUMBER}/comments --method POST -f body="..."`

            IMPORTANT: Use the comment's `id` field (not `pull_request_review_id`) for replies.
            Verify each reply was posted by checking the response — do not silently fail.

            ## Commit strategy
            - Stage all fixes and commit with: `fix: address review feedback (round N)`
            - Push to the PR branch
            - If CI was failing, your commit must fix it. Run the same commands CI runs.

            ## Completion
            - Run `gh pr view ${{ needs.resolve.outputs.pr_number }} --json labels` first.
            - If the PR has **`no-pr-review`**, **`ai-phase-copilot`**, or **`ai-phase-opus`**, do **NOT** call `requested_reviewers` (no Copilot re-request; owner may have stopped all automated PR reviews).
            - Only if **none** of those labels are present: after replying and committing, re-request Copilot review:
              ```bash
              gh api repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}/requested_reviewers \
                --method POST -f 'reviewers[]=copilot-pull-request-reviewer[bot]'
              ```
            - Post a single summary comment listing: threads addressed (with fix), threads skipped
              (with reason), files touched, tests run. **Do not** say you re-requested Copilot unless you actually ran the command above.
            - If you could NOT address something and need human input, post a comment tagging
              @alvarolobato explaining precisely what is blocking you. Then exit normally — do NOT
              error out, so the workflow records the blocked state.

            ## Important
            - NEVER use --no-verify or bypass pre-commit hooks.
            - NEVER force-push.
            - Read-only SQL policy still applies (no INSERT/UPDATE/DELETE in production queries).
            - Stay within this PR's scope — do not pull in unrelated work.

      - name: Route next automated review (or converge)
        id: route
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')
          INITIAL_SHA="${{ steps.initial_head.outputs.sha }}"
          LABELS=$(gh api "repos/$REPO/pulls/$PR" --jq '[.labels[].name] | join(",")')

          converge_comment() {
            gh pr edit "$PR" --repo "$REPO" --remove-label "ai-ready-for-review" || true
            gh pr comment "$PR" \
              --body "✅ Review cycle converged — no new changes required. PR is ready for human merge decision." || true
          }

          if [ "$CURRENT_SHA" = "$INITIAL_SHA" ]; then
            echo "No commits pushed — nothing to re-review."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            if echo ",$LABELS," | grep -q ",no-pr-review,"; then
              gh pr edit "$PR" --repo "$REPO" \
                --remove-label "ai-ready-for-review" \
                --add-label "ai-awaiting-owner" || true
              gh pr comment "$PR" \
                --body "✅ **AI Factory**: \`no-pr-review\` — no new commits were needed. **Ready for your review and merge** when CI is green." || true
            else
              converge_comment
            fi
            exit 0
          fi

          echo "Commits pushed ($INITIAL_SHA → $CURRENT_SHA)."
          echo "pushed=true" >> "$GITHUB_OUTPUT"

          # Phased: 2× Copilot (cheap) then 2× Opus — see ai-worker.yml / ai-pr-review.yml
          if echo ",$LABELS," | grep -q ",ai-phase-copilot,"; then
            if ! echo ",$LABELS," | grep -q ",ai-cp-after-1,"; then
              gh pr edit "$PR" --repo "$REPO" --add-label "ai-cp-after-1" || true
              gh api "repos/$REPO/pulls/$PR/requested_reviewers" --method POST \
                -f 'reviewers[]=copilot-pull-request-reviewer[bot]' || true
              gh pr comment "$PR" --body "🤖 **AI Factory**: Copilot round **1**/2 addressed — requested **round 2** Copilot review." || true
              exit 0
            fi
            if ! echo ",$LABELS," | grep -q ",ai-cp-after-2,"; then
              gh pr edit "$PR" --repo "$REPO" \
                --add-label "ai-cp-after-2" \
                --remove-label "ai-phase-copilot" \
                --add-label "ai-phase-opus" \
                --add-label "ai-ready-for-review" || true
              gh workflow run ai-pr-review.yml --repo "$REPO" --field pr_number="$PR" --field use_global_queue=true || true
              gh pr comment "$PR" --body "🤖 **AI Factory**: Copilot rounds **complete** — starting **Opus** review (pass 1 of 2)." || true
              exit 0
            fi
          fi

          if echo ",$LABELS," | grep -q ",ai-phase-opus,"; then
            if ! echo ",$LABELS," | grep -q ",ai-o-after-1,"; then
              gh pr edit "$PR" --repo "$REPO" --add-label "ai-o-after-1" --add-label "ai-ready-for-review" || true
              gh workflow run ai-pr-review.yml --repo "$REPO" --field pr_number="$PR" --field use_global_queue=true || true
              gh pr comment "$PR" --body "🤖 **AI Factory**: Opus pass **1**/2 addressed — running **Opus** pass 2." || true
              exit 0
            fi
            if ! echo ",$LABELS," | grep -q ",ai-o-after-2,"; then
              gh pr edit "$PR" --repo "$REPO" \
                --add-label "ai-o-after-2" \
                --add-label "ai-awaiting-owner" \
                --remove-label "ai-phase-opus" \
                --remove-label "ai-ready-for-review" || true
              gh pr comment "$PR" --body "✅ **AI Factory**: Automated **Opus** passes complete (**2**/2). This PR is **ready for your review and merge**." || true
              exit 0
            fi
          fi

          # Legacy PRs: after 2 successful Opus passes (labels set by ai-pr-review), do not schedule more AI review.
          if echo ",$LABELS," | grep -q ",ai-legacy-opus-2,"; then
            gh pr edit "$PR" --repo "$REPO" \
              --remove-label "ai-ready-for-review" \
              --add-label "ai-awaiting-owner" || true
            gh pr comment "$PR" \
              --body "✅ **AI Factory**: Both automated Opus passes are done. This PR is **ready for your review and merge** — no further automated reviews will be scheduled." || true
            exit 0
          fi

          # Owner opted out of further AI PR reviews — address-feedback may still run to fix threads, but never re-dispatch Opus.
          if echo ",$LABELS," | grep -q ",no-pr-review,"; then
            gh pr edit "$PR" --repo "$REPO" \
              --remove-label "ai-ready-for-review" \
              --add-label "ai-awaiting-owner" || true
            gh pr comment "$PR" \
              --body "✅ **AI Factory**: \`no-pr-review\` is set — no further automated Opus/Copilot PR reviews. Pending feedback was handled in this run; **ready for your review and merge** when CI is green."
            exit 0
          fi

          # Legacy PRs (no phased labels): re-dispatch Opus review (capped in ai-pr-review via ai-legacy-opus-*).
          gh pr edit "$PR" --repo "$REPO" --add-label "ai-ready-for-review" || true
          gh workflow run ai-pr-review.yml --repo "$REPO" --field pr_number="$PR" --field use_global_queue=true || true
          echo "Dispatched legacy Opus PR review for PR #$PR."

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ needs.resolve.outputs.pr_number }} \
            --body "❌ AI Address Feedback failed (rate limit or transient error). Marked \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically. See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          gh pr edit ${{ needs.resolve.outputs.pr_number }} \
            --add-label "ai-blocked" --add-label "ai-auto-retry" || true
