name: AI Address PR Feedback
on:
  pull_request_review:
    types: [submitted]
  # Note: we deliberately do NOT trigger on pull_request_review_comment —
  # a single review often fires many inline-comment events. Using only the
  # aggregated review submission event keeps the workflow manageable. If
  # any review slips past (e.g. because GitHub gates bot-triggered runs as
  # `action_required`), the watchdog in ai-watchdog.yml catches it and
  # dispatches this workflow manually.
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to address feedback on"
        required: true
        type: number
      reason:
        description: "Why we are triggering manually (logged in the comment)"
        required: false
        type: string
        default: "manual dispatch"

concurrency:
  # Per-PR group: serialise runs for the SAME PR (prevents two address-feedback
  # sessions racing on a single PR's labels and commits), but allow runs for
  # different PRs to proceed in parallel.
  #
  # Why not global: GitHub Actions with `cancel-in-progress: false` keeps the
  # in-progress run alive but **cancels older queued runs** when newer ones
  # arrive in the same group. With a global group, 5 dispatches arriving in
  # seconds collapsed to 1 effective run (issue #609). Per-PR avoids the
  # cross-PR cancellation cascade entirely.
  #
  # Rate-limit storms (the original motivation for the global group) are bounded
  # by the worker token's own rate-limit handling and the GitHub Actions
  # concurrent-jobs-per-repo limit, not by serialisation here.
  group: ai-address-feedback-${{ github.event.inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  checks: read
  id-token: write

jobs:
  # Resolve which PR we are operating on (works across three event types).
  resolve:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pick.outputs.pr_number }}
      head_ref: ${{ steps.pick.outputs.head_ref }}
      should_run: ${{ steps.pick.outputs.should_run }}
      reason: ${{ steps.pick.outputs.reason }}
    steps:
      - name: Resolve PR number and decide
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          EVENT="${{ github.event_name }}"
          PR=""
          SHOULD_RUN="false"
          REASON=""

          case "$EVENT" in
            pull_request_review)
              PR="${{ github.event.pull_request.number }}"
              STATE="${{ github.event.review.state }}"
              ACTOR="${{ github.event.review.user.login }}"
              # Bot reviews (claude[bot], copilot, github-actions[bot]) do NOT
              # trigger address-feedback via this event path. Reason: GitHub does
              # not mint OIDC tokens (id-token) for pull_request_review events
              # from bot actors, so the claude_code_oauth_token exchange fails.
              # Instead:
              #   - claude[bot] reviews: pr-review explicitly dispatches address-feedback
              #   - copilot reviews: watchdog detects and dispatches after 3 min
              #   - github-actions[bot]: ignored (system noise)
              # Human reviews still trigger directly here (humans get id-token).
              if [[ "$ACTOR" == *"[bot]" ]]; then
                REASON="ignored bot review from $ACTOR (handled via explicit dispatch or watchdog)"
              # Run when a human requests changes OR any reviewer (including bots
              # like Copilot) leaves a review that contains inline comments.
              # Copilot always submits as COMMENTED even when it leaves inline
              # change suggestions.
              elif [ "$STATE" = "changes_requested" ]; then
                SHOULD_RUN="true"
                REASON="review requested changes (reviewer: $ACTOR)"
              elif [ "$STATE" = "commented" ] || [ "$STATE" = "COMMENTED" ]; then
                # Only run if this review carries inline comments — a plain
                # overview comment without suggestions isn't actionable.
                COMMENT_COUNT=$(gh api \
                  "repos/${{ github.repository }}/pulls/$PR/reviews/${{ github.event.review.id }}/comments" \
                  --jq 'length' 2>/dev/null || echo "0")
                if [ "${COMMENT_COUNT:-0}" -gt 0 ]; then
                  SHOULD_RUN="true"
                  REASON="review with $COMMENT_COUNT inline comment(s) (reviewer: $ACTOR)"
                else
                  REASON="COMMENTED review with no inline comments from $ACTOR"
                fi
              fi
              ;;
            workflow_dispatch)
              PR="${{ inputs.pr_number }}"
              SHOULD_RUN="true"
              REASON="${{ inputs.reason }}"
              ;;
          esac

          if [ -z "$PR" ]; then
            echo "No PR number resolved; skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Pull PR state in one shot.
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls/$PR")
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          SAME_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name == "${{ github.repository }}"')
          STATE=$(echo "$PR_JSON" | jq -r '.state')
          LABELS=$(echo "$PR_JSON" | jq -r '[.labels[].name] | join(",")')

          if [ "$STATE" != "open" ]; then
            SHOULD_RUN="false"
            REASON="PR #$PR is $STATE; nothing to do"
          fi
          if [ "$SAME_REPO" != "true" ]; then
            SHOULD_RUN="false"
            REASON="PR #$PR is from a fork; cannot push fixes"
          fi
          if echo ",$LABELS," | grep -q ",no-address-feedback,"; then
            SHOULD_RUN="false"
            REASON="PR #$PR labelled no-address-feedback"
          fi
          # D-021: don't kick off the address job for converged PRs.
          # The address job has its own d021 step as defence in depth, but
          # that step lives INSIDE the address job — which is gated by
          # `should_run=true`. So if we set should_run=false here without
          # cleaning up first, any stale phase / blocked / auto-retry labels
          # stay stuck forever (the address-job d021 cleanup is unreachable).
          # That's how PRs #513 and #516 ended up with `fact-phase-copilot` set
          # on top of an already-converged `fact-cp-after-1 + fact-o-after-1`
          # after the pre-#519 duplicate-Copilot-request bug fired the
          # worker's `Handle success` a second time.
          # Fix: do the same cleanup the address-job d021 step would have
          # done, then short-circuit. Idempotent: removing absent labels and
          # adding present ones via the REST endpoint is a no-op.
          # D-021 converge: both rounds done = fact-o-after-1 present AND no
          # stale phase labels. fact-cp-after-1 may have been cleaned up by
          # address-feedback's own Opus handoff before this resolve step runs
          # (observed on PR #683: only fact-o-after-1 was present). Guard on
          # fact-o-after-1 alone when no phase label is still active.
          HAS_CP=$(echo ",$LABELS," | grep -c ",fact-cp-after-1," || true)
          HAS_O=$(echo ",$LABELS," | grep -c ",fact-o-after-1," || true)
          HAS_PHASE=$(echo ",$LABELS," | grep -cE ",fact-phase-(copilot|opus)," || true)
          if [ "${HAS_O:-0}" -gt 0 ] && [ "${HAS_PHASE:-0}" -eq 0 ]; then
            SHOULD_RUN="false"
            REASON="PR #$PR D-021 converged (fact-o-after-1 present, no active phase label; fact-cp-after-1 present=${HAS_CP})"
            # Clear stale phase / blocked / auto-retry labels.
            for stale in fact-ready-for-review fact-phase-copilot fact-phase-opus ai-blocked fact-auto-retry; do
              gh api "repos/${{ github.repository }}/issues/$PR/labels/$stale" -X DELETE 2>/dev/null || true
            done
            # CI-gated owner handoff (matches the address-job d021 step).
            HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            CI_STATE=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | .conclusion] | if length == 0 then "running" elif any(. == null) then "running" elif all(. == "success" or . == "skipped" or . == "neutral") then "ready" else "failing" end' \
              2>/dev/null || echo "unknown")
            if echo ",$LABELS," | grep -q ",fact-ci-failing,"; then
              # If CI is actually green now, the label is stale — drop it
              # before computing the gate, otherwise the legitimate green
              # state can't reach `ai-awaiting-owner`. PR #530 hit this on
              # 2026-05-09: ai-ci-remediation fixed CI but the label
              # lingered and blocked the converge handoff.
              if [ "$CI_STATE" = "ready" ]; then
                gh api "repos/${{ github.repository }}/issues/$PR/labels/fact-ci-failing" -X DELETE 2>/dev/null || true
              else
                CI_STATE="failing"
              fi
            fi
            if [ "$CI_STATE" = "ready" ]; then
              gh api "repos/${{ github.repository }}/issues/$PR/labels" -X POST \
                -f 'labels[]=ai-awaiting-owner' 2>/dev/null || true
            fi
          fi

          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"
          echo "Resolved: PR=$PR head=$HEAD_REF should_run=$SHOULD_RUN reason=$REASON"

  address:
    needs: resolve
    if: needs.resolve.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      # D-021 enforcement (must run BEFORE `Announce start`, which strips
      # ai-awaiting-owner). If both Copilot and Opus rounds have already been
      # addressed, a fresh address-feedback run would just surface nit-picks
      # and create a new commit, kicking off another cycle. Bail here and keep
      # the converged state sticky. PRs #493 / #495 had 4+ rounds before this
      # guard existed.
      - name: D-021 — bail if both rounds done
        id: d021
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ needs.resolve.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | join(",")')
          # Label-ops helpers — use REST API instead of `gh pr edit` because the
          # latter exits non-zero on a Projects(classic) GraphQL deprecation
          # warning even on success, hiding real failures behind `|| true`.
          # See issue #611. POSTs are strict (real failures fail loud);
          # DELETEs are idempotent (404 on absent label is OK).
          labels_add() {
            local pr="$1"; shift
            for l in "$@"; do
              gh api -X POST "repos/$REPO/issues/$pr/labels" -f "labels[]=$l" >/dev/null
            done
          }
          labels_remove() {
            local pr="$1"; shift
            for l in "$@"; do
              gh api -X DELETE "repos/$REPO/issues/$pr/labels/$l" >/dev/null 2>&1 || true
            done
          }

          if echo ",$LABELS," | grep -q ",fact-cp-after-1," \
             && echo ",$LABELS," | grep -q ",fact-o-after-1,"; then
            echo "PR #$PR has both rounds addressed — D-021 converged."
            # Cosmetic-only label cleanup (always safe).
            labels_remove "$PR" fact-ready-for-review fact-phase-copilot fact-phase-opus ai-blocked fact-auto-retry
            # Owner handoff is CI-gated to match the rest of this file
            # (see `owner_handoff_or_ci_gate` below). Don't claim merge-ready
            # if CI is failing or still running.
            HEAD_SHA=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq .headRefOid)
            CI_STATE=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | .conclusion] | if length == 0 then "running" elif any(. == null) then "running" elif all(. == "success" or . == "skipped" or . == "neutral") then "ready" else "failing" end' \
              2>/dev/null || echo "unknown")
            if echo ",$LABELS," | grep -q ",fact-ci-failing,"; then
              CI_STATE="failing"
            fi
            if [ "$CI_STATE" = "ready" ]; then
              labels_add "$PR" ai-awaiting-owner
              gh pr comment "$PR" --repo "$REPO" \
                --body "ℹ️ **AI Factory**: D-021 — both Copilot and Opus rounds already addressed. Skipping address-feedback. Awaiting owner merge decision." || true
            else
              gh pr comment "$PR" --repo "$REPO" \
                --body "ℹ️ **AI Factory**: D-021 — both rounds already addressed. Skipping address-feedback. **Not marking \`ai-awaiting-owner\`** because CI is \`$CI_STATE\`." || true
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.d021.outputs.skip != 'true'
        with:
          ref: ${{ needs.resolve.outputs.head_ref }}
          fetch-depth: 0

      - name: Capture initial HEAD
        id: initial_head
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(gh api "repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}" --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Initial HEAD: $SHA"

      - name: Announce start
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          # Idempotent label removals via REST (avoids gh pr edit's
          # projectCards deprecation false-failure — see issue #611).
          for l in ai-awaiting-owner fact-ci-failing; do
            gh api -X DELETE "repos/$REPO/issues/$PR/labels/$l" >/dev/null 2>&1 || true
          done
          gh pr comment "$PR" --repo "$REPO" \
            --body "🤖 Addressing review feedback automatically (${{ needs.resolve.outputs.reason }}). See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

      # Claude Code Action's OIDC app-token exchange validates that workflow
      # files on the PR branch match the default branch. If the PR modifies
      # any `.github/workflows/*` file, the exchange fails with 401 and the
      # Claude step hard-errors. Detect that up front and skip cleanly so
      # PRs that edit workflows don't show a spurious red X and the reviewer
      # knows why automated address-feedback can't run.
      - name: Detect workflow-file change
        id: workflow_change
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          # `gh api --paginate --jq 'length'` emits one count per page; when
          # the PR crosses a pagination boundary the result becomes multi-line
          # (e.g. "2\n1") and the numeric `-gt` below errors. Stream the
          # matching filenames instead and count lines — always a single int.
          WORKFLOW_CHANGES=$(gh api "repos/$REPO/pulls/$PR/files" --paginate \
            --jq '.[] | select(.filename | startswith(".github/workflows/")) | .filename' 2>/dev/null \
            | wc -l | tr -d ' ' || echo "0")
          if [ "${WORKFLOW_CHANGES:-0}" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip Claude address-feedback — PR touches .github/workflows
        if: steps.d021.outputs.skip != 'true' && steps.workflow_change.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          MSG="ℹ️ **AI Factory**: Skipping automated address-feedback — this PR modifies files under \`.github/workflows/\`. The Claude Code Action's OIDC app-token exchange validates that workflow files on the PR branch match \`$DEFAULT_BRANCH\`, so Claude can't push fixes from a PR that changes workflows. **Please address Copilot's inline comments manually** (reply + commit + re-request review), then merge."
          gh pr comment "$PR" --repo "$REPO" --body "$MSG" || true
          # Label transition via REST (avoids gh pr edit's projectCards deprecation — see #611).
          gh api -X DELETE "repos/$REPO/issues/$PR/labels/fact-ready-for-review" >/dev/null 2>&1 || true
          gh api -X POST "repos/$REPO/issues/$PR/labels" -f "labels[]=ai-awaiting-owner" >/dev/null

      - name: Use role-specific CLAUDE.md
        run: |
          # Guarded: PR branches that predate #627 don't carry .claude-contexts/.
          # Fall back to the repo's default CLAUDE.md (see ai-pr-review.yml for
          # the same pattern; recovery for PRs #629/#640/#645-650 on 2026-05-16
          # hit the unguarded `cp`).
          if [ -f .claude-contexts/feedback.md ]; then
            cp .claude-contexts/feedback.md CLAUDE.md
            # Hide the swap from git so workflows that commit/push
            # (worker, address-feedback, ci-remediation) don't sweep
            # it into commits, and `git rebase` (mergeability) isn't
            # blocked by an uncommitted tracked-file change.
            git update-index --skip-worktree CLAUDE.md
          else
            echo "::notice::.claude-contexts/feedback.md not present on this ref (predates #627); using default CLAUDE.md"
          fi

      - name: Address Review Feedback
        id: address
        if: steps.d021.outputs.skip != 'true' && steps.workflow_change.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          # PAT for assigning copilot-pull-request-reviewer[bot]; GITHUB_TOKEN
          # silently drops Copilot reviewer requests. Claude must use this
          # specifically when calling requested_reviewers (see prompt below).
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --permission-mode bypassPermissions --max-turns 80"
          allowed_bots: "claude[bot],copilot-pull-request-reviewer[bot],github-actions[bot]"
          prompt: |
            You are addressing review feedback on PR #${{ needs.resolve.outputs.pr_number }}.
            Trigger reason: ${{ needs.resolve.outputs.reason }}.

            ## Process
            1. Fetch ALL unresolved review threads on the PR:
               `gh api repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}/comments --paginate`
               and the review summaries:
               `gh api repos/${{ github.repository }}/pulls/${{ needs.resolve.outputs.pr_number }}/reviews --paginate`
               Ignore any threads already resolved or where the latest reply is from claude[bot] or github-actions[bot] (avoid loops).
            2. Also check CI status:
               `gh pr checks ${{ needs.resolve.outputs.pr_number }}`

            ## What to fix (DO these):
            - Typos, naming, and formatting issues (including Spanish accents)
            - Type corrections and import cleanup
            - Simple logic corrections with obvious fixes
            - Bug fixes called out by a reviewer with a clear suggestion
            - Documentation improvements
            - Minor refactors suggested by the reviewer
            - Lint and style issues
            - Adding missing tests when the reviewer explicitly asked for them
            - CI failures that are straightforward (lint/type/import/trivial tests)

            ## What NOT to fix (reply and skip):
            - Architectural redesigns
            - Algorithm rewrites
            - Subjective style preferences with no clear consensus
            - Performance optimizations requiring benchmarks
            - Changes that would significantly alter the PR scope

            ## For each review comment — MANDATORY reply protocol:
            Every single comment MUST get a reply. No exceptions.

            1. If you fix it:
               - Apply the fix in code
               - Reply to the EXACT comment thread using:
                 ```bash
                 gh api repos/${{ github.repository }}/pulls/comments/{COMMENT_ID}/replies \
                   --method POST -f body="Fixed: <one sentence describing the exact change made>"
                 ```
               - The reply must reference the fix specifically (file, line, what changed)

            2. If you skip it:
               - Reply explaining WHY in one sentence:
                 ```bash
                 gh api repos/${{ github.repository }}/pulls/comments/{COMMENT_ID}/replies \
                   --method POST -f body="Skipped: <reason — e.g. 'architectural change outside this PR scope'>"
                 ```

            3. For top-level review summaries (not inline):
               - Use issue comments: `gh api repos/${{ github.repository }}/issues/{PR_NUMBER}/comments --method POST -f body="..."`

            IMPORTANT: Use the comment's `id` field (not `pull_request_review_id`) for replies.
            Verify each reply was posted by checking the response — do not silently fail.

            ## Commit strategy
            - Stage all fixes and commit with: `fix: address review feedback (round N)`
            - Push to the PR branch
            - If CI was failing, your commit must fix it. Run the same commands CI runs.

            ## Completion
            - Do **NOT** call `requested_reviewers` from this step. Per D-021 the
              cycle is exactly 1 Copilot pass + 1 Opus pass; the workflow decides
              the next review step (transition to `fact-phase-opus` or to
              `ai-awaiting-owner`) after you push.
            - Post a single summary comment listing: threads addressed (with fix), threads skipped
              (with reason), files touched, tests run.
            - If you could NOT address something and need human input, post a comment tagging
              @alvarolobato explaining precisely what is blocking you. Then exit normally — do NOT
              error out, so the workflow records the blocked state.

            ## Important
            - NEVER use --no-verify or bypass pre-commit hooks.
            - NEVER force-push.
            - Read-only SQL policy still applies (no INSERT/UPDATE/DELETE in production queries).
            - Stay within this PR's scope — do not pull in unrelated work.

      - name: Fetch CI handoff helper from default branch
        if: success() && steps.d021.outputs.skip != 'true' && steps.workflow_change.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github/scripts
          gh api "repos/${{ github.repository }}/contents/.github/scripts/ci-handoff-state.sh?ref=${{ github.event.repository.default_branch }}" \
            | jq -r '.content' | base64 -d > .github/scripts/ci-handoff-state.sh
          chmod +x .github/scripts/ci-handoff-state.sh

      - name: Route next automated review (or converge)
        id: route
        if: success() && steps.d021.outputs.skip != 'true' && steps.workflow_change.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          # PAT-capable token for Copilot reviewer assignment. GITHUB_TOKEN
          # cannot assign copilot-pull-request-reviewer[bot]. Only used on
          # the explicit requested_reviewers POST; all other gh calls still
          # use GITHUB_TOKEN to keep PAT rate-limit spend minimal.
          COPILOT_TOKEN: ${{ secrets.COPILOT_PAT || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          CURRENT_SHA=$(gh api "repos/$REPO/pulls/$PR" --jq '.head.sha')
          INITIAL_SHA="${{ steps.initial_head.outputs.sha }}"
          LABELS=$(gh api "repos/$REPO/pulls/$PR" --jq '[.labels[].name] | join(",")')

          ci_state() { bash .github/scripts/ci-handoff-state.sh "$REPO" "$PR"; }

          # Label-ops helpers — use REST API instead of `gh pr edit` because
          # the latter exits non-zero on a Projects(classic) GraphQL
          # deprecation warning even on success, forcing every call to be
          # `|| true`-swallowed and hiding real failures. See issue #611.
          # POST is strict (real failures fail loud); DELETE is idempotent
          # (404 on absent label is OK and silenced).
          labels_add() {
            local pr="$1"; shift
            for l in "$@"; do
              gh api -X POST "repos/$REPO/issues/$pr/labels" -f "labels[]=$l" >/dev/null
            done
          }
          labels_remove() {
            local pr="$1"; shift
            for l in "$@"; do
              gh api -X DELETE "repos/$REPO/issues/$pr/labels/$l" >/dev/null 2>&1 || true
            done
          }

          # Did a non-claude, non-github-actions reviewer actually submit a review?
          # Copilot posts as `Copilot` (user) or `copilot-pull-request-reviewer[bot]`.
          # A human is anything else that isn't claude[bot]/github-actions[bot].
          has_real_review() {
            local count
            count=$(gh api "repos/$REPO/pulls/$PR/reviews" \
              --jq '[.[] | select(.user.login != "claude[bot]" and .user.login != "github-actions[bot]")] | length' 2>/dev/null || echo "0")
            [ "${count:-0}" -gt 0 ]
          }

          # Is there an unresolved Copilot review request still pending?
          copilot_review_pending() {
            gh api "repos/$REPO/pulls/$PR/requested_reviewers" \
              --jq '[.users[]?.login, .teams[]?.slug] | map(select(. == "Copilot" or . == "copilot-pull-request-reviewer")) | length' 2>/dev/null \
              | grep -qv '^0$'
          }

          owner_handoff_or_ci_gate() {
            local hs
            hs=$(ci_state)
            gh label create "fact-ci-failing" --color D93F0B --description "CI failed; bot may auto-remediate" 2>/dev/null || true

            # Guard against falsely converging: never add ai-awaiting-owner unless a
            # real (non-claude) review actually exists on the PR. If the Copilot
            # request silently failed upstream (e.g. GITHUB_TOKEN lacks permission),
            # re-request and bail out instead of falsely claiming the cycle converged.
            if ! has_real_review; then
              echo "::warning::No real (non-claude) review on PR #$PR — not converging."
              if copilot_review_pending; then
                gh pr comment "$PR" --repo "$REPO" --body "⏳ **AI Factory**: Automated address-feedback ran, but **no Copilot or human review has landed yet**. Leaving the review request pending — will re-check on next trigger." || true
                return 0
              fi
              # No review and no pending request — retry Copilot with the PAT-capable token.
              local post_result copilot_added
              post_result=$(GH_TOKEN="$COPILOT_TOKEN" gh api "repos/$REPO/pulls/$PR/requested_reviewers" --method POST \
                -f 'reviewers[]=copilot-pull-request-reviewer[bot]' 2>&1 || true)
              copilot_added=$(printf '%s' "$post_result" | jq -r '[.requested_reviewers[]?.login] | map(select(. == "Copilot" or . == "copilot-pull-request-reviewer")) | length' 2>/dev/null || echo "0")
              if [ "${copilot_added:-0}" -gt 0 ]; then
                gh pr comment "$PR" --repo "$REPO" --body "🔁 **AI Factory**: No Copilot/human review found on PR — re-requested **Copilot** review before converging." || true
              else
                labels_add "$PR" ai-blocked
                gh pr comment "$PR" --repo "$REPO" --body "⚠️ **AI Factory**: No Copilot/human review found **and** re-requesting Copilot returned no reviewer. This happens when \`secrets.COPILOT_PAT\` is missing (GITHUB_TOKEN cannot assign Copilot) or the PAT lacks \`pull_requests: write\`. Not marking \`ai-awaiting-owner\`. cc @alvarolobato — set \`COPILOT_PAT\` or request the review manually." || true
              fi
              return 0
            fi

            # Tri-state ci_state returns one of: ready | failing | running | unknown.
            # Each branch handles its own label state. Crucially, `fact-ci-failing`
            # is added **only** when state is `failing` — never when it is
            # `running` or `unknown`. Adding it prematurely while checks are
            # still in progress makes the PR look broken in dashboards, triggers
            # the watchdog's CI-failing handler, and forces a later cleanup.
            # See issue #610.
            if [ "$hs" = "ready" ]; then
              labels_remove "$PR" fact-ci-failing
              labels_add "$PR" ai-awaiting-owner
              gh pr comment "$PR" --repo "$REPO" --body "$1" || true
              return 0
            fi
            if [ "$hs" = "failing" ]; then
              labels_remove "$PR" ai-awaiting-owner
              labels_add "$PR" fact-ci-failing
              gh pr comment "$PR" --repo "$REPO" \
                --body "⚠️ **AI Factory**: Automated review is done, but **CI is failing** — not marking \`ai-awaiting-owner\`. Added \`fact-ci-failing\`. An **AI CI remediation** workflow will run (or re-run \`ai-ci-remediation.yml\` manually)." || true
              gh workflow run ai-ci-remediation.yml --repo "$REPO" --field pr_number="$PR" || true
            else
              # hs is "running" or "unknown" — transient. Do NOT add
              # fact-ci-failing AND do NOT strip ai-awaiting-owner: a prior
              # converged pass may have legitimately set it (both rounds done +
              # CI green). Stripping on a transient read un-converges the PR and
              # forces a watchdog recovery loop (observed on PR #781). The
              # `ready` branch above re-affirms ai-awaiting-owner on the next
              # pass once CI greens. See D-039.
              gh pr comment "$PR" --repo "$REPO" \
                --body "⏳ **AI Factory**: Automated review is done, CI not green *yet* — leaving labels as-is; will re-check after CI finishes." || true
            fi
          }

          converge_comment() {
            labels_remove "$PR" fact-ready-for-review ai-blocked fact-auto-retry
            owner_handoff_or_ci_gate "✅ Review cycle converged — no new changes required. PR is ready for human merge decision."
          }

          if [ "$CURRENT_SHA" = "$INITIAL_SHA" ]; then
            echo "No commits pushed — nothing to re-review."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            converge_comment
            exit 0
          fi

          echo "Commits pushed ($INITIAL_SHA → $CURRENT_SHA)."
          echo "pushed=true" >> "$GITHUB_OUTPUT"

          # Phased: 1× Copilot then 1× Opus — see ai-worker.yml / ai-pr-review.yml
          # Ensure phase/handoff labels exist; if any are missing, the single
          # multi-label `gh pr edit` below would fail and leave the PR stuck.
          gh label create "fact-phase-copilot" --color "0052cc" --description "AI Factory: Copilot review in progress" 2>/dev/null || true
          gh label create "fact-phase-opus" --color "6f42c1" --description "AI Factory: Opus review in progress" 2>/dev/null || true
          gh label create "fact-cp-after-1" --color "0e8a16" --description "AI Factory: addressed Copilot review" 2>/dev/null || true
          gh label create "fact-o-after-1" --color "0e8a16" --description "AI Factory: addressed Opus review" 2>/dev/null || true
          gh label create "fact-ready-for-review" --color "fbca04" --description "AI Factory: PR ready for automated review" 2>/dev/null || true

          # D-021: defensive bail in case both round markers are already set.
          # The job-level d021 step catches the common case before the
          # claude-code-action runs; this catches the rarer case where the
          # bot's address-feedback session itself completed both rounds.
          if echo ",$LABELS," | grep -q ",fact-cp-after-1," \
             && echo ",$LABELS," | grep -q ",fact-o-after-1,"; then
            echo "Both fact-cp-after-1 + fact-o-after-1 set — D-021 converged."
            labels_remove "$PR" fact-phase-copilot fact-phase-opus fact-ready-for-review ai-blocked fact-auto-retry
            owner_handoff_or_ci_gate "✅ **AI Factory**: Both review rounds (Copilot + Opus) addressed. PR is ready for human merge decision."
            exit 0
          fi

          if echo ",$LABELS," | grep -q ",fact-phase-copilot,"; then
            if echo ",$LABELS," | grep -q ",fact-cp-after-1,"; then
              # Self-heal: a prior transition partially applied (both labels present).
              # Complete the label move without re-dispatching Opus review.
              labels_add "$PR" fact-phase-opus fact-ready-for-review
              labels_remove "$PR" fact-phase-copilot ai-blocked fact-auto-retry
              gh pr comment "$PR" --body "🤖 **AI Factory**: Self-healed partial phase transition — cleared \`fact-phase-copilot\`." || true
              exit 0
            fi
            # The label transition is what gates Opus (ai-pr-review now fires
            # only on `fact-ready-for-review` per D-031). If it fails, the chain
            # is broken — let it fail loudly so the watchdog can re-fire.
            #
            # Also strip ai-blocked + fact-auto-retry here: when this runs after
            # recovering from a transient failure, the previous failure handler
            # stamped those labels. The Opus-round transition below already
            # clears them; without the same cleanup here the PR moves to
            # fact-phase-opus but still looks "blocked", and the watchdog
            # `Stalled fact-ready-for-review` rule skips it (ai-watchdog.yml:263-265).
            labels_add "$PR" fact-cp-after-1 fact-phase-opus fact-ready-for-review
            labels_remove "$PR" fact-phase-copilot ai-blocked fact-auto-retry
            # Belt-and-braces explicit dispatch (the labeled event above
            # already fires ai-pr-review on a healthy repo, but bot-actor
            # label events can be gated by GitHub as `action_required` —
            # this dispatch is the deterministic path). Loud on failure.
            gh workflow run ai-pr-review.yml --repo "$REPO" --field pr_number="$PR"
            gh pr comment "$PR" --body "🤖 **AI Factory**: Copilot review addressed — starting **Opus** review." || true
            exit 0
          fi

          if echo ",$LABELS," | grep -q ",fact-phase-opus,"; then
            if echo ",$LABELS," | grep -q ",fact-o-after-1,"; then
              # Self-heal: prior handoff partially applied. Finish clearing phase labels
              # and re-run the handoff gate — it's idempotent (label + comment only).
              labels_remove "$PR" fact-phase-opus fact-ready-for-review ai-blocked fact-auto-retry
              owner_handoff_or_ci_gate "✅ **AI Factory**: Self-healed partial phase transition — automated reviews complete (Copilot + Opus). PR is ready for human merge decision."
              exit 0
            fi
            labels_add "$PR" fact-o-after-1
            labels_remove "$PR" fact-phase-opus fact-ready-for-review ai-blocked fact-auto-retry
            owner_handoff_or_ci_gate "✅ **AI Factory**: Automated reviews complete (Copilot + Opus). PR is ready for human merge decision."
            exit 0
          fi

          # If we got here, the PR has neither phase label nor a round
          # marker — that's an unexpected state for the post-#519 cycle
          # (every PR enters review via worker `Handle success` adding
          # `fact-phase-copilot`). Log and exit; the watchdog cold-dispatch
          # path will re-enter the flow if appropriate.
          echo "PR #$PR: no phase label and no round marker — unexpected, leaving for watchdog."

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ needs.resolve.outputs.pr_number }}
        run: |
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "$REPO" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh pr comment "$PR" --repo "$REPO" \
            --body "❌ AI Address Feedback failed (rate limit or transient error). Marked \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          # REST API for label adds (see #611). Strict — if the bot can't even
          # stamp ai-blocked, the watchdog has nothing to retry; we want the
          # failure visible in the Actions UI rather than silently swallowed.
          for l in ai-blocked fact-auto-retry; do
            gh api -X POST "repos/$REPO/issues/$PR/labels" -f "labels[]=$l" >/dev/null
          done
