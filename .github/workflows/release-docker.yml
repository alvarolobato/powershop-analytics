# Build and push powershop-etl + powershop-dashboard images when a GitHub
# release is published.
#
# Tagging rules:
#   - Every release gets `:<tag>` (e.g. `:v0.1.0-beta.1` or `:v0.1.0`).
#   - Prereleases also get the rolling `:beta` tag.
#   - Stable releases (non-prerelease) also get the rolling `:latest` tag.
#
# Can also be invoked manually via workflow_dispatch with a release tag —
# this is the trigger release-beta.yml uses, because releases created from
# within a workflow by GITHUB_TOKEN don't fire the `release: published`
# event (GitHub recursion guard).
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
name: Release Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build images for (e.g. v0.1.0-beta.2)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: powershop-etl
            context: ./etl
            dockerfile: ./etl/Dockerfile
          - image: powershop-dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
    steps:
      - name: Resolve release metadata
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
          EVENT_PRERELEASE: ${{ github.event.release.prerelease }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
            # gh release view prints "true"/"false" for isPrerelease
            PRERELEASE=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isPrerelease --jq '.isPrerelease')
          else
            TAG="$EVENT_TAG"
            PRERELEASE="$EVENT_PRERELEASE"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} prerelease=${PRERELEASE}"

      - name: Check out the release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.rel.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ steps.rel.outputs.tag }}
          IS_PRERELEASE: ${{ steps.rel.outputs.prerelease }}
          NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          # Build the multi-line tag list without any leading indentation —
          # docker/build-push-action treats each line literally, and any
          # embedded spaces become part of the tag and fail validation.
          TAGS="${NAMESPACE}/${IMAGE}:${VERSION}"
          if [ "$IS_PRERELEASE" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${NAMESPACE}/${IMAGE}:beta"
          else
            TAGS="${TAGS}"$'\n'"${NAMESPACE}/${IMAGE}:latest"
          fi
          {
            echo 'tags<<TAGS_EOF'
            echo "$TAGS"
            echo 'TAGS_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Tags to push:"
          echo "$TAGS"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
