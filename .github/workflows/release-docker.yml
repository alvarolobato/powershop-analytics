# Build and push powershop-etl + powershop-dashboard images when a GitHub
# release is published.
#
# Tagging rules:
#   - Every release gets `:<tag>` (e.g. `:v0.1.0-beta.1` or `:v0.1.0`).
#   - Prereleases also get the rolling `:beta` tag.
#   - Stable releases (non-prerelease) also get the rolling `:latest` tag.
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
name: Release Docker Images

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: powershop-etl
            context: ./etl
            dockerfile: ./etl/Dockerfile
          - image: powershop-dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        env:
          VERSION: ${{ github.event.release.tag_name }}
          IS_PRERELEASE: ${{ github.event.release.prerelease }}
          NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE: ${{ matrix.image }}
        run: |
          set -euo pipefail
          TAGS="${NAMESPACE}/${IMAGE}:${VERSION}"
          if [ "$IS_PRERELEASE" = "true" ]; then
            TAGS="${TAGS}
          ${NAMESPACE}/${IMAGE}:beta"
          else
            TAGS="${TAGS}
          ${NAMESPACE}/${IMAGE}:latest"
          fi
          {
            echo 'tags<<TAGS_EOF'
            echo "$TAGS"
            echo 'TAGS_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Tags to push:"
          echo "$TAGS"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
