name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check etl/
      - run: ruff format --check etl/
      - name: Verify ETL mappings vs init.sql DDL
        run: python scripts/verify_etl_schema.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r etl/requirements-dev.txt
      - run: pytest etl/tests/ -x --tb=short -q --cov=etl --cov-report=term-missing --cov-report=xml
        env:
          # Tests that need live connections will skip gracefully
          P4D_HOST: ""
          POSTGRES_DSN: ""
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etl-coverage
          path: coverage.xml

  dashboard-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: knowledge.ts drift guard
        run: npm run build:knowledge && git diff --exit-code lib/knowledge.ts
      - run: npm run typecheck
      - run: npm test
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-coverage
          path: dashboard/coverage/

  dashboard-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: powershop
          POSTGRES_PASSWORD: powershop
          POSTGRES_DB: powershop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: dashboard
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: powershop
      POSTGRES_PASSWORD: powershop
      POSTGRES_DB: powershop
      DASHBOARD_PORT: "4000"
      DASHBOARD_LLM_PROVIDER: e2e-stub
      # Seeded by the "Load e2e seed data" step (and the specs' beforeAll) and
      # read by the dashboard via the POSTGRES_* vars above — same DB.
      E2E_DATABASE_URL: postgresql://powershop:powershop@localhost:5432/powershop
      # Schema is auto-applied by the dashboard on startup (init.sql)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - name: Load e2e seed data into Postgres
        working-directory: .
        run: dashboard/e2e/fixtures/init-test-db.sh
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright e2e tests
        # Explicit files (not substring filters): the conversation-engine suite,
        # the #800 home/dashboards suites, and the #804 chat/conversations
        # suites. conversation-ui is a pre-existing spec never wired into CI.
        run: npx playwright test e2e/conversation-engine.spec.ts e2e/home.spec.ts e2e/dashboards.spec.ts e2e/chat-dashboard.spec.ts e2e/conversations-screen.spec.ts
      - name: Run LLM-integration e2e (mock provider)
        # Separate step: the provider is read from the server env at launch, so
        # this starts a fresh dev server with the scripted mock adapter active.
        # Unlike e2e-stub (canned reply, no LLM code), `mock` drives the FULL
        # pipeline — assembleRequest → agentic runner → real SQL tools against
        # the seeded Postgres → spec validation → versioned persistence.
        env:
          DASHBOARD_LLM_PROVIDER: mock
        run: npx playwright test e2e/llm-integration.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: dashboard/playwright-report/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./etl
          file: ./etl/Dockerfile
          push: false
          load: true
          tags: powershop-etl:ci-test
