name: AI Auto Release
on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read  # required by the Check CI status step's actions/workflows/ci.yml/runs query

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes since last release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git rev-list --all --count)
          else
            COMMITS=$(git rev-list ${LAST_TAG}..HEAD --count)
          fi
          LAST_TAG="${LAST_TAG:-v0.0.0}"
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT
          echo "commits=${COMMITS}" >> $GITHUB_OUTPUT
          if [ "$COMMITS" -eq "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "No new commits since ${LAST_TAG}. Skipping release."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "${COMMITS} commits since ${LAST_TAG}"
          fi

      - name: Calculate next version
        if: steps.check.outputs.skip == 'false'
        id: version
        run: |
          LAST_TAG="${{ steps.check.outputs.last_tag }}"
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"

          # Parse semver
          VERSION=${LAST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Next version: ${NEW_VERSION}"

      - name: Generate changelog
        if: steps.check.outputs.skip == 'false'
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG="${{ steps.check.outputs.last_tag }}"

          # Get the date of the last tag in ISO 8601 format for the gh search filter
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            SINCE_DATE="2020-01-01T00:00:00Z"
          else
            SINCE_DATE=$(git log -1 --format=%Y-%m-%dT%H:%M:%SZ "${LAST_TAG}")
          fi

          echo "## What's Changed" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          # Collect feature PR numbers to exclude from "Other Changes"
          FEATURE_NUMBERS=$(gh pr list --state merged --base main \
            --search "merged:>=${SINCE_DATE}" \
            --json number,labels \
            --jq '[.[] | select(.labels | map(.name) | any(. == "enhancement" or . == "ai-idea")) | .number] | join(",")' \
            2>/dev/null || echo "")

          BUG_NUMBERS=$(gh pr list --state merged --base main \
            --search "merged:>=${SINCE_DATE}" \
            --json number,labels \
            --jq '[.[] | select(.labels | map(.name) | any(. == "bug" or . == "ai-bug")) | .number] | join(",")' \
            2>/dev/null || echo "")

          # Build exclusion set for "Other Changes"
          LISTED_NUMBERS="${FEATURE_NUMBERS},${BUG_NUMBERS}"

          echo "### Features" >> /tmp/changelog.md
          gh pr list --state merged --base main \
            --search "merged:>=${SINCE_DATE}" \
            --json number,title,labels \
            --jq '.[] | select(.labels | map(.name) | any(. == "enhancement" or . == "ai-idea")) | "- \(.title) (#\(.number))"' \
            >> /tmp/changelog.md 2>/dev/null || true
          echo "" >> /tmp/changelog.md

          echo "### Bug Fixes" >> /tmp/changelog.md
          gh pr list --state merged --base main \
            --search "merged:>=${SINCE_DATE}" \
            --json number,title,labels \
            --jq '.[] | select(.labels | map(.name) | any(. == "bug" or . == "ai-bug")) | "- \(.title) (#\(.number))"' \
            >> /tmp/changelog.md 2>/dev/null || true
          echo "" >> /tmp/changelog.md

          echo "### Other Changes" >> /tmp/changelog.md
          # PRs without enhancement/ai-idea/bug/ai-bug labels are listed here.
          # NOTE: gh's --jq is a single-string flag and cannot accept jq's
          # `--arg` / `--argjson` directly. We previously passed
          # `--jq --argjson listed [...] '<expr>'`, which made "--argjson"
          # the value of --jq and silently broke the call (so this section
          # was empty in every release). The label `select` already excludes
          # the feature/bug PRs, so the number-based exclusion isn't needed.
          gh pr list --state merged --base main \
            --search "merged:>=${SINCE_DATE}" \
            --json number,title,labels \
            --jq '.[] | select(.labels | map(.name) | all(. != "enhancement" and . != "ai-idea" and . != "bug" and . != "ai-bug")) | "- \(.title) (#\(.number))"' \
            >> /tmp/changelog.md 2>/dev/null || true
          echo "" >> /tmp/changelog.md

          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.version }}" >> /tmp/changelog.md

      - name: Check CI status on main
        if: steps.check.outputs.skip == 'false'
        id: ci_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Why workflow_runs (ci.yml) and not commits/<sha>/check-runs:
          # The legacy Commit Status API (gh api .../commits/main/status) returns
          # 'pending' with total_count=0 because this repo's CI runs only as
          # Check Runs, never as Commit Statuses.
          # The Check Runs API on main HEAD also doesn't work cleanly: this
          # repo runs many factory workflows (review, address, resolve, scan,
          # ...) that fire continuously on PR events and leave check-runs in
          # 'in_progress' or 'failure' on main HEAD. A bare `commits/main/check-runs`
          # query would always return 'pending' or 'failure' even when the real
          # CI workflow (ci.yml) is fully green.
          # The robust query is "what was the latest ci.yml workflow run on main?"
          # — that ignores all other workflows by design.
          CI_STATUS=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?branch=${{ github.event.repository.default_branch }}&per_page=1" \
            --jq '.workflow_runs[0] // {} |
                  if (.status // "") != "completed" then "pending"
                  elif .conclusion == "success" then "success"
                  else "failure"
                  end' 2>/dev/null || echo "unknown")
          echo "ci_status=${CI_STATUS}" >> "$GITHUB_OUTPUT"
          if [ "$CI_STATUS" != "success" ]; then
            echo "Latest ci.yml run on main is '${CI_STATUS}' (expected 'success'). Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Latest ci.yml run on main: success. Proceeding with release."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.skip == 'false' && steps.ci_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file /tmp/changelog.md \
            --target main
