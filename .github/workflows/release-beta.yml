# Nightly beta release — creates a GitHub prerelease tag (vX.Y.Z-beta.N) if
# there are commits since the last tag. Also triggerable manually.
#
# After creating the release, this workflow explicitly dispatches
# release-docker.yml to build and push the ETL + Dashboard images. We
# can't rely on the `release: published` trigger because releases created
# by GITHUB_TOKEN inside a workflow intentionally do NOT fire downstream
# workflow events (GitHub recursion guard).
name: Release Beta

on:
  schedule:
    # 01:00 UTC nightly — runs after ai-auto-release (20:00 Sunday weekly stable).
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      base_version:
        description: "Base version for the next beta (e.g. 0.1.0). Leave empty to reuse the latest tag's base."
        required: false
        type: string
      force:
        description: "Create a beta release even if there are no new commits"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write  # needed to dispatch release-docker.yml after publishing

concurrency:
  group: release-beta
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Always compute the changelog and create the tag from main, even when
       # `workflow_dispatch` is triggered from a feature branch — otherwise the
       # release notes can describe commits that don't match the tagged ref.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Compute next beta tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BASE_VERSION: ${{ inputs.base_version }}
          INPUT_FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail

          LAST_TAG=$(git tag --sort=-v:refname | head -n1 || true)
          echo "Last tag: ${LAST_TAG:-<none>}"

          # Pick the base version: explicit input > last tag's base > 0.1.0
          if [ -n "${INPUT_BASE_VERSION:-}" ]; then
            BASE="${INPUT_BASE_VERSION#v}"
          elif [ -n "$LAST_TAG" ]; then
            # Strip leading v, strip -beta.N / -rc.N / any pre-release suffix
            BASE="${LAST_TAG#v}"
            BASE="${BASE%%-*}"
          else
            BASE="0.1.0"
          fi
          echo "Base version: $BASE"

          # Determine next beta number for this base
          LATEST_BETA_FOR_BASE=$(git tag --list "v${BASE}-beta.*" --sort=-v:refname | head -n1 || true)
          if [ -z "$LATEST_BETA_FOR_BASE" ]; then
            NEXT_N=1
          else
            N="${LATEST_BETA_FOR_BASE##*-beta.}"
            NEXT_N=$((N + 1))
          fi
          NEW_TAG="v${BASE}-beta.${NEXT_N}"

          # Skip if no commits since last tag (unless forced or no tag yet)
          if [ -n "$LAST_TAG" ] && [ "${INPUT_FORCE:-false}" != "true" ]; then
            COMMITS=$(git rev-list "${LAST_TAG}..HEAD" --count)
            echo "Commits since ${LAST_TAG}: ${COMMITS}"
            if [ "$COMMITS" -eq 0 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No new commits — skipping beta release."
              exit 0
            fi
          fi

          echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "last_tag=${LAST_TAG}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Check CI on default branch
        if: steps.version.outputs.skip != 'true'
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          CI_STATUS=$(gh api "repos/${{ github.repository }}/commits/${DEFAULT_BRANCH}/status" --jq '.state' 2>/dev/null || echo "unknown")
          echo "status=${CI_STATUS}" >> "$GITHUB_OUTPUT"
          if [ "$CI_STATUS" != "success" ]; then
            echo "::warning::CI on ${DEFAULT_BRANCH} is '${CI_STATUS}'. Proceeding with beta anyway (beta allows WIP)."
          fi

      - name: Build changelog
        if: steps.version.outputs.skip != 'true'
        id: changelog
        env:
          GH_TOKEN: ${{ github.token }}
          LAST_TAG: ${{ steps.version.outputs.last_tag }}
        run: |
          set -euo pipefail
          NOTES=/tmp/beta-notes.md
          {
            echo "## Beta ${{ steps.version.outputs.tag }}"
            echo
            if [ -n "${LAST_TAG:-}" ]; then
              echo "Changes since \`${LAST_TAG}\`:"
              echo
              # Use --max-count (not `| head`) so we don't SIGPIPE git under
              # `set -o pipefail` when there are more than 50 commits.
              git log "${LAST_TAG}..HEAD" --max-count=50 --pretty=format:'- %s (%h)' --no-merges
              echo
              echo
              echo "**Full diff**: https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.tag }}"
            else
              echo "First beta release."
            fi
          } > "$NOTES"
          echo "path=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create prerelease with deploy assets
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # `docker-compose.prod.yml` and `wren-config.yaml` are the two
          # files install-prod.sh downloads per release — attach them so
          # installers don't need to clone the repo at exactly the right
          # commit.
          gh release create "$TAG" \
            --title "$TAG (beta)" \
            --notes-file "${{ steps.changelog.outputs.path }}" \
            --target "${{ github.event.repository.default_branch }}" \
            --prerelease \
            docker-compose.prod.yml \
            wren-config.yaml

      - name: Dispatch release-docker.yml
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Releases created by GITHUB_TOKEN do not fire the `release:
          # published` event, so we dispatch release-docker.yml directly.
          gh workflow run release-docker.yml \
            --ref "${{ github.event.repository.default_branch }}" \
            --field "tag=$TAG"
          echo "Dispatched release-docker.yml for $TAG."
