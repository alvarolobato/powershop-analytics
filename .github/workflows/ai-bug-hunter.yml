name: AI Bug Hunter
on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Load knowledge bundle
        id: load-knowledge
        uses: ./.github/actions/load-knowledge
        with:
          slices: data-decisions,etl-sync-strategy

      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/audit.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Hunt for Bugs
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-6 --permission-mode bypassPermissions --max-turns 60"
          prompt: |
            ${{ steps.load-knowledge.outputs.bundle }}

            ---

            You are the Bug Hunter. Scan the codebase for bugs and potential issues.

            ## Focus areas (prioritize recently changed files)
            Run `git log --oneline -20 --name-only` to find recently changed files.

            ### ETL (etl/)
            - Null handling in data transformations
            - Connection error recovery
            - Data type mismatches between 4D and PostgreSQL
            - Missing error handling in sync modules
            - Off-by-one errors in pagination/batching
            - Race conditions in concurrent operations

            ### Dashboard (dashboard/)
            - Unhandled promise rejections in API routes
            - Missing null checks on database results
            - SQL injection in query construction
            - Missing input validation
            - Error states not handled in components
            - Memory leaks in useEffect hooks

            ### CLI (cli/)
            - Unquoted variables in shell scripts
            - Missing error checks after commands
            - Path traversal risks

            ## Rules
            - Only report GENUINE bugs, not style preferences
            - Each finding must have: severity, file, line (approx), description, evidence
            - Check existing [bug-hunter] issues to avoid duplicates

            ## Output
            If bugs found, create ONE issue with title prefix `[bug-hunter]`:
            - Group findings by severity (critical, high, medium, low)
            - Include code snippets showing the bug
            - Suggest fixes

            If no bugs found, do NOT create an issue. Silence is better than noise.

            ## After you create a bug issue (required)
            After `gh issue create` prints the URL, add only the `bug` label:

            ```bash
            gh issue edit N --add-label "bug"
            ```

            Do **NOT** add `ai-work` or `fact-task`. The human owner reviews bug issues
            and decides whether to dispatch the AI worker. Adding `ai-work` automatically
            triggers implementation without human approval — that is not acceptable for
            bugs found by automated scanning.
