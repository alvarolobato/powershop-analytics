name: AI Factory Manager

# Strategic oversight layer above the watchdog (issue #558, D-029-context).
# The watchdog (every 15 min) handles fast rule-per-object recovery.
# The manager (every 4 h) handles cross-system patterns, drift detection,
# stale/superseded cleanup, and decision-requests that need owner sign-off.
#
# Boundary policy (per .github/ai-factory/prompts/factory-manager.md):
#   ✅ Autonomous: triage labels, close stale/superseded issues, file spec
#                 issues, log session reports.
#   🟡 Decision-request only: anything that changes process or thresholds.
#   🛑 Never: merge PRs, modify .github/workflows/* (see D-029), touch
#            credentials, override no-ai / needs-human-approval / no-ai-manager.

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: ai-factory-manager
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  # NOTE: 'workflows' is intentionally absent. The manager's prompt forbids
  # editing .github/workflows/* (D-029); even if it tried, the App token
  # would be rejected.
  actions: write
  id-token: write

jobs:
  manager:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # ── Kill switch ────────────────────────────────────────────────────────
      - name: Kill-switch check (no-ai-manager)
        id: killswitch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          killers=$(gh issue list \
            --label no-ai-manager --state open --limit 5 \
            --json number,title \
            --jq '[.[] | "#\(.number) \(.title)"] | join("; ")')
          if [ -n "$killers" ]; then
            echo "🛑 Kill switch active. Exiting clean. Active: $killers"
            echo "kill=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Kill switch not active; proceeding."
          echo "kill=false" >> "$GITHUB_OUTPUT"

      # ── Defensive label pre-create (idempotent) ────────────────────────────
      # The labels below already exist on this repo (from PR #564's partial
      # work) and the Pass 5 prompt depends on them — its idempotency check
      # is keyed off `fact-parent-verified` / `fact-parent-incomplete` being
      # present on the parent issue. If anyone ever deletes them (or the
      # workflow runs on a fork without them), `gh issue edit --add-label`
      # fails 422 and Pass 5 would re-verify the same parent every cron tick,
      # posting duplicate verdict comments forever. Mirrors the defensive
      # pattern in ai-address-feedback.yml / ai-worker.yml. `|| true` keeps
      # the step green when the label already exists (gh returns non-zero in
      # that case).
      - name: Ensure manager labels exist
        if: steps.killswitch.outputs.kill != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create fact-parent-verified   --color 0e8a16 --description "Pass 5: parent DoD verified" 2>/dev/null || true
          gh label create fact-parent-incomplete --color d93f0b --description "Pass 5: parent has gaps"     2>/dev/null || true
          gh label create agent-efficiency     --color 1d76db --description "Factory/agent infra improvement (target of manager follow-up issues)" 2>/dev/null || true

      # ── Tracking-issue discovery (shared with failure handler) ────────────
      - name: Discover tracking issue
        if: steps.killswitch.outputs.kill != 'true'
        id: tracking
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          num=$(gh issue list \
            --label fact-manager-tracking --state open --limit 1 \
            --json number --jq '.[0].number // ""')
          if [ -z "$num" ]; then
            echo "::warning::No open issue carries 'fact-manager-tracking' label. Session report will be skipped."
          fi
          echo "issue=$num" >> "$GITHUB_OUTPUT"

      # ── Build MANAGER_CONTEXT.md ──────────────────────────────────────────
      - name: Build MANAGER_CONTEXT.md
        if: steps.killswitch.outputs.kill != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TRACKING_ISSUE: ${{ steps.tracking.outputs.issue }}
        run: |
          set -euo pipefail
          : > MANAGER_CONTEXT.md
          now_iso=$(date -u +%FT%TZ)
          since_24h=$(date -u -d '24 hours ago' +%FT%TZ)

          {
            echo "# Manager Context — $now_iso"
            echo
            echo "Generated by .github/workflows/ai-factory-manager.yml. Read this"
            echo "instead of independently enumerating issues/PRs (per the prompt)."
            echo
            echo "## Tracking issue"
            echo
            if [ -n "${TRACKING_ISSUE:-}" ]; then
              echo "Tracking issue: #${TRACKING_ISSUE} — post your session report there."
            else
              echo "**No tracking issue found.** Skip the session-report pass; flag in your report draft anyway."
            fi
            echo

            echo "## Open issues (Actionable column = no for needs-human-approval / no-ai — all rows listed per prompt's 'Walk every open issue')"
            echo
            echo "| # | Title | Labels | Age (d) | Last activity (d ago) | Actionable |"
            echo "|---|---|---|---|---|---|"
            gh issue list --state open --limit 300 \
              --json number,title,labels,createdAt,updatedAt \
              --jq '
                def age($t): ((now - ($t | fromdateiso8601)) / 86400 | floor);
                .[] | [
                  .number,
                  (.title | gsub("\\|"; "\\\\|") | .[0:80]),
                  ([.labels[].name] | join(",")),
                  age(.createdAt),
                  age(.updatedAt),
                  (if ([.labels[].name] | any(. == "needs-human-approval" or . == "no-ai"))
                   then "no" else "yes" end)
                ] | "| " + (map(tostring) | join(" | ")) + " |"
              '
            echo

            echo "## Open PRs"
            echo
            echo "| # | Title | Labels | mergeStateStatus | Age (d) |"
            echo "|---|---|---|---|---|"
            gh pr list --state open --limit 200 \
              --json number,title,labels,mergeStateStatus,createdAt \
              --jq '
                def age($t): ((now - ($t | fromdateiso8601)) / 86400 | floor);
                .[] | [
                  .number,
                  (.title | gsub("\\|"; "\\\\|") | .[0:80]),
                  ([.labels[].name] | join(",")),
                  (.mergeStateStatus // "UNKNOWN"),
                  age(.createdAt)
                ] | "| " + (map(tostring) | join(" | ")) + " |"
              '
            echo

            echo "## Recent workflow runs (last 24 h, failures bold)"
            echo
            echo "| Workflow | Event | Conclusion | When |"
            echo "|---|---|---|---|"
            gh run list --limit 200 \
              --created ">=$since_24h" \
              --json name,event,conclusion,createdAt \
              --jq '.[] | [
                .name,
                .event,
                (if .conclusion == "failure" then "**failure**" else (.conclusion // "in_progress") end),
                .createdAt
              ] | "| " + (map(tostring) | join(" | ")) + " |"'
            echo

            echo "## business-review + needs-human-approval (read-only — never auto-close)"
            echo
            # NOTE: jq with `.[] | ...` returns exit 0 on an empty array, so
            # `cmd || echo "(none)"` does NOT fall through. Handle emptiness
            # inside jq instead (same pattern used for session-report comments
            # below).
            gh issue list --state open --label business-review --label needs-human-approval --limit 50 \
              --json number,title \
              --jq 'if length == 0 then "(none)" else (map("- #\(.number) \(.title)") | join("\n")) end'
            echo

            echo "## docs/ai-factory.md — Lifecycle in detail (verbatim excerpt)"
            echo
            # Reorder rules so the section-end cutoff fires BEFORE the print
            # action on the boundary H2 line. Use any-H2 cutoff with an
            # explicit Lifecycle-self exclusion (avoids the fragile `[^L]`
            # heuristic that would silently break if a future `## L*` H2 is
            # inserted right after Lifecycle, e.g. `## Limits and Safety`).
            awk '
              /^## Lifecycle in detail/ { flag = 1; print; next }
              /^## / && flag            { flag = 0 }
              flag                      { print }
            ' docs/ai-factory.md || echo "(section not found)"
            echo

            echo "## .github/ai-factory/config.yml (verbatim)"
            echo
            echo '```yaml'
            cat .github/ai-factory/config.yml
            echo '```'
            echo

            echo "## Past 24 h of session-report comments on tracking issue"
            echo
            if [ -n "${TRACKING_ISSUE:-}" ]; then
              # NOTE: gh's `--jq` is a single-string flag that does NOT accept
              # jq's `--arg` (the literal string `--arg` would become the
              # filter and `since`/`$since_24h`/the expression would leak as
              # positional args to `gh issue view`, which accepts only one).
              # ai-watchdog.yml documents this exact gotcha (the watchdog
              # had a silent-failure bug from this antipattern). Pipe to a
              # standalone `jq` instead — that one DOES support `--arg`.
              gh issue view "$TRACKING_ISSUE" --json comments \
                | jq -r --arg since "$since_24h" '
                    [.comments[] | select(.createdAt > $since)]
                    | if length == 0 then "(no comments in the last 24 h — first run of the day)"
                      else (map("---\n\(.createdAt) — @\(.author.login)\n\(.body)\n") | join("\n"))
                      end
                  '
            else
              echo "(no tracking issue)"
            fi
          } >> MANAGER_CONTEXT.md

          echo "Wrote $(wc -l < MANAGER_CONTEXT.md) lines to MANAGER_CONTEXT.md"

      # ── Read prompt into env (for the action's inline `prompt:`) ──────────
      - name: Load prompt
        if: steps.killswitch.outputs.kill != 'true'
        run: |
          {
            echo 'MANAGER_PROMPT<<__PROMPT_EOF__'
            cat .github/ai-factory/prompts/factory-manager.md
            echo
            echo '__PROMPT_EOF__'
          } >> "$GITHUB_ENV"

      # ── Manager step (Opus) ────────────────────────────────────────────────
      - name: Use role-specific CLAUDE.md
        run: |
          cp .claude-contexts/command.md CLAUDE.md
          # Hide the swap from git so workflows that commit/push
          # (worker, address-feedback, ci-remediation) don't sweep
          # it into commits, and `git rebase` (mergeability) isn't
          # blocked by an uncommitted tracked-file change.
          git update-index --skip-worktree CLAUDE.md

      - name: Run Factory Manager (Opus)
        if: steps.killswitch.outputs.kill != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          TRACKING_ISSUE: ${{ steps.tracking.outputs.issue }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          prompt: ${{ env.MANAGER_PROMPT }}

      # ── Failure handler ───────────────────────────────────────────────────
      - name: Post failure note to tracking issue
        if: failure() && steps.killswitch.outputs.kill != 'true' && steps.tracking.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TRACKING_ISSUE: ${{ steps.tracking.outputs.issue }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue comment "$TRACKING_ISSUE" --body "⚠️ Factory Manager run failed at $(date -u +%FT%TZ). [Workflow run]($RUN_URL). No autonomous actions were taken in this run; the watchdog handles per-PR/per-issue stalls independently."
