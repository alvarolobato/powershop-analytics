name: AI PR Review
on:
  pull_request:
    # `synchronize` intentionally omitted — we don't review on every commit.
    # After address-feedback finishes it adds `ai-ready-for-review`, which
    # fires the `labeled` event below. This prevents a review storm on every
    # individual commit pushed during an address-feedback session.
    types: [opened, reopened, ready_for_review, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

# One Opus PR review at a time across the repo — avoids Anthropic rate limits when many PRs move together.
concurrency:
  group: ai-pr-review-global
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  review:
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.event.pull_request.draft == false &&
        !contains(github.event.pull_request.labels.*.name, 'no-pr-review') &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.action != 'labeled' ||
          github.event.label.name == 'ai-ready-for-review'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      # Most runs are workflow_dispatch; the label would otherwise linger and the
      # watchdog would keep re-dispatching this workflow.
      - name: Clear ai-ready-for-review (best-effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "ai-ready-for-review" \
            --remove-label "ai-awaiting-owner" \
            --remove-label "ai-ci-failing" || true

      - name: Resolve PR ref and title
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          fi
          TITLE=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.title')
          echo "title<<TITLE_EOF" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "TITLE_EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Fetch CI handoff helper from default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github/scripts
          # gh api --jq must receive a single jq expression (-r is not a gh flag here).
          gh api "repos/${{ github.repository }}/contents/.github/scripts/ci-handoff-state.sh?ref=${{ github.event.repository.default_branch }}" \
            | jq -r '.content' | base64 -d > .github/scripts/ci-handoff-state.sh
          chmod +x .github/scripts/ci-handoff-state.sh

      - name: Load review guidelines
        id: guidelines
        run: |
          {
            echo 'CONTENT<<PR_REVIEW_EOF'
            cat .github/ai-factory/prompts/pr-review.md
            echo
            echo 'PR_REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Check Opus review cap (legacy PRs)
        id: cap
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api "repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}" --jq '[.labels[].name] | join(",")')
          SKIP=false
          SKIP_REASON=""

          if echo ",$LABELS," | grep -q ",ai-legacy-opus-2,"; then
            SKIP=true
            SKIP_REASON="legacy-cap-reached"
          fi

          # Claude Code Action's OIDC app-token exchange validates that workflow
          # files on the PR branch match the default branch. If the PR modifies
          # any `.github/workflows/*` file, the exchange fails with 401 and the
          # Claude step hard-errors. Detect that up front and skip cleanly so
          # PRs that edit workflows don't show a spurious red X.
          if [ "$SKIP" != "true" ]; then
            WORKFLOW_CHANGES=$(gh api "repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/files" --paginate \
              --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length' 2>/dev/null || echo "0")
            if [ "${WORKFLOW_CHANGES:-0}" -gt 0 ]; then
              SKIP=true
              SKIP_REASON="workflow-file-change"
            fi
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"

      - name: Skip Claude review — PR touches .github/workflows
        if: steps.cap.outputs.skip == 'true' && steps.cap.outputs.skip_reason == 'workflow-file-change'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "ai-ready-for-review" || true
          # Don't re-request Copilot here — the dispatcher already did. Just
          # explain why Claude can't review this PR so nobody thinks it failed.
          MSG="ℹ️ **AI Factory**: Skipping Claude PR review — this PR modifies files under \`.github/workflows/\`. The Claude Code Action's OIDC app-token exchange validates that workflow files on the PR branch match \`main\`, so self-reviewing a workflow change is blocked by design. **Copilot review still runs** (no such restriction). Merge with human + Copilot review."
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$MSG" || true

      - name: Claude PR Review
        if: steps.cap.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Headless review: tool approvals stall the run; default cap was 35 turns.
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          allowed_bots: "claude[bot],github-actions[bot],copilot-pull-request-reviewer[bot]"
          use_sticky_comment: "true"
          include_fix_links: "true"
          classify_inline_comments: "true"
          prompt: |
            You are reviewing PR #${{ env.PR_NUMBER }}: "${{ steps.resolve.outputs.title }}".

            Follow the review guidelines below. Post a review with inline comments on the PR.

            ## Copilot follow-up (read carefully)
            Run `gh pr view ${{ env.PR_NUMBER }} --json labels -q '.labels[].name'` before you finish.
            - If the PR has label `ai-phase-opus`, do **NOT** request a Copilot review (Opus-only passes; address-feedback is dispatched by CI).
            - Otherwise, after reviewing, request a Copilot review **and verify the request landed**:
            ```bash
            POST_OUT=$(gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/requested_reviewers \
              --method POST -f 'reviewers[]=copilot-pull-request-reviewer[bot]' 2>&1 || true)
            COPILOT_ADDED=$(printf '%s' "$POST_OUT" \
              | jq -r '[.requested_reviewers[]?.login] | map(select(. == "Copilot" or . == "copilot-pull-request-reviewer")) | length' 2>/dev/null || echo "0")
            if [ "${COPILOT_ADDED:-0}" -eq 0 ]; then
              # GITHUB_TOKEN silently dropped the request — surface it loudly.
              gh pr comment ${{ env.PR_NUMBER }} \
                --body "⚠️ **AI Factory**: Requested Copilot review but the API returned no reviewer (likely a token-permissions issue). **Copilot has NOT been requested.** cc @alvarolobato."
            fi
            ```
            Do NOT claim Copilot has reviewed the PR unless you can see an actual review from `Copilot` / `copilot-pull-request-reviewer[bot]` in `gh api repos/{owner}/{repo}/pulls/{PR}/reviews`.

            ---

            ${{ steps.guidelines.outputs.CONTENT }}

      - name: Clear PR review failure labels
        if: success() && steps.cap.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "$PR_NUMBER" --repo "${{ github.repository }}" \
            --remove-label "ai-blocked" --remove-label "ai-auto-retry" || true

      - name: Max automated Opus reviews reached (legacy)
        if: success() && steps.cap.outputs.skip == 'true' && steps.cap.outputs.skip_reason == 'legacy-cap-reached'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ env.PR_NUMBER }}
        run: |
          set -euo pipefail
          gh pr edit "$PR" --repo "$REPO" \
            --remove-label "ai-ready-for-review" \
            --remove-label "ai-auto-retry" || true
          HS=$(bash .github/scripts/ci-handoff-state.sh "$REPO" "$PR")
          gh label create "ai-ci-failing" --color D93F0B --description "CI failed; bot may auto-remediate" 2>/dev/null || true
          if [ "$HS" = "ready" ]; then
            gh pr edit "$PR" --repo "$REPO" --remove-label "ai-ci-failing" || true
            gh pr edit "$PR" --repo "$REPO" --add-label "ai-awaiting-owner" || true
            gh pr comment "$PR" --repo "$REPO" \
              --body "✅ **AI Factory**: This PR has reached the maximum number of automated Opus review passes (**2**). No further Opus runs will be dispatched. Merge or continue manually."
          else
            gh pr edit "$PR" --repo "$REPO" --remove-label "ai-awaiting-owner" || true
            gh pr edit "$PR" --repo "$REPO" --add-label "ai-ci-failing" || true
            if [ "$HS" = "failing" ]; then
              gh pr comment "$PR" --repo "$REPO" \
                --body "⚠️ **AI Factory**: Max automated Opus passes reached, but **CI is failing** — not marking \`ai-awaiting-owner\`. Added \`ai-ci-failing\`. **AI CI remediation** will be dispatched." || true
              gh workflow run ai-ci-remediation.yml --repo "$REPO" --field pr_number="$PR" || true
            else
              gh pr comment "$PR" --repo "$REPO" \
                --body "⏳ **AI Factory**: Max automated Opus passes reached, but **CI is still running** — not marking \`ai-awaiting-owner\` yet." || true
            fi
          fi

      - name: Record legacy Opus pass
        if: success() && steps.cap.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABELS=$(gh api "repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}" --jq '[.labels[].name] | join(",")')
          if echo ",$LABELS," | grep -q ",ai-phase-copilot," || echo ",$LABELS," | grep -q ",ai-phase-opus,"; then
            echo "Phased PR — skip legacy Opus counters."
            exit 0
          fi
          if ! echo ",$LABELS," | grep -q ",ai-legacy-opus-1,"; then
            gh pr edit "${{ env.PR_NUMBER }}" --add-label "ai-legacy-opus-1" || true
          elif ! echo ",$LABELS," | grep -q ",ai-legacy-opus-2,"; then
            gh pr edit "${{ env.PR_NUMBER }}" --add-label "ai-legacy-opus-2" || true
          fi

      - name: Dispatch address-feedback
        if: success() && steps.cap.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Explicitly dispatch address-feedback so it runs via workflow_dispatch,
          # which gets full OIDC permissions. We cannot rely on pull_request_review
          # events from claude[bot] to trigger it — GitHub withholds id-token for
          # bot-actor review events, causing the OIDC exchange to fail.
          gh workflow run ai-address-feedback.yml \
            --repo "${{ github.repository }}" \
            --field pr_number="$PR_NUMBER" \
            --field reason="post-review: addressing claude[bot] review comments" || true
          echo "Dispatched address-feedback for PR #$PR_NUMBER."

      - name: Handle failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "${{ github.repository }}" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          gh pr comment "$PR_NUMBER" \
            --body "⚠️ AI PR Review failed. Marked \`ai-ready-for-review\` + \`ai-blocked\` + \`ai-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          gh pr edit "$PR_NUMBER" \
            --add-label "ai-ready-for-review" --add-label "ai-blocked" --add-label "ai-auto-retry" || true
