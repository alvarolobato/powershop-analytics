name: AI PR Review
# D-033: `run-name` embeds the PR number in the workflow-run title so the
# watchdog can match dispatched runs by `display_title` instead of `head_sha`.
# Without this, `workflow_dispatch` runs record `head_sha = main's SHA` and
# are invisible to filters like `head_sha == PR.headRefOid`, causing the
# watchdog to think "Opus never ran" even after dozens of successful runs.
run-name: >-
  AI PR Review — PR #${{ github.event.pull_request.number || inputs.pr_number }}
on:
  pull_request:
    # Strict Copilot-then-Opus sequencing (D-031, issue #580 fallout):
    # this workflow fires ONLY when `fact-ready-for-review` is applied, which
    # happens at exactly one moment in the lifecycle — when address-feedback
    # finishes addressing the Copilot review and adds `fact-phase-opus +
    # fact-ready-for-review`. Previously `opened`/`reopened`/`ready_for_review`
    # were also in `types:`, which caused Opus to race against Copilot on
    # fresh PRs (PRs #594, #596 both got an Opus review at PR-open time
    # before Copilot had even posted, leaving the chain stuck in
    # `fact-phase-opus` because address-feedback only processed the latest
    # review). Workflow_dispatch remains for manual re-fires.
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

# Per-PR concurrency. The previous global `ai-pr-review-global` group serialised
# every Opus review repo-wide; when many PRs landed at once, downstream steps
# that dispatch this workflow (e.g. the phase-advance in ai-address-feedback)
# stranded PRs in `fact-phase-opus` forever (PR #496 was stuck overnight). Per-PR
# groups still prevent two concurrent reviews of the same PR while letting
# different PRs proceed in parallel. Anthropic-side rate limits are handled by
# the claude-code-action's own retry.
concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  id-token: write

jobs:
  review:
    if: >-
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.event_name == 'pull_request' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'fact-ready-for-review' &&
        github.event.pull_request.draft == false &&
        !contains(github.event.pull_request.labels.*.name, 'no-pr-review') &&
        github.event.pull_request.head.repo.full_name == github.repository
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
    steps:
      # D-021 enforcement: if both Copilot and Opus rounds have already been
      # addressed, this PR is converged. Don't run a third review — it will
      # surface nit-picks that loop with address-feedback (PRs #493 / #495
      # had 4+ Copilot rounds and 5+ Opus rounds before this guard existed).
      #
      # Head-SHA idempotency: prevents duplicate Claude/Opus reviews on the
      # same commit. PR #561 received THREE Claude reviews on the same head
      # SHA (11:54, 11:55, 12:45 on 2026-05-10) because:
      #   - ai-pr-review fires on `opened`, `reopened`, `ready_for_review`,
      #     and `labeled (fact-ready-for-review)`. Each can re-fire while the
      #     prior run hasn't finished tagging `fact-o-after-1`.
      #   - The watchdog `Stuck fact-phase-opus` step (D-021 recovery) can
      #     dispatch ai-pr-review again before the prior workflow has
      #     finished posting its review.
      # Per-PR concurrency does NOT prevent this — it only serializes; the
      # second run still executes and posts a duplicate review. The fix is
      # to detect "claude[bot] already reviewed this exact head SHA" and
      # exit before invoking the LLM.
      #
      # Runs first so we can also short-circuit later steps via this output.
      - name: D-021 + head-SHA idempotency — short-circuit
        id: d021
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid)

          # Head-SHA idempotency: if claude[bot] already submitted a *real*
          # Opus review on this exact commit, skip silently. The first-fired
          # run will post the review and labels; subsequent re-fires must be
          # no-ops.
          #
          # D-033: We must NOT count empty-body `state=COMMENTED` reviews.
          # ai-address-feedback addresses each Copilot inline comment by
          # submitting an inline-reply review (state=COMMENTED, body=""), so
          # after a single round there are typically 3-10 such "reviews" on
          # the new head SHA. Counting them caused every Opus dispatch to
          # short-circuit, leaving PRs stranded in fact-phase-opus until the
          # watchdog stamped ai-blocked (PRs #629, #640, #644-650 — see
          # docs/decisions/D-033-opus-review-marker.md).
          #
          # Real Opus reviews have a non-empty body (the claude-code-action
          # always posts a "## Review summary" header via use_sticky_comment).
          # `(.body | length) > 0` cleanly discriminates.
          #
          # `--paginate` is required: address-feedback can add 3-10 empty-body
          # review submissions per Copilot round, and PRs that go through
          # several rounds easily exceed one page (100 reviews). Without
          # pagination, a real Opus review on a later page would be missed
          # and we'd post a duplicate.
          EXISTING_CLAUDE_REVIEWS=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews?per_page=100" --paginate \
            --jq ".[] | select(.user.login == \"claude[bot]\" and .commit_id == \"$HEAD_SHA\" and (.body | length) > 0) | .id" 2>/dev/null | wc -l | tr -d ' ')
          if ! [[ "$EXISTING_CLAUDE_REVIEWS" =~ ^[0-9]+$ ]]; then
            EXISTING_CLAUDE_REVIEWS=0
          fi
          if [ "${EXISTING_CLAUDE_REVIEWS:-0}" -gt 0 ]; then
            echo "PR #$PR_NUMBER: claude[bot] already submitted $EXISTING_CLAUDE_REVIEWS review(s) on $HEAD_SHA — skipping (head-SHA idempotency, prevents duplicate reviews)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json labels --jq '[.labels[].name] | join(",")')
          if echo ",$LABELS," | grep -q ",fact-cp-after-1," \
             && echo ",$LABELS," | grep -q ",fact-o-after-1,"; then
            echo "PR #$PR_NUMBER already has fact-cp-after-1 + fact-o-after-1 — D-021 converged."
            # Always clean up phase labels (cosmetic; safe).
            # REST API — see #611.
            for l in fact-ready-for-review fact-phase-copilot fact-phase-opus; do
              gh api -X DELETE "repos/$REPO/issues/$PR_NUMBER/labels/$l" >/dev/null 2>&1 || true
            done
            # Owner-handoff label is CI-gated, mirroring `owner_handoff_or_ci_gate`
            # in ai-address-feedback.yml: only mark `ai-awaiting-owner` when CI
            # is green for the head SHA. If `fact-ci-failing` is already set or CI
            # is not (yet) green, leave that label as-is and post a different
            # comment so we don't claim merge-ready prematurely.
            HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid)
            CI_STATE=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
              --jq '[.check_runs[] | .conclusion] | if length == 0 then "running" elif any(. == null) then "running" elif all(. == "success" or . == "skipped" or . == "neutral") then "ready" else "failing" end' \
              2>/dev/null || echo "unknown")
            if echo ",$LABELS," | grep -q ",fact-ci-failing,"; then
              CI_STATE="failing"
            fi
            if [ "$CI_STATE" = "ready" ]; then
              # REST API — see #611 (gh pr edit exits non-zero on projectCards deprecation).
              gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" -f "labels[]=ai-awaiting-owner" >/dev/null
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "ℹ️ **AI Factory**: D-021 — both Copilot and Opus rounds already addressed (\`fact-cp-after-1\` + \`fact-o-after-1\`). Skipping additional review. Awaiting owner merge decision." || true
            else
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "ℹ️ **AI Factory**: D-021 — both rounds already addressed. Skipping additional review. **Not marking \`ai-awaiting-owner\`** because CI is \`$CI_STATE\`." || true
            fi
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif ! echo ",$LABELS," | grep -q ",fact-cp-after-1,"; then
            # fact-cp-after-1 is absent: Copilot hasn't been reviewed+addressed yet.
            # Running Opus now would invert the D-021 order (Copilot → address → Opus).
            # Re-request Copilot and bail out so the correct sequence can complete.
            echo "PR #$PR_NUMBER: fact-cp-after-1 not set — Copilot round not done. Re-requesting Copilot and skipping Opus."
            post_result=$(GH_TOKEN="${COPILOT_PAT:-$GH_TOKEN}" \
              gh api "repos/$REPO/pulls/$PR_NUMBER/requested_reviewers" \
              --method POST -f 'reviewers[]=copilot-pull-request-reviewer[bot]' 2>&1 || true)
            echo "Copilot re-request result: $post_result"
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "⏳ **AI Factory**: Skipping Opus review — Copilot round (D-021 step 1) has not been addressed yet (\`fact-cp-after-1\` absent). Re-requested Copilot review. Opus will run after Copilot + address-feedback completes." || true
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Most runs are workflow_dispatch; the label would otherwise linger and the
      # watchdog would keep re-dispatching this workflow. We DON'T strip
      # ai-awaiting-owner here any more — stripping it on every dispatch was
      # what let the cold-dispatch loop undo the converged state on #493 / #495.
      # The d021 step above already cleans up label state for converged PRs.
      - name: Clear fact-ready-for-review (best-effort)
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # REST API — see #611.
          for l in fact-ready-for-review fact-ci-failing; do
            gh api -X DELETE "repos/${{ github.repository }}/issues/$PR_NUMBER/labels/$l" >/dev/null 2>&1 || true
          done

      - name: Resolve PR ref and title
        id: resolve
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            SHA=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
          fi
          TITLE=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.title')
          echo "title<<TITLE_EOF" >> "$GITHUB_OUTPUT"
          echo "$TITLE" >> "$GITHUB_OUTPUT"
          echo "TITLE_EOF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.d021.outputs.skip != 'true'
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Fetch CI handoff helper from default branch
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github/scripts
          # gh api --jq must receive a single jq expression (-r is not a gh flag here).
          gh api "repos/${{ github.repository }}/contents/.github/scripts/ci-handoff-state.sh?ref=${{ github.event.repository.default_branch }}" \
            | jq -r '.content' | base64 -d > .github/scripts/ci-handoff-state.sh
          chmod +x .github/scripts/ci-handoff-state.sh

      - name: Load review guidelines
        id: guidelines
        if: steps.d021.outputs.skip != 'true'
        run: |
          {
            echo 'CONTENT<<PR_REVIEW_EOF'
            cat .github/ai-factory/prompts/pr-review.md
            echo
            echo 'PR_REVIEW_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Workflow-file gate
        id: cap
        if: steps.d021.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Claude Code Action's OIDC app-token exchange validates that workflow
          # files on the PR branch match the default branch. If the PR modifies
          # any `.github/workflows/*` file, the exchange fails with 401 and the
          # Claude step hard-errors. Detect that up front and skip cleanly so
          # PRs that edit workflows don't show a spurious red X.
          SKIP=false
          SKIP_REASON=""
          WORKFLOW_CHANGES=$(gh api "repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/files" --paginate \
            --jq '[.[] | select(.filename | startswith(".github/workflows/"))] | length' 2>/dev/null || echo "0")
          if [ "${WORKFLOW_CHANGES:-0}" -gt 0 ]; then
            SKIP=true
            SKIP_REASON="workflow-file-change"
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"

      - name: Skip Claude review — PR touches .github/workflows
        if: steps.d021.outputs.skip != 'true' && steps.cap.outputs.skip == 'true' && steps.cap.outputs.skip_reason == 'workflow-file-change'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # REST API — see #611.
          gh api -X DELETE "repos/${{ github.repository }}/issues/$PR_NUMBER/labels/fact-ready-for-review" >/dev/null 2>&1 || true
          # Don't re-request Copilot here — the dispatcher already did. Just
          # explain why Claude can't review this PR so nobody thinks it failed.
          MSG="ℹ️ **AI Factory**: Skipping Claude PR review — this PR modifies files under \`.github/workflows/\`. The Claude Code Action's OIDC app-token exchange validates that workflow files on the PR branch match \`main\`, so self-reviewing a workflow change is blocked by design. **Copilot review still runs** (no such restriction). Merge with human + Copilot review."
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$MSG" || true

      - name: Use role-specific CLAUDE.md
        run: |
          # `.claude-contexts/review.md` was added in #627. PR branches that
          # predate that commit (or get re-dispatched via workflow_dispatch
          # against an older head ref) will be missing the file. The original
          # `cp` was unguarded and hard-failed in that case (recovery dispatch
          # for PRs #629/#640/#645-650 on 2026-05-16 all hit "cp: cannot stat
          # '.claude-contexts/review.md'"). Fall back to the repo's regular
          # CLAUDE.md when the role-specific file is absent — the review
          # still runs, just without the role-tailored context.
          if [ -f .claude-contexts/review.md ]; then
            cp .claude-contexts/review.md CLAUDE.md
            # Hide the swap from git so workflows that commit/push
            # (worker, address-feedback, ci-remediation) don't sweep
            # it into commits, and `git rebase` (mergeability) isn't
            # blocked by an uncommitted tracked-file change.
            git update-index --skip-worktree CLAUDE.md
          else
            echo "::notice::.claude-contexts/review.md not present on this ref (predates #627); using default CLAUDE.md"
          fi

      - name: Claude PR Review
        if: steps.d021.outputs.skip != 'true' && steps.cap.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        env:
          # Default gh auth for every Claude-side call EXCEPT the Copilot
          # reviewer POST; the prompt below switches to $COPILOT_PAT only for
          # that single call.
          GH_TOKEN: ${{ github.token }}
          # PAT for assigning copilot-pull-request-reviewer[bot]; GITHUB_TOKEN
          # silently drops Copilot reviewer requests. Claude must use this
          # specifically when calling requested_reviewers (see prompt below).
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Headless review: tool approvals stall the run; default cap was 35 turns.
          claude_args: "--model claude-opus-4-6 --permission-mode bypassPermissions --max-turns 80"
          allowed_bots: "claude[bot],github-actions[bot],copilot-pull-request-reviewer[bot]"
          use_sticky_comment: "true"
          include_fix_links: "true"
          classify_inline_comments: "true"
          prompt: |
            You are reviewing PR #${{ env.PR_NUMBER }}: "${{ steps.resolve.outputs.title }}".

            Follow the review guidelines below. Post a review with inline comments on the PR.

            **Do NOT request a Copilot review from this step.** D-021 caps the
            automated review cycle at exactly one Copilot pass and one Opus
            pass — no more. Copilot is requested once by `ai-worker.yml`'s
            success path when the PR is first created; the address-feedback
            workflow handles the Copilot → Opus transition. From here, just
            review and exit. Do NOT call `requested_reviewers` for any
            reviewer.

            ---

            ${{ steps.guidelines.outputs.CONTENT }}

      - name: Clear PR review failure labels
        if: success() && steps.d021.outputs.skip != 'true' && steps.cap.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # REST API — see #611.
          for l in ai-blocked fact-auto-retry; do
            gh api -X DELETE "repos/${{ github.repository }}/issues/$PR_NUMBER/labels/$l" >/dev/null 2>&1 || true
          done

      - name: Advance Opus round — converge inline, or dispatch for inline comments
        if: success() && steps.d021.outputs.skip != 'true' && steps.cap.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          # The Opus round is complete the moment claude[bot] submits its review
          # (D-021: no third round). What happens next depends on whether Opus
          # left actionable inline comments:
          #   • zero inline comments (the common LGTM case) → nothing for
          #     address-feedback to change, so converge INLINE here. This removes
          #     the dependency on a separately dispatched workflow_dispatch run
          #     actually starting — the gap that stranded #778/#779/#781 behind a
          #     slow watchdog recovery (D-035 bot-actor gating). See D-039.
          #   • ≥1 inline comment → dispatch address-feedback (full OIDC via
          #     workflow_dispatch) to apply the fixes; it owns convergence after
          #     pushing commits. We can't rely on the bot-actor pull_request_review
          #     event to trigger it — GitHub withholds id-token for bot reviews.
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefOid --jq .headRefOid)
          # --paginate prints one length per page, so sum them (awk) instead of
          # reading a multi-line "100\n2" value that would break the -gt test.
          OPUS_INLINE=$(gh api "repos/$REPO/pulls/$PR_NUMBER/comments?per_page=100" --paginate \
            --jq "[.[] | select(.user.login == \"claude[bot]\" and .commit_id == \"$HEAD_SHA\")] | length" 2>/dev/null \
            | awk '{s+=$1} END{print s+0}')

          if [ "${OPUS_INLINE:-0}" -gt 0 ]; then
            echo "Opus left $OPUS_INLINE inline comment(s) on $HEAD_SHA — dispatching address-feedback to apply fixes."
            # Leave fact-phase-opus in place: if this dispatch is dropped, the
            # watchdog's `Stuck fact-phase-opus` step re-dispatches address-feedback.
            gh workflow run ai-address-feedback.yml \
              --repo "$REPO" \
              --field pr_number="$PR_NUMBER" \
              --field reason="post-review: addressing claude[bot] inline comments" || true
            echo "Dispatched address-feedback for PR #$PR_NUMBER."
            exit 0
          fi

          echo "Opus left no inline comments — converging inline (D-021 both rounds done)."
          # Mark the Opus round complete and clear in-flight phase labels. REST
          # API (gh pr edit exits non-zero on the projectCards deprecation, #611).
          gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" \
            -f 'labels[]=fact-cp-after-1' -f 'labels[]=fact-o-after-1' >/dev/null || true
          for l in fact-phase-copilot fact-phase-opus fact-ready-for-review; do
            gh api -X DELETE "repos/$REPO/issues/$PR_NUMBER/labels/$l" >/dev/null 2>&1 || true
          done
          # CI-gated owner handoff. The current head's check-runs are the source
          # of truth (NOT a possibly-stale fact-ci-failing label from an earlier
          # commit): only mark ai-awaiting-owner when this head is green; never
          # claim merge-ready on a red or in-flight CI. Mirrors
          # owner_handoff_or_ci_gate in ai-address-feedback.yml.
          CI_STATE=$(gh api "repos/$REPO/commits/$HEAD_SHA/check-runs" \
            --jq '[.check_runs[] | .conclusion] | if length == 0 then "running" elif any(. == null) then "running" elif all(. == "success" or . == "skipped" or . == "neutral") then "ready" else "failing" end' \
            2>/dev/null || echo "unknown")
          if [ "$CI_STATE" = "ready" ]; then
            # Current head is green — clear any stale failure flag from an earlier commit.
            gh api -X DELETE "repos/$REPO/issues/$PR_NUMBER/labels/fact-ci-failing" >/dev/null 2>&1 || true
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" -f "labels[]=ai-awaiting-owner" >/dev/null
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "✅ **AI Factory**: Automated reviews complete (Copilot + Opus) — no changes required. PR is ready for human merge decision." || true
          elif [ "$CI_STATE" = "failing" ]; then
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" -f "labels[]=fact-ci-failing" >/dev/null 2>&1 || true
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "✅ **AI Factory**: Automated reviews complete (Copilot + Opus), but **CI is failing** on the head SHA — not marking \`ai-awaiting-owner\`. AI CI remediation will run." || true
            gh workflow run ai-ci-remediation.yml --repo "$REPO" --field pr_number="$PR_NUMBER" || true
          else
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "✅ **AI Factory**: Automated reviews complete (Copilot + Opus). **Not marking \`ai-awaiting-owner\`** yet — CI is \`$CI_STATE\`. The watchdog reconcile hands off once CI greens (\`fact-o-after-1\` + CI ready)." || true
          fi

      - name: Handle failure
        # Run even if an earlier step (including checkout) failed, so the
        # watchdog still gets a marker. `--repo` is mandatory here because
        # `workflow_dispatch` runs don't always have a working git directory
        # at this point — the prior bug on PR #595 was a GraphQL 504 in the
        # review step followed by `gh pr edit` failing with "not a git
        # repository" because there's no `--repo` fallback. Result: no
        # ai-blocked / fact-auto-retry labels and a silent 5 h stall.
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          RESET_LINE=""
          if out=$(bash .github/scripts/detect-rate-limit.sh "${{ github.run_id }}" "$REPO" 2>/dev/null); then
            RESET_ISO=$(echo "$out" | awk -F= '/^rate_limit_reset_iso=/{print $2}')
            if [ -n "$RESET_ISO" ]; then
              RESET_LINE=" ⏳ Rate limit reset at $RESET_ISO — watchdog will wait until then before retrying."
            fi
          fi
          # No `|| true` on the label add — if THIS fails the watchdog won't
          # see the retry marker and the PR stalls silently. Let the step go
          # red so the failure is visible in the Actions UI.
          gh pr comment "$PR_NUMBER" --repo "$REPO" \
            --body "⚠️ AI PR Review failed. Marking \`fact-ready-for-review\` + \`ai-blocked\` + \`fact-auto-retry\` — watchdog will retry automatically.${RESET_LINE} See [workflow run](${{ github.server_url }}/$REPO/actions/runs/${{ github.run_id }})."
          # REST API — see #611. Strict (no || true) — if the bot can't even
          # stamp the retry markers, the watchdog has nothing to recover from
          # and the failure must be visible in the Actions UI (D-031).
          for l in fact-ready-for-review ai-blocked fact-auto-retry; do
            gh api -X POST "repos/$REPO/issues/$PR_NUMBER/labels" -f "labels[]=$l" >/dev/null
          done
