name: AI Post-Merge EC Verify
# Two responsibilities, both triggered when a PR merges:
#
# 1. Exit Criteria safety net: when a PR auto-closes a linked issue, check
#    whether the issue's EC items are all verified. If any are unverified,
#    re-open the issue and add `fact-parent-incomplete` so it doesn't
#    silently vanish. Complements the Phase-walker EC guard in
#    ai-worker.yml (which blocks `Closes #N` before the PR is created).
#
# 2. Phase-walker auto-kickoff: when a phase PR (branch `ai/issue-N-pK`)
#    merges and the issue has more phases left, automatically add
#    `ai-work` to the issue so Phase K+1 starts implementing without
#    manual intervention. Closes the gap where the owner had to notice
#    a merged phase PR and remember to re-label the issue.
on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: ai-post-merge-verify-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  verify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Check EC items on linked issues
        run: |
          set -uo pipefail

          # Only run for factory-relevant branches — avoids noise on human PRs.
          BRANCH="${{ github.event.pull_request.head.ref }}"
          case "$BRANCH" in
            ai/*|conversation-engine-*|fix/*|feat/*|refactor/*) ;;
            *)
              echo "Branch '$BRANCH' is not a factory branch — skipping."
              exit 0
              ;;
          esac

          # Skip no-ai PRs.
          PR_LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels \
            --jq '[.labels[].name] | join(",")' 2>/dev/null || echo "")
          if echo ",$PR_LABELS," | grep -q ",no-ai,"; then
            echo "PR #$PR has no-ai — skipping."
            exit 0
          fi

          # Extract issue numbers from "Closes #NNN" or "Part of #NNN" in PR body.
          PR_BODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' 2>/dev/null || echo "")
          ISSUES=$(echo "$PR_BODY" | grep -oE '(Closes|Part of) #[0-9]+' \
            | grep -oE '[0-9]+' | sort -u)

          if [ -z "$ISSUES" ]; then
            echo "No linked issues in PR #$PR body — skipping."
            exit 0
          fi

          for ISSUE_NUM in $ISSUES; do
            ISSUE_JSON=$(gh issue view "$ISSUE_NUM" --repo "$REPO" \
              --json body,state 2>/dev/null || echo "")
            if [ -z "$ISSUE_JSON" ]; then
              echo "Issue #$ISSUE_NUM not found — skipping."
              continue
            fi

            ISSUE_STATE=$(echo "$ISSUE_JSON" | jq -r '.state')
            BODY=$(echo "$ISSUE_JSON" | jq -r '.body')

            # Count unchecked Exit Criteria lines: "- [ ] **EC-N"
            # D-037: anchored regex, NOT fixed-string. The original
            #   grep -cF '- [ ] **EC-'
            # was silently returning 0 because the leading '-' was parsed as a
            # CLI option by GNU grep (the error was swallowed by `|| true`),
            # so the post-merge guard never reopened issue #720 after PR #730
            # merged. Use the regex form anchored to start-of-line so the
            # pattern can never collide with grep option parsing.
            UNCHECKED_EC=$(printf '%s' "$BODY" | grep -cE '^- \[ \] \*\*EC-[0-9]' || true)
            # Count total ## Phase headings (used for multi-phase broadening below).
            TOTAL_PHASES=$(printf '%s' "$BODY" | grep -cE '^## Phase [0-9]+' || true)
            # Count unchecked regular task checkboxes (numbered tasks)
            UNCHECKED_TASKS=$(printf '%s' "$BODY" | grep -cE '^- \[ \] [0-9]' || true)

            echo "Issue #$ISSUE_NUM: state=$ISSUE_STATE total_phases=$TOTAL_PHASES unchecked_ec=$UNCHECKED_EC unchecked_tasks=$UNCHECKED_TASKS"

            # Diagnostic: if the body mentions 'EC-' but the count is 0,
            # something is wrong with the regex or body shape. Log a head
            # excerpt so future failures are easier to diagnose.
            if [ "${UNCHECKED_EC:-0}" -eq 0 ] && printf '%s' "$BODY" | grep -q 'EC-'; then
              echo "::warning::Issue #$ISSUE_NUM mentions 'EC-' but UNCHECKED_EC=0. Body head follows for debugging:"
              printf '%s' "$BODY" | head -c 4000
              echo
              echo "(end of body excerpt)"
            fi

            # D-037: also reopen on multi-phase issues where many tasks remain
            # unchecked across other phases — defends against a future
            # regression where EC detection misfires. The threshold (5) is
            # tuned so a final-phase merge with all phases done (which still
            # leaves ~4-5 untouched boxes from earlier Copilot/Opus rows that
            # the worker didn't tick) doesn't trigger a false reopen.
            MULTI_PHASE_INCOMPLETE=0
            if [ "${TOTAL_PHASES:-0}" -gt 1 ] && [ "${UNCHECKED_TASKS:-0}" -gt 5 ]; then
              MULTI_PHASE_INCOMPLETE=1
              echo "Issue #$ISSUE_NUM: multi-phase with $UNCHECKED_TASKS unchecked tasks (>5) — treating as incomplete."
            fi

            if [ "${UNCHECKED_EC:-0}" -gt 0 ] || [ "${MULTI_PHASE_INCOMPLETE:-0}" -eq 1 ]; then
              # EC items unverified OR multi-phase issue with substantial
              # unchecked work remaining — this is a hard stop.

              # Re-open if the merge auto-closed it.
              if [ "$ISSUE_STATE" = "CLOSED" ]; then
                gh issue reopen "$ISSUE_NUM" --repo "$REPO" 2>/dev/null || true
                if [ "${UNCHECKED_EC:-0}" -gt 0 ]; then
                  echo "Re-opened issue #$ISSUE_NUM ($UNCHECKED_EC EC items unverified)."
                else
                  echo "Re-opened issue #$ISSUE_NUM (multi-phase with $UNCHECKED_TASKS unchecked tasks across $TOTAL_PHASES phases)."
                fi
              fi

              # Label: fact-parent-incomplete. Create if missing.
              gh label create "fact-parent-incomplete" --color "e4e669" \
                --description "Parent issue has unmet Exit Criteria — not safe to close" \
                --repo "$REPO" 2>/dev/null || true
              gh api -X POST "repos/$REPO/issues/$ISSUE_NUM/labels" \
                -f "labels[]=fact-parent-incomplete" >/dev/null 2>&1 || true

              # Remove ai-awaiting-owner — issue still needs work.
              gh api -X DELETE "repos/$REPO/issues/$ISSUE_NUM/labels/ai-awaiting-owner" \
                >/dev/null 2>&1 || true

              # Build EC list for the comment (anchored regex — matches the
              # detection pattern above; the original fixed-string form
              # silently failed, see D-037).
              EC_LINES=$(printf '%s' "$BODY" | grep -E '^- \[ \] \*\*EC-' \
                | sed 's/^- \[ \] /- /' | head -20)
              if [ -z "$EC_LINES" ]; then
                EC_LINES="_(no Exit Criteria section found — multi-phase reopen triggered by $UNCHECKED_TASKS unchecked tasks across $TOTAL_PHASES phases; add an Exit Criteria section per docs/issue-format.md)_"
              fi

              REOPEN_NOTE=""
              if [ "$ISSUE_STATE" = "CLOSED" ]; then
                REOPEN_NOTE=" The issue was auto-closed by the PR merge and has been **re-opened** (see D-037: docs/decisions/D-037-multi-phase-no-auto-close.md)."
              fi

              REASON="**$UNCHECKED_EC Exit Criteria item(s) are still unverified**"
              if [ "${UNCHECKED_EC:-0}" -eq 0 ]; then
                REASON="multi-phase issue with **$UNCHECKED_TASKS unchecked task(s) across $TOTAL_PHASES phases** — work appears incomplete"
              fi

              gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$(cat <<EOF
          ⚠️ **AI Factory — Post-Merge EC Check**: PR #$PR merged but $REASON.$REOPEN_NOTE

          **Items requiring attention:**
          $EC_LINES

          Each Exit Criteria item requires **concrete evidence** before the issue can be considered done: test output, a CI run link, a screenshot, or a short screen recording — not "manually verified".

          Once all EC items are ticked, close this issue manually.
          cc @alvarolobato
          EOF
              )" 2>/dev/null || true

            elif [ "${UNCHECKED_TASKS:-0}" -gt 0 ] && [ "$ISSUE_STATE" = "CLOSED" ]; then
              # No EC items but unchecked task checkboxes — warn only, don't reopen.
              gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$(cat <<EOF
          ⚠️ **AI Factory — Post-Merge EC Check**: PR #$PR merged and closed this issue, but **$UNCHECKED_TASKS task checkbox(es) are still unchecked**. No Exit Criteria items were found, so this may be intentional. Review and reopen manually if work is incomplete.
          cc @alvarolobato
          EOF
              )" 2>/dev/null || true
            else
              echo "Issue #$ISSUE_NUM: all EC items verified (or none defined) — no action needed."
            fi
          done

      - name: Auto-kick next phase (multi-phase phase-walker)
        run: |
          set -uo pipefail

          # Only act on factory phase branches: ai/issue-<N>-p<K>.
          BRANCH="${{ github.event.pull_request.head.ref }}"
          PHASE_MATCH=$(echo "$BRANCH" | grep -oE '^ai/issue-([0-9]+)-p([0-9]+)$' || true)
          if [ -z "$PHASE_MATCH" ]; then
            echo "Branch '$BRANCH' is not a phase branch — skipping next-phase kick."
            exit 0
          fi
          ISSUE_NUM=$(echo "$BRANCH" | sed -E 's|^ai/issue-([0-9]+)-p([0-9]+)$|\1|')
          CURRENT_PHASE=$(echo "$BRANCH" | sed -E 's|^ai/issue-([0-9]+)-p([0-9]+)$|\2|')
          echo "Phase branch: issue=#$ISSUE_NUM current_phase=$CURRENT_PHASE"

          # Skip if the PR body says "Closes #N" — that's the final phase
          # marker; no next phase exists. (`Part of #N` indicates a
          # non-final phase OR a final phase with EC items still pending —
          # in the EC-pending case the previous step has already added
          # `fact-parent-incomplete` and re-opened the issue; we further
          # guard below by checking that label.)
          PR_BODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body' 2>/dev/null || echo "")
          if echo "$PR_BODY" | grep -qE "Closes #${ISSUE_NUM}\b"; then
            echo "PR #$PR closes issue #$ISSUE_NUM — final phase, not kicking next."
            exit 0
          fi

          # Read the issue's state + labels + body in one call.
          ISSUE_JSON=$(gh issue view "$ISSUE_NUM" --repo "$REPO" \
            --json state,labels,body 2>/dev/null || echo "")
          if [ -z "$ISSUE_JSON" ]; then
            echo "Issue #$ISSUE_NUM not found — skipping."
            exit 0
          fi

          ISSUE_STATE=$(echo "$ISSUE_JSON" | jq -r '.state')
          ISSUE_LABELS=$(echo "$ISSUE_JSON" | jq -r '[.labels[].name] | join(",")')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body')

          if [ "$ISSUE_STATE" = "CLOSED" ]; then
            echo "Issue #$ISSUE_NUM is CLOSED — not kicking next phase."
            exit 0
          fi

          # Hard skips — owner is already on the hook or the factory is paused.
          for BLOCKER in no-ai needs-human-approval fact-parent-incomplete ai-blocked; do
            if echo ",$ISSUE_LABELS," | grep -q ",${BLOCKER},"; then
              echo "Issue #$ISSUE_NUM has '$BLOCKER' — not kicking next phase."
              exit 0
            fi
          done

          # Already kicked / running — idempotency.
          for ALREADY in ai-work fact-in-progress; do
            if echo ",$ISSUE_LABELS," | grep -q ",${ALREADY},"; then
              echo "Issue #$ISSUE_NUM already has '$ALREADY' — next phase is queued or running."
              exit 0
            fi
          done

          # Count phase headings in the issue body to confirm there is a next phase.
          # The planner writes `## Phase N — <name>` (em-dash or hyphen).
          TOTAL_PHASES=$(printf '%s' "$ISSUE_BODY" \
            | grep -cE '^## Phase [0-9]+( |$)' || true)
          if [ "${TOTAL_PHASES:-0}" -lt 2 ]; then
            echo "Issue #$ISSUE_NUM has $TOTAL_PHASES phase headings — nothing to kick."
            exit 0
          fi
          NEXT_PHASE=$(( CURRENT_PHASE + 1 ))
          if [ "$NEXT_PHASE" -gt "$TOTAL_PHASES" ]; then
            echo "Issue #$ISSUE_NUM: merged Phase $CURRENT_PHASE was the last of $TOTAL_PHASES — done."
            exit 0
          fi

          # Add ai-work — this fires the labeled-event-driven implementer.
          echo "Adding ai-work to issue #$ISSUE_NUM (Phase $CURRENT_PHASE of $TOTAL_PHASES merged; Phase $NEXT_PHASE up next)."
          gh api -X POST "repos/$REPO/issues/$ISSUE_NUM/labels" \
            -f "labels[]=ai-work" >/dev/null 2>&1 || true

          gh issue comment "$ISSUE_NUM" --repo "$REPO" --body "$(cat <<EOF
          ⏭️ **AI Factory**: Phase $CURRENT_PHASE merged (#$PR). Auto-added \`ai-work\` to start **Phase $NEXT_PHASE of $TOTAL_PHASES**. The implementer should open the next PR shortly. If you'd rather pause here, remove \`ai-work\` and add \`ai-blocked\`.
          EOF
          )" 2>/dev/null || true
