name: AI Project Summary
on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  id-token: write

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate date thresholds
        id: dates
        run: |
          echo "today=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "yesterday=$(date -d 'yesterday' +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "three_days_ago=$(date -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "thirty_days_ago=$(date -d '30 days ago' +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Generate Project Summary
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
          TODAY: ${{ steps.dates.outputs.today }}
          YESTERDAY: ${{ steps.dates.outputs.yesterday }}
          THREE_DAYS_AGO: ${{ steps.dates.outputs.three_days_ago }}
          THIRTY_DAYS_AGO: ${{ steps.dates.outputs.thirty_days_ago }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 15"
          prompt: |
            Generate a daily project summary. Use the GitHub CLI to gather data.
            The following date env vars are pre-calculated and available in your shell:
            - $TODAY (e.g. 2026-04-05)
            - $YESTERDAY (e.g. 2026-04-04)
            - $THREE_DAYS_AGO (ISO 8601, e.g. 2026-04-02T09:00:00Z)
            - $THIRTY_DAYS_AGO (ISO 8601, e.g. 2026-03-06T09:00:00Z)

            ## Data to collect
            1. `gh pr list --state open --json number,title,author,labels,createdAt,reviewDecision` — Open PRs
            2. `gh pr list --state merged --json number,title,mergedAt --search "merged:>=${YESTERDAY}"` — Merged in last 24h
            3. `gh issue list --state open --label "ai-blocked" --json number,title` — Blocked issues
            4. `gh issue list --state open --label "ai-in-progress" --json number,title` — In-progress AI work
            5. `gh issue list --state open --json number,title,createdAt,labels --limit 20` — Recent open issues
            6. `gh pr list --state open --json number,title,createdAt --jq ".[] | select(.createdAt < \"${THREE_DAYS_AGO}\")"` — Stale PRs (use the pre-calculated $THREE_DAYS_AGO env var)

            ## Format
            Create an issue with title `[project-summary] Project Summary - ${TODAY}`:

            ### Open PRs ({count})
            | PR | Title | Author | CI | Review | Age |
            | ... |

            ### Merged Yesterday ({count})
            - #N title

            ### AI Activity
            - In progress: #X, #Y
            - Blocked (needs human): #A, #B

            ### Stale Items
            - PRs > 3 days without activity
            - Issues > 30 days without activity

            ### Easy Pickings
            Suggest 3-5 well-defined open issues that could be labeled `ai-work`.

            ### Health
            - Latest release: vX.Y.Z (date)
            - CI status: ✅/❌

            ## Cleanup
            Close the previous day's project summary issue (search for `[project-summary]` issues).
