<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Powershop — Cuadro de Mandos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-feature-settings: "ss01", "cv11", "tnum";
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- THEMES ---------- */
  [data-theme="dark"] {
    --bg: #0b0c0f;
    --bg-1: #111317;
    --bg-2: #161920;
    --bg-3: #1d2029;
    --border: #23262f;
    --border-strong: #2f3340;
    --fg: #eceff4;
    --fg-muted: #9aa0ab;
    --fg-subtle: #5d626c;
    --up: #34d399;
    --up-bg: rgba(52, 211, 153, 0.12);
    --down: #fb7185;
    --down-bg: rgba(251, 113, 133, 0.12);
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.12);
    --grid: rgba(255,255,255,0.04);
  }
  [data-theme="light"] {
    --bg: #fafaf7;
    --bg-1: #ffffff;
    --bg-2: #f4f4ef;
    --bg-3: #ebebe5;
    --border: #e4e4de;
    --border-strong: #d4d4cc;
    --fg: #1a1a1a;
    --fg-muted: #5f5f5f;
    --fg-subtle: #9a9a9a;
    --up: #059669;
    --up-bg: rgba(5, 150, 105, 0.10);
    --down: #dc2626;
    --down-bg: rgba(220, 38, 38, 0.10);
    --warn: #d97706;
    --warn-bg: rgba(217, 119, 6, 0.10);
    --grid: rgba(0,0,0,0.05);
  }

  /* Accents */
  [data-accent="electric"] { --accent: #7c5cff; --accent-2: #22d3ee; --accent-soft: rgba(124, 92, 255, 0.14); }
  [data-accent="citrus"]   { --accent: #f59e0b; --accent-2: #10b981; --accent-soft: rgba(245, 158, 11, 0.14); }
  [data-accent="magenta"]  { --accent: #ec4899; --accent-2: #8b5cf6; --accent-soft: rgba(236, 72, 153, 0.14); }
  [data-accent="mono"]     { --accent: #e5e5e5; --accent-2: #a3a3a3; --accent-soft: rgba(229, 229, 229, 0.10); }

  [data-density="compact"]  { --gap: 12px; --pad: 14px; --kpi-pad: 16px; }
  [data-density="comfort"]  { --gap: 18px; --pad: 20px; --kpi-pad: 22px; }
  [data-density="spacious"] { --gap: 26px; --pad: 28px; --kpi-pad: 30px; }

  /* utilities */
  .num { font-feature-settings: "tnum"; font-variant-numeric: tabular-nums; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .serif { font-family: 'Instrument Serif', serif; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* pulses */
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, transparent, var(--bg-3), transparent);
    background-size: 200% 100%;
    animation: shimmer 1.8s infinite;
  }

  /* chart hover tooltip styling handled in JS */
  .dash-bar-tick text { font-size: 10px !important; fill: var(--fg-subtle); }
</style>
</head>
<body data-theme="dark" data-accent="electric" data-density="comfort">
  <div id="root"></div>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="parts.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
