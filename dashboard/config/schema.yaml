# PowerShop Analytics — Dashboard configuration schema
# Each entry defines a config key, its env-var mapping, type, default, and metadata.
# The loader (lib/system-config/loader.ts) reads this file at runtime.
# Precedence: env vars > config.yaml > defaults defined here.

# -----------------------------------------------------------------------------
# OpenRouter
# -----------------------------------------------------------------------------

- key: openrouter.api_key
  env: OPENROUTER_API_KEY
  type: string
  sensitive: true
  default: null
  section: OpenRouter
  description: "Clave API de OpenRouter para LLM y embeddings (proveedor openrouter)."
  requires_restart: []

# -----------------------------------------------------------------------------
# URLs públicas
# -----------------------------------------------------------------------------

- key: dashboard.app_public_url
  env: APP_PUBLIC_URL
  type: string
  sensitive: false
  default: "http://localhost:4000"
  section: URLs
  description: "URL pública del Dashboard App (usada en enlaces externos y reverse-proxy)."
  requires_restart: []

- key: dashboard.wren_public_url
  env: WREN_PUBLIC_URL
  type: string
  sensitive: false
  default: "http://localhost:3000"
  section: URLs
  description: "URL pública de WrenAI (enlace 'Wren' del menú principal)."
  requires_restart: []

# -----------------------------------------------------------------------------
# Dashboard LLM — proveedor y modelos
# -----------------------------------------------------------------------------

- key: dashboard.llm_provider
  env: DASHBOARD_LLM_PROVIDER
  type: enum
  enum_values: [cli, openrouter, e2e-stub, mock]
  sensitive: false
  default: cli
  section: "Dashboard LLM"
  description: "Proveedor LLM: 'cli' usa Claude Code local (OAuth), 'openrouter' usa la API de OpenRouter. 'e2e-stub' (respuesta enlatada) y 'mock' (modelo guionizado, pipeline real) solo para tests e2e."
  requires_restart: []

- key: dashboard.llm_model_openrouter
  env: DASHBOARD_LLM_MODEL_OPENROUTER
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Modelo OpenRouter por defecto (id vendor/modelo). Vacío = anthropic/claude-sonnet-4."
  requires_restart: []

- key: dashboard.llm_model_openrouter_generate
  env: DASHBOARD_LLM_MODEL_OPENROUTER_GENERATE
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Override OpenRouter para generación de dashboards. Vacío = usa llm_model_openrouter."
  requires_restart: []

- key: dashboard.llm_model_openrouter_modify
  env: DASHBOARD_LLM_MODEL_OPENROUTER_MODIFY
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Override OpenRouter para modificación de dashboards. Vacío = usa llm_model_openrouter."
  requires_restart: []

- key: dashboard.llm_model_openrouter_analyze
  env: DASHBOARD_LLM_MODEL_OPENROUTER_ANALYZE
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Override OpenRouter para análisis. Vacío = usa llm_model_openrouter."
  requires_restart: []

- key: dashboard.llm_model_openrouter_weekly
  env: DASHBOARD_LLM_MODEL_OPENROUTER_WEEKLY
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Override OpenRouter para revisiones semanales. Vacío = usa llm_model_openrouter."
  requires_restart: []

- key: dashboard.llm_model_cli
  env: DASHBOARD_LLM_MODEL_CLI
  type: string
  sensitive: false
  default: "claude-sonnet-4-6"
  section: "Dashboard LLM"
  description: "Modelo Claude nativo para el proveedor CLI (--model flag)."
  requires_restart: []

- key: dashboard.llm_cli_driver
  env: DASHBOARD_LLM_CLI_DRIVER
  type: enum
  enum_values: [claude_code]
  sensitive: false
  default: claude_code
  section: "Dashboard LLM"
  description: "Driver CLI a usar cuando provider=cli (actualmente solo 'claude_code')."
  requires_restart: []

- key: dashboard.llm_cli_bin
  env: DASHBOARD_LLM_CLI_BIN
  type: string
  sensitive: false
  default: "claude"
  section: "Dashboard LLM"
  description: "Ruta o nombre del binario Claude CLI."
  requires_restart: []

- key: dashboard.llm_cli_extra_args
  env: DASHBOARD_LLM_CLI_EXTRA_ARGS
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Argumentos extra para el CLI de Claude (separados por espacios)."
  requires_restart: []

- key: dashboard.llm_cli_timeout_ms
  env: DASHBOARD_LLM_CLI_TIMEOUT_MS
  type: int
  sensitive: false
  default: 120000
  section: "Dashboard LLM"
  description: "Tiempo máximo de espera para una llamada CLI (milisegundos)."
  requires_restart: []

- key: dashboard.llm_cli_max_capture_bytes
  env: DASHBOARD_LLM_CLI_MAX_CAPTURE_BYTES
  type: int
  sensitive: false
  default: 8000000
  section: "Dashboard LLM"
  description: "Bytes máximos capturados de la salida del CLI antes de truncar."
  requires_restart: []

- key: dashboard.llm_daily_budget_usd
  env: LLM_DAILY_BUDGET_USD
  type: string
  sensitive: false
  default: null
  section: "Dashboard LLM"
  description: "Presupuesto diario máximo en USD para llamadas LLM (vacío = sin límite)."
  requires_restart: []

# -----------------------------------------------------------------------------
# Dashboard LLM — configuración agentic
# -----------------------------------------------------------------------------

- key: dashboard.agentic_tools_enabled
  env: DASHBOARD_AGENTIC_TOOLS_ENABLED
  type: bool
  sensitive: false
  default: true
  section: Agentic
  description: "Habilita el loop de herramientas agentic para generate/modify/analyze."
  requires_restart: []

- key: dashboard.agentic_max_tool_rounds
  env: DASHBOARD_AGENTIC_MAX_TOOL_ROUNDS
  type: int
  sensitive: false
  default: 8
  section: Agentic
  description: "Máximo de rondas de herramientas por petición."
  requires_restart: []

- key: dashboard.agentic_max_tool_calls
  env: DASHBOARD_AGENTIC_MAX_TOOL_CALLS
  type: int
  sensitive: false
  default: 24
  section: Agentic
  description: "Máximo de llamadas totales a herramientas por petición."
  requires_restart: []

- key: dashboard.agentic_tool_timeout_ms
  env: DASHBOARD_AGENTIC_TOOL_TIMEOUT_MS
  type: int
  sensitive: false
  default: 15000
  section: Agentic
  description: "Timeout en ms por llamada a herramienta."
  requires_restart: []

- key: dashboard.agentic_max_rows
  env: DASHBOARD_AGENTIC_MAX_ROWS
  type: int
  sensitive: false
  default: 200
  section: Agentic
  description: "Máximo de filas devueltas por execute_query."
  requires_restart: []

- key: dashboard.agentic_max_columns
  env: DASHBOARD_AGENTIC_MAX_COLUMNS
  type: int
  sensitive: false
  default: 30
  section: Agentic
  description: "Máximo de columnas devueltas por execute_query."
  requires_restart: []

- key: dashboard.agentic_max_result_chars
  env: DASHBOARD_AGENTIC_MAX_RESULT_CHARS
  type: int
  sensitive: false
  default: 20000
  section: Agentic
  description: "Máximo de caracteres del resultado de herramienta enviado al modelo."
  requires_restart: []

# -----------------------------------------------------------------------------
# Seguridad
# -----------------------------------------------------------------------------

- key: dashboard.admin_api_key
  env: ADMIN_API_KEY
  type: string
  sensitive: true
  default: null
  section: Seguridad
  description: "Contraseña/token de acceso al panel de administración (/admin/*). Solo configurable por variable de entorno — los cambios en config.yaml se ignoran para evitar escalada de privilegios a través de la UI."
  requires_restart: []

- key: dashboard.admin_cookie_secure
  env: ADMIN_COOKIE_SECURE
  type: bool
  sensitive: false
  default: false
  section: Seguridad
  description: "Fija la cookie de admin como Secure (solo HTTPS). Activar cuando el dashboard está detrás de TLS."
  requires_restart: []

- key: dashboard.query_cost_limit
  env: QUERY_COST_LIMIT
  type: string
  sensitive: false
  default: null
  section: Seguridad
  description: "Rechaza consultas SQL cuando el coste EXPLAIN supera este umbral. Vacío = sin límite."
  requires_restart: []
